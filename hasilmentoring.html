<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard Mentoring - CAHAYA App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary-color: #2c3e50; /* Deep Navy */
            --accent-color: #c0392b;  /* Elegant Red */
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --card-bg: rgba(255, 255, 255, 0.9);
            --shadow-premium: 0 10px 30px rgba(0,0,0,0.08);
            
            /* Warna Dimensi */
            --dim-spiritual: #9b59b6;
            --dim-physical: #2ecc71;
            --dim-intellectual: #3498db;
            --dim-relational: #e67e22;
            --dim-emotional: #e74c3c;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 10%, rgba(44, 62, 80, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(192, 57, 43, 0.05) 0px, transparent 50%);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header Area */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 40px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        header h1 {
            margin: 0;
            font-weight: 700;
            font-size: 28px;
            color: var(--primary-color);
            letter-spacing: -1px;
        }

        header h1 span {
            color: var(--accent-color);
            font-weight: 300;
        }

        /* Search & Filter Bar */
        .search-container {
            position: relative;
            width: 300px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 30px;
            border: 1px solid #e0e0e0;
            background: #fff;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(192, 57, 43, 0.1);
        }

        .search-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        /* Grid System */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        /* Premium Card Styling */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -15px;
            right: -15px;
            width: 50px;
            height: 50px;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.1;
        }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 18px;
            text-transform: uppercase;
        }

        .card-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .date-badge {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f8f9fa;
            padding: 5px 10px;
            border-radius: 15px;
        }

        /* Card Body */
        .card-body {
            flex-grow: 1;
            margin-bottom: 20px;
            background: #fafbfc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #f1f2f6;
        }
        
        /* Gaya Teks "Rangkuman Mentoring Individu Pekanan" */
        .card-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px dashed #e0e0e0;
            padding-bottom: 10px;
        }

        .info-row {
            margin-bottom: 15px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            margin-bottom: 5px;
            display: block;
        }

        .content-text {
            font-size: 14px;
            line-height: 1.6;
            color: #4a4a4a;
        }

        /* Dimension Badge */
        .dimensi-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            margin-top: 3px;
        }

        /* Card Footer */
        .card-footer {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-light);
        }

        .mentor-name {
            font-weight: 600;
            color: var(--primary-color);
            background: #f0f4f8;
            padding: 5px 12px;
            border-radius: 15px;
        }

        /* Loading & No Data State */
        .state-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            color: var(--text-light);
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-premium);
        }

        .state-container i {
            font-size: 50px;
            margin-bottom: 20px;
            color: var(--accent-color);
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
                align-items: flex-start;
            }
            .search-container {
                width: 100%;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CAHAYA<span>App</span> • Dashboard Mentoring</h1>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari nama santri atau mentor...">
            </div>
        </header>
        
        <div class="card-grid" id="cardGrid">
            <div class="state-container" id="loadingState">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p>Menghubungkan ke database premium...</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Inisialisasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVmM3o8NMxZoLI",
            databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
            projectId: "absensi-santri-fajrul-islam",
            appId: "1:739928369926:web:7e95375c3ddba0f584cdd07"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        const cardGrid = document.getElementById('cardGrid');
        const loadingState = document.getElementById('loadingState');
        const searchInput = document.getElementById('searchInput');
        
        let allData = [];

        // 2. Ambil data Real-time
        database.ref('mentoring').on('value', (snapshot) => {
            allData = []; 
            
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    let data = childSnapshot.val();
                    data.key = childSnapshot.key;
                    allData.push(data);
                });

                allData.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
                renderCards(allData);
            } else {
                renderNoData();
            }
        }, (error) => {
            console.error("Error: ", error);
            renderError();
        });

        // 3. Render ke bentuk Card
        function renderCards(dataToRender) {
            cardGrid.innerHTML = ''; 
            
            if (dataToRender.length === 0) {
                renderNoData("Tidak ditemukan data yang cocok.");
                return;
            }

            dataToRender.forEach((data) => {
                const namaSantri = data.namaSantri || 'Anonim';
                const inisial = namaSantri.substring(0, 2);
                
                const dimensi = data.topikUtama ? data.topikUtama.dimensi : 'Uncategorized';
                const poinInti = data.topikUtama ? data.topikUtama.poinInti : '-';
                
                const dimInfo = getDimensionInfo(dimensi);

                const cardHtml = `
                    <div class="card">
                        <div class="card-header">
                            <div class="student-info">
                                <div class="avatar-circle">${inisial}</div>
                                <div>
                                    <h3>${namaSantri}</h3>
                                    <span class="dimensi-badge" style="background-color: ${dimInfo.color}">
                                        <i class="${dimInfo.icon}"></i> ${dimensi}
                                    </span>
                                </div>
                            </div>
                            <div class="date-badge">
                                <i class="far fa-calendar-alt"></i> ${formatTanggalIndo(data.tanggal)}
                            </div>
                        </div>

                        <div class="card-body">
                            <div class="card-subtitle"><i class="fas fa-clipboard-list"></i> Rangkuman Mentoring Individu Pekanan</div>
                            
                            <div class="info-row">
                                <span class="label">Poin Inti Pembahasan</span>
                                <div class="content-text"><strong>${poinInti}</strong></div>
                            </div>
                            <div class="info-row">
                                <span class="label">Fokus Tindakan Pekan Depan</span>
                                <div class="content-text">${data.fokusTindakan || '-'}</div>
                            </div>
                        </div>

                        <div class="card-footer">
                            <span>Mentoring dipandu oleh</span>
                            <span class="mentor-name"><i class="fas fa-user-tie"></i> ${data.mentor || '-'}</span>
                        </div>
                    </div>
                `;
                cardGrid.innerHTML += cardHtml;
            });
        }

        // Fitur Pencarian
        searchInput.addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filteredData = allData.filter(item => {
                return (
                    (item.namaSantri && item.namaSantri.toLowerCase().includes(keyword)) ||
                    (item.mentor && item.mentor.toLowerCase().includes(keyword)) ||
                    (item.topikUtama && item.topikUtama.poinInti.toLowerCase().includes(keyword))
                );
            });
            renderCards(filteredData);
        });

        // Mapping Warna & Ikon
        function getDimensionInfo(dimensi) {
            const d = dimensi.toLowerCase();
            if (d.includes('spiritual')) return { color: 'var(--dim-spiritual)', icon: 'fas fa-pray' };
            if (d.includes('physical')) return { color: 'var(--dim-physical)', icon: 'fas fa-heartbeat' };
            if (d.includes('intellectual')) return { color: 'var(--dim-intellectual)', icon: 'fas fa-brain' };
            if (d.includes('relational')) return { color: 'var(--dim-relational)', icon: 'fas fa-users' };
            if (d.includes('emotional')) return { color: 'var(--dim-emotional)', icon: 'fas fa-smile' };
            return { color: '#95a5a6', icon: 'fas fa-tag' }; 
        }

        // Format Tanggal
        function formatTanggalIndo(tanggalString) {
            if (!tanggalString) return '-';
            const dateObj = new Date(tanggalString);
            if (isNaN(dateObj)) return tanggalString;

            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            const day = dateObj.getDate();
            const month = months[dateObj.getMonth()];
            const year = dateObj.getFullYear();
            
            return `${day} ${month} ${year}`;
        }

        // State Views
        function renderNoData(message = "Belum ada history mentoring tersimpan.") {
            cardGrid.innerHTML = `
                <div class="state-container">
                    <i class="fas fa-folder-open"></i>
                    <p>${message}</p>
                </div>
            `;
        }

        function renderError() {
            cardGrid.innerHTML = `
                <div class="state-container" style="color: var(--accent-color)">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Gagal memuat data. Periksa koneksi atau konfigurasi Firebase Anda.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
