<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CAHAYA APP - Pengaturan Profil</title>
  
  <link rel="stylesheet" href="css/cahaya-theme.css" />
  
  <style>
    .header-profil {
      background: linear-gradient(135deg, var(--navy-dark), var(--navy-light));
      padding: 30px 40px; border-radius: var(--radius-lg); color: white;
      margin-bottom: 25px; box-shadow: 0 15px 30px rgba(15, 23, 42, 0.15);
      position: relative; overflow: hidden;
    }
    .header-profil::after {
      content: '👤'; position: absolute; right: 20px; top: -10px;
      font-size: 8rem; opacity: 0.1; pointer-events: none;
    }
    .header-profil h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold-light); margin-bottom: 5px; }

    .profil-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
    
    /* Area Foto Profil */
    .foto-area { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .foto-preview { 
      width: 150px; height: 150px; border-radius: 50%; background: #f1f5f9; 
      border: 3px solid var(--gold-main); object-fit: cover; margin-bottom: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
    .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }

    /* Info Badge */
    .info-box { background: #fffbeb; border: 1px solid #fde68a; padding: 15px; border-radius: 10px; color: #d97706; font-size: 0.85rem; margin-bottom: 20px; }

    @media(max-width: 768px) {
      .profil-grid { grid-template-columns: 1fr; }
    }
  </style>

<style id="ruangguru-fresh-override">
  :root {
    --primary: #2878ff;
    --primary-dark: #1557d5;
    --primary-light: #eaf3ff;
    --cyan: #19c6e6;
    --green: #25b983;
    --orange: #ff9f43;
    --red: #ef5968;
    --purple: #7667f5;
    --navy-dark: #152347;
    --navy-light: #31415f;
    --text-heading: #152347;
    --text-main: #31415f;
    --text-muted: #71809e;
    --input-border: #dfe7f3;
    --border: #e2eaf6;
    --bg-main: #f5f8ff;
    --gold-main: #2878ff;
    --gold-dark: #1557d5;
    --gold-light: #eaf3ff;
    --radius-lg: 22px;
    --radius-md: 14px;
    --shadow-card: 0 12px 35px rgba(35, 78, 160, .09);
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; min-height: 100%; overflow-x: hidden; }
  body {
    margin: 0 !important;
    padding: 14px !important;
    color: var(--text-main) !important;
    font-family: "Nunito", "Poppins", Arial, sans-serif !important;
    background:
      radial-gradient(circle at 4% 2%, rgba(25,198,230,.10), transparent 24%),
      radial-gradient(circle at 96% 6%, rgba(118,103,245,.09), transparent 23%),
      linear-gradient(180deg, #f4f8ff 0%, #fbfdff 100%) !important;
  }

  button, input, select, textarea { font: inherit; }

  .cahaya-container {
    width: 100% !important;
    max-width: 1180px !important;
    margin: 0 auto !important;
    padding: 0 !important;
  }

  .cahaya-card {
    border: 1px solid rgba(226,234,246,.98) !important;
    border-radius: 22px !important;
    background: rgba(255,255,255,.98) !important;
    box-shadow: var(--shadow-card) !important;
  }

  .tab-nav {
    display: flex !important;
    gap: 7px !important;
    margin: 0 0 16px !important;
    padding: 6px !important;
    overflow-x: auto !important;
    white-space: nowrap !important;
    border: 1px solid #dfe8f5 !important;
    border-radius: 16px !important;
    background: rgba(237,243,253,.88) !important;
    scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-nav .tab-btn {
    min-height: 42px !important;
    flex: 1 0 auto !important;
    padding: 10px 16px !important;
    color: #6f7f9b !important;
    font-size: .76rem !important;
    font-weight: 900 !important;
    border: 1px solid transparent !important;
    border-radius: 11px !important;
    background: transparent !important;
    box-shadow: none !important;
    transform: none !important;
  }
  .tab-nav .tab-btn:hover {
    color: var(--primary) !important;
    background: rgba(255,255,255,.78) !important;
  }
  .tab-nav .tab-btn.active {
    color: #fff !important;
    border-color: var(--primary) !important;
    background: linear-gradient(135deg, var(--primary), var(--cyan)) !important;
    box-shadow: 0 8px 18px rgba(40,120,255,.20) !important;
  }

  .form-control,
  .filter-group input[type="date"],
  .dynamic-form-row input,
  .dynamic-form-row textarea,
  .custom-select-display {
    min-height: 46px !important;
    color: var(--text-main) !important;
    font-size: .8rem !important;
    font-weight: 750 !important;
    outline: none !important;
    border: 1.5px solid var(--input-border) !important;
    border-radius: 12px !important;
    background: #f8faff !important;
    transition: .18s ease !important;
  }
  .form-control { padding: 10px 13px !important; }
  .form-control:hover,
  .filter-group input[type="date"]:hover,
  .dynamic-form-row input:hover,
  .dynamic-form-row textarea:hover,
  .custom-select-display:hover {
    border-color: #c8d8ec !important;
    background: #fff !important;
  }
  .form-control:focus,
  .filter-group input[type="date"]:focus,
  .dynamic-form-row input:focus,
  .dynamic-form-row textarea:focus {
    border-color: var(--primary) !important;
    background: #fff !important;
    box-shadow: 0 0 0 4px rgba(40,120,255,.09) !important;
  }

  .btn-cahaya,
  .btn-cahaya.btn-gold {
    min-height: 44px !important;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 7px !important;
    padding: 10px 16px !important;
    color: #fff !important;
    font-size: .74rem !important;
    font-weight: 900 !important;
    cursor: pointer !important;
    border: 1px solid transparent !important;
    border-radius: 12px !important;
    background: linear-gradient(135deg, var(--primary), var(--cyan)) !important;
    box-shadow: 0 8px 18px rgba(40,120,255,.18) !important;
    transition: .18s ease !important;
  }
  .btn-cahaya:hover,
  .btn-cahaya.btn-gold:hover {
    transform: translateY(-1px) !important;
    box-shadow: 0 11px 22px rgba(40,120,255,.24) !important;
  }
  .btn-cahaya[onclick*="tutupModal"] {
    color: #53627c !important;
    border: 1px solid #dbe4f0 !important;
    background: #f1f5fa !important;
    box-shadow: none !important;
  }
  .btn-cahaya[onclick*="tutupModal"]:hover {
    color: #25344f !important;
    background: #e8eef6 !important;
    transform: none !important;
  }

  .cahaya-title,
  .panel-title,
  .modal-header h3 {
    color: var(--text-heading) !important;
    font-family: inherit !important;
    font-weight: 900 !important;
  }

  .table-responsive {
    overflow: auto !important;
    border: 1px solid #e1e9f5 !important;
    border-radius: 16px !important;
    background: #fff !important;
  }
  .cahaya-table {
    width: 100% !important;
    border-collapse: separate !important;
    border-spacing: 0 !important;
  }
  .cahaya-table thead th {
    padding: 12px 13px !important;
    color: #586a89 !important;
    font-size: .66rem !important;
    font-weight: 900 !important;
    letter-spacing: .25px !important;
    text-transform: uppercase !important;
    border-bottom: 1px solid #e2eaf5 !important;
    background: linear-gradient(180deg, #f8fbff, #f3f7fd) !important;
  }
  .cahaya-table tbody td {
    padding: 12px 13px !important;
    color: #42516d !important;
    font-size: .76rem !important;
    font-weight: 650 !important;
    border-bottom: 1px solid #edf1f7 !important;
    background: #fff !important;
  }
  .cahaya-table tbody tr:last-child td { border-bottom: none !important; }
  .cahaya-table tbody tr:hover td { background: #f8fbff !important; }

  .action-bar {
    gap: 12px !important;
    margin-bottom: 16px !important;
  }
  .search-box input {
    min-height: 46px !important;
    padding: 10px 14px 10px 40px !important;
    border-radius: 12px !important;
  }
  .search-box::before { top: 14px !important; color: #8290a8 !important; }

  .list-item-manage {
    padding: 12px 14px !important;
    color: #42516d !important;
    border: 1px solid #e1e9f5 !important;
    border-radius: 13px !important;
    background: #f9fbff !important;
  }
  .list-item-manage:hover {
    border-color: #bfd4f5 !important;
    background: #fff !important;
    box-shadow: 0 7px 18px rgba(40,120,255,.07) !important;
  }

  .tag, .badge-node {
    border-radius: 999px !important;
    font-weight: 900 !important;
  }
  .badge-node {
    color: #1765ce !important;
    border: 1px solid #d4e4ff !important;
    background: #edf5ff !important;
  }

  .modal {
    background: rgba(15,35,71,.58) !important;
    backdrop-filter: blur(8px) !important;
  }
  .modal-content {
    border: 1px solid rgba(255,255,255,.7) !important;
    border-radius: 22px !important;
    background: #fff !important;
    box-shadow: 0 28px 70px rgba(15,35,71,.28) !important;
  }
  .modal-header,
  .modal-footer {
    border-color: #e5ecf6 !important;
    background: #f8fbff !important;
  }

  #loadingOverlay {
    color: var(--text-heading) !important;
    font-family: inherit !important;
    background: rgba(246,249,255,.94) !important;
    backdrop-filter: blur(10px) !important;
  }
  #loadingOverlay > div:first-child {
    width: 68px;
    height: 68px;
    display: grid;
    place-items: center;
    margin-bottom: 13px !important;
    color: #fff;
    font-size: 1.55rem !important;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--primary), var(--cyan));
    box-shadow: 0 14px 30px rgba(40,120,255,.22);
  }

  @media (max-width: 760px) {
    body { padding: 9px !important; }
    .cahaya-card { padding: 17px 13px !important; border-radius: 18px !important; }
    .tab-nav { border-radius: 14px !important; }
    .tab-nav .tab-btn { min-height: 40px !important; padding: 9px 13px !important; }
    .action-bar { align-items: stretch !important; }
    .action-bar .btn-cahaya { width: 100% !important; }
    .table-responsive { border-radius: 13px !important; }
  }
</style>

<style id="ruangguru-profil-override">
  .profil-grid { grid-template-columns: minmax(230px,.72fr) minmax(0,1.55fr) !important; gap: 16px !important; }
  .foto-area { padding: 24px 18px !important; }
  .foto-preview {
    width: 132px !important;
    height: 132px !important;
    border: 5px solid #fff !important;
    outline: 3px solid #cfe1ff !important;
    box-shadow: 0 13px 28px rgba(40,120,255,.15) !important;
  }
  .info-box {
    color: #286493 !important;
    border: 1px solid #d5e8ff !important;
    border-left: 5px solid var(--primary) !important;
    border-radius: 13px !important;
    background: #f2f8ff !important;
  }
  #btnSimpanSandi {
    color: #d34656 !important;
    border: 1px solid #f2c7cd !important;
    background: #fff0f2 !important;
    box-shadow: none !important;
  }
  #btnSimpanSandi:hover {
    color: #fff !important;
    border-color: #ef5968 !important;
    background: #ef5968 !important;
  }
  .file-input-wrapper .btn-cahaya {
    color: #1765ce !important;
    border: 1px solid #cfe1ff !important;
    background: #edf5ff !important;
    box-shadow: none !important;
  }
  @media(max-width:760px){.profil-grid{grid-template-columns:1fr!important}.foto-area{padding:21px 15px!important}}
</style>

</head>
<body>

<main class="cahaya-container"><div class="profil-grid">
    <!-- KOLOM KIRI: FOTO PROFIL -->
    <div class="cahaya-card foto-area">
      <img id="imgPreview" src="assets/logofi.png" class="foto-preview" alt="Preview Foto" style="display: none;" />
      
      <h3 style="color: var(--navy-dark); font-size: 1.1rem; margin-bottom: 5px;" id="dispUsername">@username</h3>
      <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 20px;" id="dispRole">Role</p>

      <div class="file-input-wrapper">
        <button class="btn-cahaya" style="background: #e2e8f0; color: var(--navy-dark); width: 100%;">📷 Pilih Foto Baru</button>
        <input type="file" id="inputFoto" accept="image/png, image/jpeg, image/jpg" onchange="prosesFoto(event)">
      </div>
      <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 10px;">Format: JPG/PNG. Ukuran akan dioptimasi otomatis.</p>
    </div>

    <!-- KOLOM KANAN: FORM DATA & PASSWORD -->
    <div>
      <div class="cahaya-card" style="margin-bottom: 20px;">
        <h3 class="cahaya-title" style="font-size: 1.2rem; border-bottom: 2px dashed #e2e8f0; padding-bottom: 10px; margin-bottom: 20px;">📝 Identitas Tampilan</h3>
        
        <div class="form-group">
          <label>Nama Sapaan (Label Layar)</label>
          <input type="text" class="form-control" id="editNama" placeholder="Contoh: Ustadz Multazam">
        </div>

        <button class="btn-cahaya btn-gold" id="btnSimpanProfil" onclick="simpanProfil()">💾 Simpan Identitas & Foto</button>
      </div>

      <div class="cahaya-card">
        <h3 class="cahaya-title" style="font-size: 1.2rem; border-bottom: 2px dashed #e2e8f0; padding-bottom: 10px; margin-bottom: 20px;">🔐 Keamanan Akun</h3>
        <div class="info-box">
          <b>Catatan:</b> Jika Anda ingin mengganti kata sandi, pastikan Anda masuk/login secara normal melalui halaman depan.
        </div>
        
        <div class="form-group">
          <label>Kata Sandi Baru</label>
          <input type="password" class="form-control" id="editPassword" placeholder="Ketik sandi baru (minimal 6 karakter)">
        </div>

        <button class="btn-cahaya" style="background: #fee2e2; color: #dc2626; border-color: #fca5a5;" id="btnSimpanSandi" onclick="simpanPassword()">🔑 Ganti Kata Sandi</button>
      </div>
    </div>
  </div>
</main>

<!-- SCRIPT FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB0Eza852WuQL2R8U-yHpVnM3o8NMxZolI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    projectId: "absensi-santri-fajrul-islam"
  };
  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  const db = firebase.firestore();
  const auth = firebase.auth();

  let currentUser = JSON.parse(localStorage.getItem('cahayaCurrentUser') || '{}');
  let fotoBase64Baru = null;

  document.addEventListener('DOMContentLoaded', () => {
    if(!currentUser.username) return alert("Sesi tidak valid!");

    document.getElementById('dispUsername').textContent = "@" + currentUser.username;
    document.getElementById('dispRole').textContent = (currentUser.akses || []).join(' & ').toUpperCase();
    document.getElementById('editNama').value = currentUser.label || currentUser.username;

    // Logika Pemunculan Foto
    const imgElement = document.getElementById('imgPreview');
    if(currentUser.fotoProfil) {
      imgElement.src = currentUser.fotoProfil;
      imgElement.style.display = 'block'; // Pastikan terlihat
    } else {
      imgElement.style.display = 'none'; // Sembunyikan gambar kosong
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'foto-preview';
      avatarDiv.id = 'inisialPreview';
      avatarDiv.style.display = 'flex'; avatarDiv.style.justifyContent = 'center'; avatarDiv.style.alignItems = 'center';
      avatarDiv.style.fontSize = '4rem'; avatarDiv.style.fontWeight = 'bold'; avatarDiv.style.color = 'var(--navy-dark)';
      avatarDiv.innerHTML = (currentUser.label || currentUser.username).charAt(0).toUpperCase();
      document.querySelector('.foto-area').insertBefore(avatarDiv, document.getElementById('dispUsername'));
    }
  });

  // FUNGSI OPTIMASI GAMBAR (AUTO COMPRESS & RESIZE)
  function prosesFoto(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function (e) {
      const img = new Image();
      img.src = e.target.result;
      img.onload = function () {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 250; const MAX_HEIGHT = 250;
        let width = img.width; let height = img.height;

        if (width > height) {
          if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
        } else {
          if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
        }

        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        // Kompresi ketat jadi JPEG
        fotoBase64Baru = canvas.toDataURL('image/jpeg', 0.7);
        
        const previewEl = document.getElementById('imgPreview');
        previewEl.src = fotoBase64Baru;
        previewEl.style.display = 'block';
        
        const divInit = document.getElementById('inisialPreview');
        if(divInit) divInit.remove();
      }
    };
  }

  // FUNGSI SIMPAN PROFIL & FOTO KE FIREBASE
  window.simpanProfil = async function() {
    const namaBaru = document.getElementById('editNama').value.trim();
    if(!namaBaru) return alert("Nama Sapaan tidak boleh kosong!");

    const btn = document.getElementById('btnSimpanProfil');
    btn.innerHTML = "⏳ MENYIMPAN..."; btn.disabled = true;

    try {
      let dataUpdate = { label: namaBaru };
      if(fotoBase64Baru) dataUpdate.fotoProfil = fotoBase64Baru;

      // 🔥 MAGIC: Menggunakan SET + MERGE agar tersimpan permanen
      await db.collection("users").doc(currentUser.username).set(dataUpdate, { merge: true });

      // Update Cache Lokal
      currentUser.label = namaBaru;
      if(fotoBase64Baru) currentUser.fotoProfil = fotoBase64Baru;
      localStorage.setItem('cahayaCurrentUser', JSON.stringify(currentUser));

      // Paksa Dashboard Induk refresh profil
      if(window.parent && window.parent.refreshUserProfileUI) {
        window.parent.refreshUserProfileUI();
      }

      alert("✅ Identitas dan Foto Profil berhasil diperbarui!");
    } catch(e) {
      alert("Gagal menyimpan profil: " + e.message);
    } finally {
      btn.innerHTML = "💾 Simpan Identitas & Foto"; btn.disabled = false;
    }
  }

  // FUNGSI GANTI PASSWORD DI FIREBASE AUTH
  window.simpanPassword = async function() {
    const passBaru = document.getElementById('editPassword').value.trim();
    if(passBaru.length < 6) return alert("Kata sandi minimal harus 6 karakter!");

    const userAuth = auth.currentUser;
    if(!userAuth) {
      return alert("❌ Sesi keamanan belum aktif. Silakan Logout dan Login kembali secara normal dari halaman depan untuk mengganti sandi.");
    }

    const btn = document.getElementById('btnSimpanSandi');
    btn.innerHTML = "⏳ MEMPROSES..."; btn.disabled = true;

    try {
      await userAuth.updatePassword(passBaru);
      document.getElementById('editPassword').value = '';
      alert("✅ Kata sandi berhasil diganti! Gunakan sandi baru ini saat login berikutnya.");
    } catch(error) {
      if(error.code === 'auth/requires-recent-login') {
        alert("⚠️ Sistem menolak karena sesi Anda sudah lama. Silakan Logout dan Login kembali.");
      } else {
        alert("Gagal mengganti password: " + error.message);
      }
    } finally {
      btn.innerHTML = "🔑 Ganti Kata Sandi"; btn.disabled = false;
    }
  }
</script>

</body>
</html>
