<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Jurnal Piket Naqib - CAHAYA APP</title>
  
  <!-- JURUS KEDUA: TAMBAHKAN ?v=2.0 DI BELAKANG CSS AGAR CACHE LANGSUNG PECAH -->
  <link rel="stylesheet" href="../css/cahaya-theme.css?v=2.0" />

  <style>
    /* =========================================
       PENYEMPURNAAN RESPONSIVE FORM DI HP
       ========================================= */
    .cahaya-card {
      background: white; border-radius: 16px; padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px;
    }

    .header-page { 
      display: flex; align-items: center; gap: 15px; margin-bottom: 25px; 
      border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px; 
    }
    .header-page h2 { color: var(--navy-dark); font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 0; }
    
    .form-group { margin-bottom: 18px; }
    .form-group label { 
      display: block; font-size: 0.8rem; font-weight: 700; color: var(--navy-dark); 
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    
    .form-control { 
      width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 10px; 
      font-family: inherit; font-size: 0.95rem; outline: none; background: #f8fafc; transition: 0.3s;
    }
    .form-control:focus { background: #ffffff; border-color: var(--gold-main); box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }
    
    textarea.form-control { resize: vertical; min-height: 100px; line-height: 1.5; }

    /* Custom Radio Box untuk Status Kondisi Asrama */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
    .status-box {
      position: relative; display: flex; align-items: center; justify-content: center;
      padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; background: #ffffff;
      cursor: pointer; font-weight: 600; font-size: 0.9rem; color: #64748b; transition: 0.2s; text-align: center;
    }
    .status-box input[type="radio"] { position: absolute; opacity: 0; }
    
    /* Warna Status Jika Terpilih */
    .status-box input[type="radio"]:checked + span { color: white; }
    .status-box:has(input[value="Aman"]:checked) { background: #10b981; border-color: #10b981; }
    .status-box:has(input[value="Bersih"]:checked) { background: #10b981; border-color: #10b981; }
    .status-box:has(input[value="Kurang Kondusif"]:checked) { background: #f59e0b; border-color: #f59e0b; }
    .status-box:has(input[value="Kotor/Berantakan"]:checked) { background: #ef4444; border-color: #ef4444; }

    /* Responsif HP Kecil */
    @media (max-width: 480px) {
      .cahaya-card { padding: 20px 15px; }
      .header-page h2 { font-size: 1.5rem; }
      .status-box { font-size: 0.8rem; padding: 10px 5px; }
    }
    
    #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--navy-dark); font-family: 'Playfair Display', serif; font-size: 1.2rem; transition: 0.5s; display: none;}
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div style="font-size: 2.5rem; margin-bottom: 15px; animation: float 1.5s infinite alternate ease-in-out;">⏳</div>
  <div style="font-weight: 700;" id="loadingText">Menyimpan Laporan...</div>
</div>

<main class="cahaya-container" style="max-width: 700px; margin: 0 auto; padding-top: 20px;">
  
  <div class="header-page">
    <div style="font-size: 2.5rem;">📝</div>
    <div>
      <h2>Jurnal Piket Naqib</h2>
      <p style="margin:0; font-size:0.85rem; color:var(--text-muted);">Form Laporan Kondisi Asrama Harian</p>
    </div>
  </div>

  <div class="cahaya-card">
    <form id="formPiket" onsubmit="simpanJurnal(event)">
      
      <div class="form-group">
        <label>🗓️ Tanggal Piket</label>
        <input type="date" id="tglPiket" class="form-control" required />
      </div>

      <div class="form-group">
        <label>🏢 Area / Asrama yang Dipantau</label>
        <select id="areaAsrama" class="form-control" required>
          <option value="">-- Pilih Area Asrama --</option>
          <option value="Asrama Putra (Bawah)">Asrama Putra (Bawah)</option>
          <option value="Asrama Putra (Atas)">Asrama Putra (Atas)</option>
          <option value="Asrama Putri (Utama)">Asrama Putri (Utama)</option>
          <option value="Area Masjid & Halaman">Area Masjid & Lingkungan</option>
        </select>
      </div>

      <div class="form-group">
        <label>🛡️ Status Keamanan & Ketertiban</label>
        <div class="status-grid">
          <label class="status-box">
            <input type="radio" name="statusKeamanan" value="Aman" required>
            <span>Aman & Terkendali</span>
          </label>
          <label class="status-box">
            <input type="radio" name="statusKeamanan" value="Kurang Kondusif">
            <span>Ada Kendala/Keributan</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>🧹 Status Kebersihan Ruangan</label>
        <div class="status-grid">
          <label class="status-box">
            <input type="radio" name="statusKebersihan" value="Bersih" required>
            <span>Bersih & Rapi</span>
          </label>
          <label class="status-box">
            <input type="radio" name="statusKebersihan" value="Kotor/Berantakan">
            <span>Kotor / Berantakan</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>📋 Uraian Laporan Kejadian / Catatan Khusus</label>
        <textarea id="catatanPiket" class="form-control" placeholder="Tuliskan catatan kejadian penting, fasilitas rusak, atau kondisi santri hari ini..." required></textarea>
      </div>

      <button type="submit" class="btn-cahaya btn-gold" id="btnSimpan" style="width: 100%; margin-top: 15px; padding: 15px; font-size: 1.05rem;">
        💾 KIRIM LAPORAN PIKET
      </button>

    </form>
  </div>

</main>

<!-- SCRIPT FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // Inisialisasi Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyB0Eza852WuQL2R8U-yHpVnM3o8NMxZolI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };
  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  const db = firebase.database();

  // Set Tanggal Otomatis Hari Ini
  document.getElementById('tglPiket').value = new Date().toISOString().split('T')[0];

  // Identitas Naqib dari Sesi Login
  const currentUser = JSON.parse(localStorage.getItem('cahayaCurrentUser') || '{}');
  const namaNaqib = currentUser.label || currentUser.username || "Naqib Piket";

  // Fungsi Simpan ke Firebase
  async function simpanJurnal(e) {
    e.preventDefault();

    const btn = document.getElementById('btnSimpan');
    const loading = document.getElementById('loadingOverlay');

    const tgl = document.getElementById('tglPiket').value;
    const asrama = document.getElementById('areaAsrama').value;
    const keamanan = document.querySelector('input[name="statusKeamanan"]:checked').value;
    const kebersihan = document.querySelector('input[name="statusKebersihan"]:checked').value;
    const catatan = document.getElementById('catatanPiket').value.trim();

    loading.style.display = 'flex';
    btn.disabled = true;

    const payload = {
      tanggal: tgl,
      waktuSimpan: new Date().toISOString(),
      naqib: namaNaqib,
      areaAsrama: asrama,
      statusKeamanan: keamanan,
      statusKebersihan: kebersihan,
      catatanKejadian: catatan
    };

    try {
      // Simpan ke node jurnal_piket_naqib
      await db.ref('cahaya_app/jurnal_piket_naqib').push(payload);
      
      alert("✅ Laporan Piket berhasil dikirim dan tersimpan di database!");
      
      // Reset Form (kecuali tanggal)
      document.getElementById('formPiket').reset();
      document.getElementById('tglPiket').value = new Date().toISOString().split('T')[0];

    } catch (error) {
      alert("❌ Gagal mengirim laporan: " + error.message);
    } finally {
      loading.style.display = 'none';
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
