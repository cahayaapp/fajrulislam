<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CAHAYA APP – Absensi Naqib</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="stylesheet" href="../../css/cahaya-theme.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* =========================================================
       CSS ISOLASI KHUSUS HALAMAN ABSENSI (ANTI BERANTAKAN)
       ========================================================= */
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; margin: 0; padding: 0;}
    
    .cahaya-card {
      background: #ffffff; border-radius: 16px; padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0;
      margin-bottom: 30px;
    }
    
    .cahaya-title { font-family: 'Playfair Display', serif; color: #0f172a; margin-top: 0; font-size: 1.8rem; }

    /* Layout Form Grid */
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
    
    .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #334155; margin-bottom: 8px; }
    .form-control { 
      width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 10px; 
      font-family: 'Poppins', sans-serif; font-size: 0.95rem; outline: none; background: #f8fafc; transition: 0.3s;
    }
    .form-control:focus { background: #ffffff; border-color: #d4af37; box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }

    /* Header Tabel */
    .table-header-flex { 
      display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 15px;
      margin-top: 25px; margin-bottom: 15px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px; 
    }
    .btn-mark-all { 
      background: #ecfdf5; color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); 
      padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 700; 
      cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 5px; font-family: 'Poppins';
    }
    .btn-mark-all:hover { background: #10b981; color: white; box-shadow: 0 4px 10px rgba(16,185,129,0.2); }

    /* Desain Tabel Premium (Dibuat Fleksibel) */
    .table-responsive { width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
    .cahaya-table { width: 100%; border-collapse: collapse; background: white; table-layout: auto; }
    
    .cahaya-table th { 
      background: #f1f5f9; padding: 15px 10px; font-size: 0.85rem; color: #475569; 
      text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #e2e8f0; text-align: center;
    }
    .cahaya-table th:first-child { text-align: left; padding-left: 20px; }
    
    .cahaya-table td { padding: 12px 5px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; text-align: center; }
    
    /* PERBAIKAN: Force Uppercase untuk kolom nama di CSS */
    .cahaya-table td:first-child { 
        text-align: left; 
        padding-left: 20px; 
        font-weight: 600; 
        color: #0f172a; 
        font-size: 0.9rem; 
        text-transform: uppercase; 
        line-height: 1.3;
    }
    .cahaya-table tr:last-child td { border-bottom: none; }

    /* Custom Radio Button Absen */
    .radio-label { display: inline-block; cursor: pointer; user-select: none; margin: 0; }
    .radio-label input { display: none; }
    .radio-circle { 
      display: inline-flex; justify-content: center; align-items: center; 
      width: 32px; height: 32px; border-radius: 50%; background: #f8fafc; 
      border: 1px solid #cbd5e1; color: #94a3b8; font-weight: 800; font-size: 0.85rem; transition: 0.2s; 
    }
    
    .radio-label input[value="Hadir"]:checked + .radio-circle { background: #10b981; color: white; border-color: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.3); transform: scale(1.1); }
    .radio-label input[value="Terlambat"]:checked + .radio-circle { background: #f59e0b; color: white; border-color: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.3); transform: scale(1.1); }
    .radio-label input[value="Izin"]:checked + .radio-circle { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.3); transform: scale(1.1); }
    .radio-label input[value="Sakit"]:checked + .radio-circle { background: #8b5cf6; color: white; border-color: #8b5cf6; box-shadow: 0 0 8px rgba(139,92,246,0.3); transform: scale(1.1); }
    .radio-label input[value="Alfa"]:checked + .radio-circle { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.3); transform: scale(1.1); }

    /* Warna Background Baris Tabel */
    tr.status-hadir { background: #ecfdf5 !important; border-left: 4px solid #10b981; }
    tr.status-terlambat { background: #fffbeb !important; border-left: 4px solid #f59e0b; }
    tr.status-izin { background: #eff6ff !important; border-left: 4px solid #3b82f6; }
    tr.status-sakit { background: #f5f3ff !important; border-left: 4px solid #8b5cf6; }
    tr.status-alfa { background: #fef2f2 !important; border-left: 4px solid #ef4444; }

    /* Tombol Simpan */
    .btn-simpan {
      background: linear-gradient(135deg, #d4af37, #fde047); color: #0f172a;
      border: none; padding: 15px 30px; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; width: 100%; transition: 0.3s; margin-top: 25px; box-shadow: 0 10px 20px rgba(212,175,55,0.2);
      font-family: 'Poppins'; letter-spacing: 1px;
    }
    .btn-simpan:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(212,175,55,0.4); }
    .btn-simpan:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    /* Loader Custom */
    #loadingOverlay { 
      position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); 
      z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
      color: #0f172a; font-family: 'Playfair Display', serif; font-size: 1.2rem; transition: 0.5s; 
    }

    @media (max-width: 768px) {
      .cahaya-card { padding: 15px; border-radius: 12px;}
      .cahaya-title { font-size: 1.4rem; margin-bottom: 15px;}
      .table-header-flex { flex-direction: column; align-items: flex-start; gap: 10px; margin-top: 15px; }
      .btn-mark-all { width: 100%; justify-content: center; padding: 12px; }
      .table-responsive { border: none; overflow: visible; }
      .cahaya-table th { padding: 10px 2px; font-size: 0.7rem; letter-spacing: 0; }
      .cahaya-table td { padding: 8px 2px; }
      .cahaya-table th:first-child, .cahaya-table td:first-child { padding-left: 8px; font-size: 0.75rem; word-break: break-word; }
      .radio-circle { width: 26px; height: 26px; font-size: 0.75rem; border-width: 1px; }
      .radio-label input[value="Hadir"]:checked + .radio-circle,
      .radio-label input[value="Terlambat"]:checked + .radio-circle,
      .radio-label input[value="Izin"]:checked + .radio-circle,
      .radio-label input[value="Sakit"]:checked + .radio-circle,
      .radio-label input[value="Alfa"]:checked + .radio-circle {
        transform: scale(1.05); 
      }
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div style="font-size: 2.5rem; margin-bottom: 15px; animation: pulse 1.5s infinite alternate ease-in-out;">📋</div>
  <div style="font-weight: 700;">Menyiapkan Data Program...</div>
</div>

<main class="cahaya-container" style="padding: 15px;">
  <div class="cahaya-card">
    <h2 class="cahaya-title">📋 Absensi Program Naqib</h2>

    <div id="adminPanel" style="display: none; background: #fffbeb; border: 1px solid #fef08a; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
      <div class="form-group" style="margin-bottom:0;">
        <label style="color: #d97706;">👑 Super User: Pilih Usrah / Asrama</label>
        <select class="form-control" id="selectUsrahGlobal" onchange="gantiUsrah()" style="background: white; border-color: #fde68a; font-weight: 600;"></select>
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>📅 Tanggal Pelaksanaan</label>
        <input type="date" class="form-control" id="tanggal">
      </div>

      <div class="form-group">
        <label>🕋 Program / Kegiatan</label>
        <select class="form-control" id="program" onchange="updateInfoPoin()">
          <option value="">-- Pilih Program --</option>
        </select>
        <small id="infoPoin" style="color: #d4af37; font-weight: 700; display: block; margin-top: 8px; font-size: 0.8rem;"></small>
      </div>
    </div>

    <div class="table-header-flex">
      <h3 style="font-family:'Playfair Display'; font-size:1.2rem; color:#0f172a; font-weight:800; margin:0;">
        Daftar Santri <span id="labelUsrah" style="color: #d4af37; font-weight: 700; font-family: 'Poppins'; font-size: 0.9rem; margin-left: 5px;"></span>
      </h3>
      <button class="btn-mark-all" onclick="markAll()">✓ Set Semua Hadir</button>
    </div>

    <div class="table-responsive">
      <table class="cahaya-table" id="tabelSantri">
        <thead>
          <tr>
            <th width="35%">Nama</th>
            <th title="Hadir" width="13%">H</th>
            <th title="Terlambat" width="13%">T</th>
            <th title="Izin" width="13%">I</th>
            <th title="Sakit" width="13%">S</th>
            <th title="Alfa" width="13%">A</th>
          </tr>
        </thead>
        <tbody>
          </tbody>
      </table>
    </div>

    <button class="btn-simpan" id="btnSimpanAbsen" onclick="simpan()">💾 SIMPAN LOG ABSENSI</button>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVnM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const user = JSON.parse(localStorage.getItem('cahayaCurrentUser') || '{}');
  const hakAkses = user.akses || []; 
  const isSuperUser = hakAkses.includes('admin') || hakAkses.includes('direktur') || hakAkses.includes('supervisor');

  let namaNaqibLokal = localStorage.getItem('namaNaqib');
  if(!namaNaqibLokal) {
      namaNaqibLokal = user.username || user.label || "Naqib";
      namaNaqibLokal = namaNaqibLokal.replace(/^Mu'?allim(ah)?\s+|^Naqib(ah)?\s+|^Mrs\s+/i, "").trim();
      namaNaqibLokal = namaNaqibLokal.charAt(0).toUpperCase() + namaNaqibLokal.slice(1).toLowerCase();
  }

  let usrahAktif = namaNaqibLokal;
  let daftarSantriAktif = [];
  let dataUsrahCloud = {}; 
  
  let masterPoinProgram = {};

  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
    
    try {
      const [snapUsrah, snapProgram] = await Promise.all([
         get(ref(db, 'cahaya_app/master_usrah')),
         get(ref(db, 'cahaya_app/master_program_harian'))
      ]);

      if (snapUsrah.exists()) {
        dataUsrahCloud = snapUsrah.val();
      }

      const selectProgram = document.getElementById('program');
      if (snapProgram.exists()) {
          const programData = snapProgram.val();
          for(let key in programData) {
            let val = programData[key];
            if(typeof val === 'object') {
                const group = document.createElement('optgroup');
                group.label = key;
                for(let namaProg in val) {
                    const poin = val[namaProg];
                    masterPoinProgram[namaProg] = poin;
                    group.appendChild(new Option(`${namaProg} (+${poin})`, namaProg));
                }
                selectProgram.appendChild(group);
            } else {
                masterPoinProgram[key] = val;
                selectProgram.appendChild(new Option(`${key} (+${val})`, key));
            }
          }
      }

    } catch (error) {
      console.error(error);
    }

    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
    
    if (isSuperUser) {
      document.getElementById('adminPanel').style.display = 'block';
      const selectUsrah = document.getElementById('selectUsrahGlobal');
      Object.keys(dataUsrahCloud).sort().forEach(namaUsrah => {
        selectUsrah.add(new Option(`Usrah ${namaUsrah}`, namaUsrah));
      });
      if(dataUsrahCloud[usrahAktif]) {
          selectUsrah.value = usrahAktif;
      } else {
          usrahAktif = selectUsrah.options[0]?.value || "";
      }
    }

    renderTabelSantri();

    document.querySelector('#tabelSantri tbody').addEventListener('change', (e) => {
      if (e.target.type === 'radio') {
        const tr = e.target.closest('tr');
        tr.className = 'status-' + e.target.value.toLowerCase();
      }
    });
  });

  window.gantiUsrah = function() {
    usrahAktif = document.getElementById('selectUsrahGlobal').value;
    renderTabelSantri();
  };

  window.updateInfoPoin = function() {
      const prog = document.getElementById('program').value;
      const info = document.getElementById('infoPoin');
      if(prog && masterPoinProgram[prog]) {
          info.textContent = `Poin Program: +${masterPoinProgram[prog]} Poin / Hadir`;
      } else {
          info.textContent = "";
      }
  };

  function renderTabelSantri() {
    document.getElementById('labelUsrah').textContent = `(Usrah ${usrahAktif})`;
    daftarSantriAktif = dataUsrahCloud[usrahAktif] || [];
    const tbody = document.querySelector('#tabelSantri tbody');
    
    if(daftarSantriAktif.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#ef4444;padding:40px;">Data santri kosong untuk Usrah ${usrahAktif}.</td></tr>`;
      return;
    }

    // PERBAIKAN: Gunakan .toUpperCase() agar sinkron dengan klasemen
    tbody.innerHTML = daftarSantriAktif.map((nama, i) => `
      <tr class="status-hadir">
        <td>${nama.toUpperCase()}</td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Hadir" checked><span class="radio-circle">H</span></label></td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Terlambat"><span class="radio-circle">T</span></label></td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Izin"><span class="radio-circle">I</span></label></td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Sakit"><span class="radio-circle">S</span></label></td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Alfa"><span class="radio-circle">A</span></label></td>
      </tr>
    `).join('');
  }

  window.markAll = function() {
    document.querySelectorAll('input[value="Hadir"]').forEach(r => {
        r.checked = true;
        r.dispatchEvent(new Event('change', { bubbles: true })); 
    });
  };

  window.simpan = function() {
    const tanggal = document.getElementById('tanggal').value;
    const program = document.getElementById('program').value;
    
    if(!tanggal || !program) {
        alert("⚠️ Mohon lengkapi Tanggal dan Program Kegiatan terlebih dahulu.");
        return;
    }

    let poinDasar = masterPoinProgram[program] || 20;
    const dataAbsen = [];

    daftarSantriAktif.forEach((nama, i) => {
      const status = document.querySelector(`input[name="s_${i}"]:checked`)?.value || 'Hadir';
      let poinFinal = 0;
      
      if (status === 'Hadir') poinFinal = poinDasar;
      else if (status === 'Terlambat') poinFinal = -(poinDasar * 0.5);
      else if (status === 'Alfa') poinFinal = -poinDasar;
      
      // PERBAIKAN: Simpan nama dengan format UPPERCASE ke database agar dibaca klasemen
      dataAbsen.push({ nama: nama.toUpperCase().trim(), status, poin: poinFinal });
    });

    const penginput = isSuperUser ? `${user.label || user.username || 'Admin'} (Mewakili ${usrahAktif})` : (user.label || user.username || 'Naqib');

    const log = {
      tanggal, program, 
      usrah: usrahAktif, 
      naqibPenginput: penginput,
      data: dataAbsen, 
      waktu: new Date().toISOString()
    };

    const btn = document.getElementById('btnSimpanAbsen');
    btn.innerHTML = "⏳ MENYIMPAN DATA..."; btn.disabled = true;

    push(ref(db, 'cahaya_app/absensi_program_harian'), log)
      .then(() => {
          alert(`✅ BERHASIL!\nAbsensi program "${program}" untuk Usrah ${usrahAktif} telah tersimpan.`);
          btn.innerHTML = "💾 SIMPAN LOG ABSENSI"; btn.disabled = false;
      })
      .catch(e => {
          alert("Gagal menyimpan: " + e.message);
          btn.innerHTML = "💾 SIMPAN LOG ABSENSI"; btn.disabled = false;
      });
  };
</script>

</body>
</html>
