  <title>CAHAYA APP - Ujian Triwulan Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ======== LUXURY THEME ======== */
    :root {
      --primary-dark: #020617;
      --primary-blue: #0f172a;
      --accent-gold: #d4af37;
      --accent-gold-light: #fef08a;
      --glass-bg: rgba(15, 23, 42, 0.65);
      --glass-border: rgba(212, 175, 55, 0.2);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --shadow-premium: 0 15px 35px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: 
        radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 50%),
        radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.05), transparent 50%),
        linear-gradient(135deg, var(--primary-dark), var(--primary-blue), #1e293b);
      color: var(--text-main);
      padding-bottom: 80px;
    }

    /* Texture Background */
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23d4af37' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
      pointer-events: none; z-index: -1;
    }

    /* ======== HEADER ======== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--accent-gold); letter-spacing: 1px; }
    .btn-back {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-main); padding: 8px 18px; border-radius: 50px;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.3s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-gold); transform: translateY(-2px); }

    main { padding: 30px 20px; max-width: 1100px; margin: auto; animation: fadeInUp 0.6s ease backwards; }
    @keyframes fadeInUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ======== GLASS CARD ======== */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 30px;
      box-shadow: var(--shadow-premium);
    }
    
    .card-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
    .card-header h3 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--text-main); margin-bottom: 8px; }
    .card-header p { color: var(--accent-gold); font-size: 0.95rem; font-weight: 300; letter-spacing: 0.5px; }

    /* ======== FORM GRID ======== */
    .form-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;
    }
    .input-group { display: flex; flex-direction: column; }
    .input-group label { font-size: 0.8rem; color: var(--accent-gold-light); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .input-group select, .input-group input {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-main); padding: 12px 16px; border-radius: 12px;
      font-size: 0.95rem; font-family: 'Poppins', sans-serif; outline: none; transition: 0.3s;
    }
    .input-group select:focus, .input-group input:focus { border-color: var(--accent-gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); background: rgba(0,0,0,0.6); }
    .input-group select option { background: var(--primary-dark); color: white; }
    
    /* Styling khusus untuk input yang dikunci (readonly/disabled) */
    .input-group select:disabled {
      background: rgba(255,255,255,0.05);
      color: var(--accent-gold);
      border-color: rgba(212, 175, 55, 0.3);
      cursor: not-allowed;
      font-weight: 600;
    }

    /* Divider untuk form */
    .form-divider {
      grid-column: 1 / -1; height: 1px; background: rgba(255,255,255,0.05); margin: 10px 0;
    }

    /* ======== TABLE PREMIUM ======== */
    .table-wrapper {
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; margin-top: 10px;
    }
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    th { background: rgba(255,255,255,0.03); color: var(--accent-gold-light); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; padding: 16px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); white-space: nowrap; }
    td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    
    .santri-name { font-weight: 600; font-size: 1rem; color: var(--text-main); }
    
    /* Input di dalam tabel */
    td input[type="number"] {
      width: 100%; max-width: 90px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
      color: var(--accent-gold); font-size: 1.1rem; font-weight: 700; text-align: center;
      padding: 10px; border-radius: 8px; outline: none; transition: 0.3s; margin: auto; display: block;
    }
    td input[type="number"]:focus { border-color: var(--accent-gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    .nilai-total { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--text-main); font-size: 1.4rem; text-align: center; }

    /* ======== BOTTOM ACTION ======== */
    .action-container { margin-top: 30px; display: flex; justify-content: flex-end; }
    .btn-save {
      background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
      color: #000; border: none; padding: 14px 35px; border-radius: 50px;
      font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4); display: flex; align-items: center; gap: 10px;
    }
    .btn-save:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5); }

    @media (max-width: 768px) {
      .card { padding: 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .action-container { justify-content: center; }
      .btn-save { width: 100%; justify-content: center; }
    }
  </style>
</head>

<header>

<main>
  <div class="card">
    <div class="card-header">

    <div class="form-grid">
      <div class="input-group">
        <label>Tahun Akademik</label>
        <select id="tahunAkademik" disabled>
          </select>
      </div>

      <div class="input-group">
        <label>Semester</label>
        <select id="semester" disabled>
          </select>
      </div>

      <div class="input-group">
        <label>Triwulan</label>
        <select id="triwulan" disabled>
          </select>
      </div>

      <div class="form-divider"></div>

      <div class="input-group">
        <label>Kategori Halqah</label>
        <select id="kategoriHalqah" onchange="updateKelas()">
          <option value="">-- Pilih Kategori --</option>
          <option value="Halqah Ilmiyah">Halqah Ilmiyah</option>
          <option value="Halqah Lughowiyah">Halqah Lughowiyah</option>
          <option value="Halqah Quraniyah">Halqah Quraniyah</option>
        </select>
      </div>

      <div class="input-group">
        <label>Kelas / Kelompok</label>
        <select id="kelasKelompok" onchange="loadSantri()">
          <option value="">-- Pilih Kelas/Kelompok --</option>
        </select>
      </div>

      <div class="input-group">
        <label>Mata Pelajaran</label>
        <select id="mapel">
          <option value="">-- Pilih Mapel --</option>
        </select>
      </div>

      <div class="input-group">
        <label>Penguji / Guru</label>
        <select id="guruPenguji">
          <option value="">-- Pilih Guru --</option>
        </select>
      </div>

      <div class="input-group" style="grid-column: 1 / -1;">
        <label>Materi yang Diujikan</label>
        <input type="text" id="materiUjian" placeholder="Contoh: Bab Thaharah / Bab Fa'il / Hafalan Juz 30">
      </div>

      <div class="input-group">
        <label>Tanggal Ujian</label>
        <input type="date" id="tanggalUjian">
      </div>
    </div>

    <div class="table-wrapper">
      <div class="table-container">
        <table id="tabelNilaiSantri">
          <thead>
            <tr>
              <th style="width: 50px; text-align: center;">No</th>
              <th>Nama Santri</th>
              <th style="text-align: center; width: 140px;">Syafawi (70%)</th>
              <th style="text-align: center; width: 140px;">Tahriri (30%)</th>
              <th style="text-align: center; width: 140px;">Total Akhir</th>
            </tr>
          </thead>
          <tbody id="nilaiSantriBody">

          </tbody>
        </table>
      </div>
    </div>

    <div class="action-container">
      <button class="btn-save" onclick="simpanNilaiTriwulan()">
        <span>💾 Simpan Nilai</span>
      </button>
    </div>
  </div>
</main>

  // Set Tanggal Hari Ini secara otomatis
  const today = new Date();
  document.getElementById('tanggalUjian').valueAsDate = today;

  // ======================
  // LOGIKA AUTO SET TAHUN AKADEMIK, SEMESTER & TRIWULAN
  // ======================
  function autoSetAkademik() {
    const year = today.getFullYear();
    const month = today.getMonth() + 1; // 1-12

    let tahunAkademik = "";
    let semester = "";
    let triwulan = "";

    // Mulai Tahun Ajaran baru di Juli
    if (month >= 7) {
      tahunAkademik = `${year}/${year + 1}`;
      semester = "Ganjil";
      if (month >= 7 && month <= 9) triwulan = "1";
      else if (month >= 10 && month <= 12) triwulan = "2";
    } else {
      tahunAkademik = `${year - 1}/${year}`;
      semester = "Genap";
      if (month >= 1 && month <= 3) triwulan = "3";
      else if (month >= 4 && month <= 6) triwulan = "4";
    }

    // Mengisi pilihan drop-down secara otomatis & memilih nilainya
    const selTahun = document.getElementById('tahunAkademik');
    selTahun.innerHTML = `<option value="${tahunAkademik}" selected>${tahunAkademik}</option>`;

    const selSemester = document.getElementById('semester');
    selSemester.innerHTML = `<option value="${semester}" selected>${semester}</option>`;

    const selTriwulan = document.getElementById('triwulan');
    selTriwulan.innerHTML = `<option value="${triwulan}" selected>Triwulan ${triwulan}</option>`;
  }

  // Load Mapel & Guru & Data Akademik saat halaman dibuka
  window.onload = function() {
    autoSetAkademik(); // Memanggil fungsi auto set

    const selMapel = document.getElementById('mapel');
    dataMapel.forEach(m => {
      let opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      selMapel.appendChild(opt);
    });

    const selGuru = document.getElementById('guruPenguji');
    dataGuru.forEach(g => {
      let opt = document.createElement('option');
      opt.value = g; opt.textContent = g;
      selGuru.appendChild(opt);
    });
  };

  /* === Update Pilihan Kelas Berdasarkan Kategori Halqah === */
  window.updateKelas = function() {
    const kategori = document.getElementById('kategoriHalqah').value;
    const kelasSelect = document.getElementById('kelasKelompok');
    kelasSelect.innerHTML = '<option value="">-- Pilih Kelas/Kelompok --</option>';
    document.getElementById('nilaiSantriBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:40px;font-style:italic;">Silakan lengkapi form di atas untuk memuat daftar santri.</td></tr>';

    if(kategori && dataSantri[kategori]) {
      const kelompokList = Object.keys(dataSantri[kategori]);
      kelompokList.forEach(k => {
        let opt = document.createElement('option');
        opt.value = k; opt.textContent = k;
        kelasSelect.appendChild(opt);
      });
    }
  };

  /* === Load Daftar Santri ke Tabel === */
  window.loadSantri = function() {
    const kategori = document.getElementById('kategoriHalqah').value;
    const kelas = document.getElementById('kelasKelompok').value;
    const tbody = document.getElementById('nilaiSantriBody');
    tbody.innerHTML = '';

    if(!kategori || !kelas) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:40px;font-style:italic;">Silakan lengkapi form di atas untuk memuat daftar santri.</td></tr>';
      return;
    }

    const listSantri = dataSantri[kategori][kelas] || [];
    
    if(listSantri.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#ef4444;padding:40px;">Tidak ada data santri di kelas ini.</td></tr>';
      return;
    }

    listSantri.forEach((nama, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align: center; color: var(--text-muted);">${i+1}</td>
        <td class="santri-name">${nama}</td>
        <td><input type="number" min="0" max="100" class="input-syafawi" oninput="hitungSatuBaris(this)" data-nama="${nama}" placeholder="0"></td>
        <td><input type="number" min="0" max="100" class="input-tahriri" oninput="hitungSatuBaris(this)" placeholder="0"></td>
        <td class="nilai-total">0.0</td>
      `;
      tbody.appendChild(tr);
    });
  };

  /* === Fungsi Hitung Total Otomatis per Baris === */
  window.hitungSatuBaris = function(element) {
    const tr = element.closest('tr');
    let syafawi = parseFloat(tr.querySelector('.input-syafawi').value) || 0;
    let tahriri = parseFloat(tr.querySelector('.input-tahriri').value) || 0;

    // Batasi nilai max 100
    if(syafawi > 100) { syafawi = 100; tr.querySelector('.input-syafawi').value = 100; }
    if(tahriri > 100) { tahriri = 100; tr.querySelector('.input-tahriri').value = 100; }

    const total = (syafawi * 0.70) + (tahriri * 0.30);
    tr.querySelector('.nilai-total').innerText = total.toFixed(1);
  };

  /* === Simpan Data ke Firebase === */
  window.simpanNilaiTriwulan = async function() {
    const btnSave = document.querySelector('.btn-save');
    
    // Validasi Kolom Baru
    const tahunAkademik = document.getElementById('tahunAkademik').value;
    const semester = document.getElementById('semester').value;
    const triwulan = document.getElementById('triwulan').value;
    
    const kategori = document.getElementById('kategoriHalqah').value;
    const kelas = document.getElementById('kelasKelompok').value;
    const mapel = document.getElementById('mapel').value;
    const guru = document.getElementById('guruPenguji').value;
    const materi = document.getElementById('materiUjian').value.trim();
    const tanggal = document.getElementById('tanggalUjian').value;

    if(!tahunAkademik || !semester || !triwulan || !kategori || !kelas || !mapel || !guru || !materi || !tanggal) {
      alert("⚠️ Harap lengkapi semua data form (Kategori, Kelas, Mapel, Penguji, Materi) sebelum menyimpan.");
      return;
    }

    const barisSantri = document.querySelectorAll('#nilaiSantriBody tr');
    // Cek apakah tabel kosong
    if(barisSantri.length === 1 && barisSantri[0].cells.length === 1) return;

    btnSave.innerHTML = `<span>⏳ Menyimpan...</span>`;
    btnSave.disabled = true;

    const nilaiRef = ref(db, 'cahaya_app/nilai_ujian_triwulan');
    
    try {
      // 1. AMBIL SEMUA DATA LAMA DULU
      const snapshot = await get(nilaiRef);
      const dataLama = snapshot.exists() ? snapshot.val() : {};
      
      let count = 0;
      let promises = [];

      for(let tr of barisSantri) {
        const nama = tr.querySelector('.input-syafawi').getAttribute('data-nama');
        const syafawiStr = tr.querySelector('.input-syafawi').value;
        const tahririStr = tr.querySelector('.input-tahriri').value;
        
        const syafawi = parseFloat(syafawiStr) || 0;
        const tahriri = parseFloat(tahririStr) || 0;
        const total = parseFloat(tr.querySelector('.nilai-total').innerText) || 0;

        // Hanya proses jika ada nilai yang diinput di salah satu kotak
        if(syafawiStr !== "" || tahririStr !== "") {
          
          // 2. CEK & HAPUS JIKA ADA DATA DUPLIKAT SEBELUMNYA
          for (let key in dataLama) {
            let n = dataLama[key];
            if (n.nama_santri === nama && 
                n.tahun_akademik === tahunAkademik && 
                n.semester === semester && 
                n.triwulan === triwulan && 
                n.mata_pelajaran === mapel) {
                  // Hapus data lama
                  promises.push(remove(ref(db, `cahaya_app/nilai_ujian_triwulan/${key}`)));
            }
          }

          // 3. SIAPKAN DATA BARU UNTUK DISIMPAN
          const dataUjian = {
            tahun_akademik: tahunAkademik, 
            semester: semester,            
            triwulan: triwulan,            
            nama_santri: nama,
            kategori_halqah: kategori,
            kelas_kelompok: kelas,
            mata_pelajaran: mapel,
            materi_ujian: materi,
            guru_penguji: guru,
            tanggal_ujian: tanggal,
            nilai_syafawi: syafawi,
            nilai_tahriri: tahriri,
            nilai_total: total,
            timestamp: new Date().toISOString()
          };
          promises.push(push(nilaiRef, dataUjian));
          count++;
        }
      }

      // Tunggu semua proses hapus dan simpan selesai
      await Promise.all(promises);

      if(count > 0) {
        alert(`✅ Alhamdulillah, ${count} data nilai santri berhasil disimpan!`);
        // Reset form agar tabel bersih lagi
        document.getElementById('materiUjian').value = "";
        document.getElementById('kategoriHalqah').value = "";
        updateKelas(); 
      } else {
        alert("⚠️ Tidak ada nilai yang diinput. Silakan isi minimal satu nilai santri.");
      }
    } catch(error) {
      alert("Terjadi kesalahan saat menyimpan: " + error.message);
    } finally {
      btnSave.innerHTML = `<span>💾 Simpan Nilai</span>`;
      btnSave.disabled = false;
    }
  };
</script>
