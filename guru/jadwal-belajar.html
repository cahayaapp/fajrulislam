<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CAHAYA APP - Manajemen Jadwal Belajar</title>
  
  <!-- PANGGIL MASTER THEME CAHAYA -->
  <link rel="stylesheet" href="../css/cahaya-theme.css" />
  
  <style>
    .header-jadwal {
      background: linear-gradient(135deg, var(--navy-dark), #312e81);
      padding: 30px 40px; border-radius: var(--radius-lg); color: white;
      margin-bottom: 25px; box-shadow: 0 15px 30px rgba(15, 23, 42, 0.15);
      position: relative; overflow: hidden;
    }
    .header-jadwal::after {
      content: '📅'; position: absolute; right: 20px; top: -10px;
      font-size: 8rem; opacity: 0.1; pointer-events: none;
    }
    .header-jadwal h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold-light); margin-bottom: 5px; }

    /* Modal Form Dasar */
    .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; padding: 20px; z-index: 2000; animation: fadeIn 0.3s ease; }
    .modal-content { background: white; width: 100%; max-width: 700px; border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; max-height: 90vh; }
    .modal-header { padding: 20px 25px; border-bottom: 1px solid var(--input-border); background: #f8fafc; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-family: 'Playfair Display', serif; color: var(--navy-dark); font-size: 1.3rem; margin: 0; }
    .modal-body { padding: 25px; overflow-y: auto; flex: 1; }

    .hari-badge { background: var(--navy-light); color: white; padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
    .jam-badge { background: #fef08a; color: #b45309; padding: 4px 8px; border-radius: 4px; font-weight: 700; font-size: 0.8rem; border: 1px solid #fde047; }
    
    .action-group { display: flex; gap: 8px; justify-content: center; }
    .btn-icon { width: 32px; height: 32px; border-radius: 8px; border: none; display: inline-flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; font-size: 1rem; }
    .btn-edit { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .btn-edit:hover { background: #2563eb; color: white; }
    .btn-del { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
    .btn-del:hover { background: #ef4444; color: white; }

    /* TAB HARI */
    .day-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; }
    .day-tab-btn { background: #f1f5f9; border: 1px solid #cbd5e1; color: #64748b; padding: 8px 16px; border-radius: 8px 8px 0 0; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; white-space: nowrap; border-bottom: none; }
    .day-tab-btn:hover { background: #e2e8f0; color: var(--navy-dark); }
    .day-tab-btn.active { background: var(--navy-dark); color: white; border-color: var(--navy-dark); }

    #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--navy-dark); font-family: 'Playfair Display', serif; font-size: 1.2rem; transition: 0.5s; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div style="font-size: 2.5rem; margin-bottom: 15px; animation: float 1.5s infinite alternate ease-in-out;">📅</div>
  <div style="font-weight: 700;">Memuat Data Master Akademik...</div>
</div>

<main class="cahaya-container">
  <div class="header-jadwal">
    <h1>Jadwal Belajar Mengajar</h1>
    <p>Atur jadwal pelajaran, plot guru pengajar, dan susun waktu KBM harian.</p>
  </div>

  <!-- BAGIAN FORM TAMBAH JADWAL BARU -->
  <div class="cahaya-card" style="margin-bottom: 25px;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
      <h2 class="cahaya-title" style="margin-bottom: 0;">➕ Buat Jadwal Baru</h2>
      
      <!-- TOMBOL SAKTI: MENGHAPUS DATA LAMA & MENYUNTIK DATA BARU -->
      <button class="btn-cahaya" style="background: #10b981; color: white; border: none; padding: 8px 15px; font-size: 0.85rem;" id="btnInjectDB" onclick="jalankanInjeksiSyncDB()">💉 Hapus Jadwal Lama & Sinkronkan Ulang</button>
    </div>
    
    <div class="grid-2">
      <div class="form-group">
        <label>📚 Rumpun / Kategori Kelas</label>
        <select class="form-control" id="jdRumpun" onchange="updatePilihanKelas('baru')">
          <option value="">-- Pilih Rumpun --</option>
        </select>
      </div>
      <div class="form-group">
        <label>🏫 Nama Kelas</label>
        <select class="form-control" id="jdKelas">
          <option value="">-- Pilih Kelas --</option>
        </select>
      </div>

      <div class="form-group">
        <label>🗓️ Hari Pelaksanaan</label>
        <select class="form-control" id="jdHari">
          <option value="">-- Pilih Hari --</option>
          <option value="Senin">Senin</option><option value="Selasa">Selasa</option>
          <option value="Rabu">Rabu</option><option value="Kamis">Kamis</option>
          <option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option><option value="Ahad">Ahad</option>
        </select>
      </div>
      <div class="form-group">
        <label>⏰ Waktu (Mulai - Selesai)</label>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input type="time" class="form-control" id="jdJamMulai" style="margin-bottom: 0;">
          <span style="font-weight: bold; color: var(--text-muted);">-</span>
          <input type="time" class="form-control" id="jdJamSelesai" style="margin-bottom: 0;">
        </div>
      </div>

      <div class="form-group">
        <label>📝 Mata Pelajaran</label>
        <select class="form-control" id="jdMapel" style="font-weight: bold; color: var(--navy-dark);">
          <option value="">-- Pilih Mapel --</option>
        </select>
      </div>
      <div class="form-group">
        <label>👨‍🏫 Guru Pengajar</label>
        <select class="form-control" id="jdGuru" style="font-weight: bold; color: var(--navy-dark);">
          <option value="">-- Pilih Guru --</option>
        </select>
      </div>
    </div>

    <button class="btn-cahaya btn-gold" id="btnSimpanBaru" style="margin-top: 15px;" onclick="simpanJadwal()">💾 TAMBAHKAN KE JADWAL</button>
  </div>

  <!-- BAGIAN TAMPILAN JADWAL -->
  <div class="cahaya-card">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; flex-wrap: wrap; gap: 15px;">
      <h3 style="color: var(--navy-dark); margin: 0;">📋 Daftar Jadwal Aktif</h3>
      <div style="display: flex; gap: 10px; align-items: center;">
        <label style="margin:0; font-size:0.85rem; font-weight:700;">Filter Kelas:</label>
        <select class="form-control" id="filterKelasTabel" style="margin-bottom: 0; min-width: 200px;" onchange="renderTabelJadwal()">
          <option value="ALL">Semua Kelas</option>
        </select>
      </div>
    </div>

    <!-- FILTER TABS HARI -->
    <div class="day-tabs">
      <button class="day-tab-btn active" onclick="filterHari('ALL', this)">Semua Hari</button>
      <button class="day-tab-btn" onclick="filterHari('Senin', this)">Senin</button>
      <button class="day-tab-btn" onclick="filterHari('Selasa', this)">Selasa</button>
      <button class="day-tab-btn" onclick="filterHari('Rabu', this)">Rabu</button>
      <button class="day-tab-btn" onclick="filterHari('Kamis', this)">Kamis</button>
      <button class="day-tab-btn" onclick="filterHari('Jumat', this)">Jumat</button>
    </div>

    <div class="table-responsive">
      <table class="cahaya-table">
        <thead>
          <tr>
            <th width="10%" style="text-align:center;">Hari</th>
            <th width="15%" style="text-align:center;">Jam KBM</th>
            <th width="20%">Kelas</th>
            <th width="25%">Mata Pelajaran</th>
            <th width="20%">Guru</th>
            <th width="10%" style="text-align: center;">Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelJadwal">
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- MODAL EDIT JADWAL -->
<div id="modalEdit" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>✏️ Edit Jadwal Belajar</h3>
      <button style="background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="tutupModal()">✕</button>
    </div>
    <div class="modal-body">
      
      <input type="hidden" id="editId">
      
      <div class="grid-2">
        <div class="form-group">
          <label>📚 Rumpun Kelas</label>
          <select class="form-control" id="editRumpun" onchange="updatePilihanKelas('edit')">
            <option value="">-- Pilih Rumpun --</option>
          </select>
        </div>
        <div class="form-group">
          <label>🏫 Kelas</label>
          <select class="form-control" id="editKelas" style="font-weight: bold; background: #f8fafc;">
            <option value="">-- Pilih Kelas --</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>🗓️ Hari Pelaksanaan</label>
          <select class="form-control" id="editHari">
            <option value="Senin">Senin</option><option value="Selasa">Selasa</option>
            <option value="Rabu">Rabu</option><option value="Kamis">Kamis</option>
            <option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option><option value="Ahad">Ahad</option>
          </select>
        </div>
        <div class="form-group">
          <label>⏰ Waktu (Mulai - Selesai)</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <input type="time" class="form-control" id="editJamMulai" style="margin-bottom: 0;">
            <span style="font-weight: bold;">-</span>
            <input type="time" class="form-control" id="editJamSelesai" style="margin-bottom: 0;">
          </div>
        </div>
        
        <div class="form-group">
          <label>📝 Mata Pelajaran</label>
          <select class="form-control" id="editMapel" style="font-weight: bold; color: var(--navy-dark);"></select>
        </div>
        <div class="form-group">
          <label>👨‍🏫 Guru Pengajar</label>
          <select class="form-control" id="editGuru" style="font-weight: bold; color: var(--navy-dark);"></select>
        </div>
      </div>

      <button class="btn-cahaya btn-gold" id="btnUpdateJadwal" style="margin-top: 15px; width: 100%;" onclick="updateJadwal()">💾 SIMPAN PERUBAHAN JADWAL</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, get, push, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVmM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const firestoreDb = getFirestore(app);
  
  let masterDataAkademik = {};
  let semuaJadwal = [];
  let filterHariAktif = 'ALL'; 

  document.addEventListener('DOMContentLoaded', async () => {
    await muatMasterData();
    await muatDaftarJadwal();
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
  });

  // ==========================================
  // 1. MUAT DATA MASTER DARI DATABASE
  // ==========================================
  async function muatMasterData() {
    try {
      const snapshot = await get(ref(db, 'cahaya_app/master_akademik'));
      masterDataAkademik = snapshot.val() || {};

      // 1A. RUMPUN & KELAS
      const dataHalqah = masterDataAkademik.halqah || {};
      const elJdRumpun = document.getElementById('jdRumpun');
      const elEditRumpun = document.getElementById('editRumpun');
      const filterKelasTabel = document.getElementById('filterKelasTabel');
      
      Object.keys(dataHalqah).sort().forEach(r => {
          elJdRumpun.add(new Option(r, r));
          elEditRumpun.add(new Option(r, r));
          Object.keys(dataHalqah[r]).sort().forEach(k => filterKelasTabel.add(new Option(k, k)));
      });

      // 1B. MATA PELAJARAN
      const dataMapel = masterDataAkademik.mapel || {};
      let listMapel = [];
      Object.values(dataMapel).forEach(val => {
          if (Array.isArray(val)) listMapel.push(...val);
          else if (typeof val === 'object') {
              if(val.namaMapel) listMapel.push(val.namaMapel);
              else listMapel.push(...Object.values(val));
          } else listMapel.push(val);
      });
      listMapel = [...new Set(listMapel.map(m => typeof m === 'object' ? m.namaMapel || m.nama : m))].filter(Boolean).sort((a,b) => a.localeCompare(b));

      const elJdMapel = document.getElementById('jdMapel');
      const elEditMapel = document.getElementById('editMapel');
      listMapel.forEach(m => {
          elJdMapel.add(new Option(m, m));
          elEditMapel.add(new Option(m, m));
      });

      // 1C. GURU
      let listGuru = [];
      if(masterDataAkademik.guru) {
          let g = masterDataAkademik.guru;
          if(Array.isArray(g)) listGuru.push(...g);
          else if(typeof g === 'object') {
              Object.values(g).forEach(v => listGuru.push(v.namaGuru || v.nama || v));
          }
      }
      try {
          const usersSnap = await getDocs(collection(firestoreDb, "users"));
          usersSnap.forEach(doc => {
              const u = doc.data();
              if (u.akses && u.akses.includes("guru")) listGuru.push(u.label || u.username);
          });
      } catch(e) { }

      listGuru = [...new Set(listGuru)].filter(g => g && typeof g === 'string').sort((a,b) => a.localeCompare(b));

      const elJdGuru = document.getElementById('jdGuru');
      const elEditGuru = document.getElementById('editGuru');
      listGuru.forEach(g => {
          elJdGuru.add(new Option(g, g));
          elEditGuru.add(new Option(g, g));
      });

    } catch (e) { console.error("Gagal muat master data:", e); }
  }

  window.updatePilihanKelas = function(tipe) {
    const rumpunId = tipe === 'edit' ? 'editRumpun' : 'jdRumpun';
    const kelasId = tipe === 'edit' ? 'editKelas' : 'jdKelas';
    const rumpun = document.getElementById(rumpunId).value;
    const selKelas = document.getElementById(kelasId);
    selKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>';
    if (!rumpun) return;

    const dataHalqah = masterDataAkademik.halqah || {};
    if (dataHalqah[rumpun]) {
      Object.keys(dataHalqah[rumpun]).sort().forEach(k => selKelas.add(new Option(k, k)));
    }
  };

  // ==========================================
  // 3. SIMPAN JADWAL BARU MANUAL
  // ==========================================
  window.simpanJadwal = async function() {
    const rumpun = document.getElementById('jdRumpun').value;
    const kelas = document.getElementById('jdKelas').value;
    const hari = document.getElementById('jdHari').value;
    const jamMulai = document.getElementById('jdJamMulai').value;
    const jamSelesai = document.getElementById('jdJamSelesai').value;
    const mapel = document.getElementById('jdMapel').value;
    const guru = document.getElementById('jdGuru').value;

    if(!rumpun || !kelas || !hari || !jamMulai || !jamSelesai || !mapel || !guru) {
        return alert("⚠️ Lengkapi semua dropdown: Rumpun, Kelas, Hari, Jam, Mapel, dan Guru!");
    }

    const btn = document.getElementById('btnSimpanBaru');
    btn.disabled = true; btn.innerHTML = "⏳ MENYIMPAN...";

    const payload = { rumpun, kelas, hari, jamMulai, jamSelesai, mapel, guru, waktuUpdate: new Date().toISOString() };

    try {
        await push(ref(db, 'cahaya_app/jadwal_pelajaran'), payload);
        alert("✅ Jadwal berhasil ditambahkan!");
        document.getElementById('jdJamMulai').value = '';
        document.getElementById('jdJamSelesai').value = '';
        await muatDaftarJadwal();
    } catch(e) { alert("Gagal menyimpan: " + e.message); } 
    finally { btn.disabled = false; btn.innerHTML = "💾 TAMBAHKAN KE JADWAL"; }
  };

  // ==========================================
  // 4. FILTER HARI & RENDER TABEL
  // ==========================================
  window.filterHari = function(hari, btnElement) {
    document.querySelectorAll('.day-tab-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
    filterHariAktif = hari;
    renderTabelJadwal();
  };

  async function muatDaftarJadwal() {
    try {
        const snap = await get(ref(db, 'cahaya_app/jadwal_pelajaran'));
        const data = snap.val() || {};
        semuaJadwal = [];
        for(let key in data) { semuaJadwal.push({ ...data[key], id: key }); }
        renderTabelJadwal();
    } catch(e) { console.error("Gagal menarik jadwal", e); }
  }

  window.renderTabelJadwal = function() {
    const filterKelas = document.getElementById('filterKelasTabel').value;
    const tbody = document.getElementById('tabelJadwal');

    let filtered = semuaJadwal;
    if(filterKelas !== 'ALL') filtered = filtered.filter(j => j.kelas === filterKelas);
    if(filterHariAktif !== 'ALL') filtered = filtered.filter(j => j.hari === filterHariAktif);

    if(filtered.length === 0) {
        return tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-muted); font-style:italic;">Tidak ada jadwal di hari / kelas ini.</td></tr>`;
    }

    const urutanHari = { "Senin": 1, "Selasa": 2, "Rabu": 3, "Kamis": 4, "Jumat": 5, "Sabtu": 6, "Ahad": 7 };
    filtered.sort((a, b) => {
        if (urutanHari[a.hari] !== urutanHari[b.hari]) return urutanHari[a.hari] - urutanHari[b.hari];
        return a.jamMulai.localeCompare(b.jamMulai);
    });

    tbody.innerHTML = filtered.map(j => {
        return `<tr>
          <td style="text-align:center;"><span class="hari-badge">${j.hari}</span></td>
          <td style="text-align:center;"><span class="jam-badge">${j.jamMulai} - ${j.jamSelesai}</span></td>
          <td><b style="color:var(--navy-dark);">${j.kelas}</b></td>
          <td style="font-weight:700;">${j.mapel}</td>
          <td style="font-size:0.85rem; font-weight:600; color:#0f172a;">👨‍🏫 ${j.guru}</td>
          <td style="text-align:center;">
            <div class="action-group">
              <button class="btn-icon btn-edit" title="Edit Jadwal" onclick="bukaModalEdit('${j.id}')">✏️</button>
              <button class="btn-icon btn-del" title="Hapus Jadwal" onclick="hapusJadwal('${j.id}')">🗑️</button>
            </div>
          </td>
        </tr>`;
    }).join('');
  };

  // ==========================================
  // 5. FITUR EDIT & HAPUS
  // ==========================================
  window.bukaModalEdit = function(id) {
      const j = semuaJadwal.find(x => x.id === id);
      if(!j) return;

      document.getElementById('editId').value = j.id;
      
      const elRumpun = document.getElementById('editRumpun');
      elRumpun.value = j.rumpun || '';
      updatePilihanKelas('edit'); 

      document.getElementById('editKelas').value = j.kelas || '';
      document.getElementById('editHari').value = j.hari || '';
      document.getElementById('editJamMulai').value = j.jamMulai || '';
      document.getElementById('editJamSelesai').value = j.jamSelesai || '';
      document.getElementById('editMapel').value = j.mapel || '';
      document.getElementById('editGuru').value = j.guru || '';
      
      document.getElementById('modalEdit').style.display = 'flex';
  }

  window.tutupModal = function() {
      document.getElementById('modalEdit').style.display = 'none';
  }

  window.updateJadwal = async function() {
      const id = document.getElementById('editId').value;
      const payload = {
          rumpun: document.getElementById('editRumpun').value,
          kelas: document.getElementById('editKelas').value,
          hari: document.getElementById('editHari').value,
          jamMulai: document.getElementById('editJamMulai').value,
          jamSelesai: document.getElementById('editJamSelesai').value,
          mapel: document.getElementById('editMapel').value,
          guru: document.getElementById('editGuru').value,
          waktuUpdate: new Date().toISOString()
      };

      if(!payload.kelas || !payload.jamMulai || !payload.guru || !payload.mapel) return alert("Pilih opsi dari dropdown yang tersedia!");

      const btn = document.getElementById('btnUpdateJadwal');
      btn.disabled = true; btn.innerHTML = "⏳ MENYIMPAN...";

      try {
          await update(ref(db, `cahaya_app/jadwal_pelajaran/${id}`), payload);
          alert("✅ Jadwal berhasil diperbarui!");
          tutupModal(); await muatDaftarJadwal();
      } catch(e) { alert("Gagal update jadwal: " + e.message); } 
      finally { btn.disabled = false; btn.innerHTML = "💾 SIMPAN PERUBAHAN JADWAL"; }
  }

  window.hapusJadwal = async function(id) {
      if(confirm("Apakah Anda yakin ingin menghapus jadwal ini?")) {
          try {
              await remove(ref(db, `cahaya_app/jadwal_pelajaran/${id}`));
              await muatDaftarJadwal();
          } catch(e) { alert("Gagal menghapus: " + e.message); }
      }
  }

  // ==========================================
  // 6. INJEKSI MASSAL SUPER AKURAT (HAPUS LAMA + SUNTIK BARU)
  // ==========================================
  window.jalankanInjeksiSyncDB = async function() {
      if(!confirm("⚠️ PERINGATAN: Tindakan ini akan MENGHAPUS SEMUA JADWAL LAMA dan menggantinya secara utuh dengan jadwal baru sesuai Master Database. Anda yakin?")) return;

      const btn = document.getElementById('btnInjectDB');
      btn.disabled = true; btn.innerHTML = "⏳ MENGHAPUS & MENYUNTIK...";
      
      try {
