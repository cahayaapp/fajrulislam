<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CAHAYA APP - Sistem Evaluasi Pendidikan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <!-- PANGGIL MASTER THEME CAHAYA -->
  <link rel="stylesheet" href="../css/cahaya-theme.css" />
  
  <style>
    /* CSS Khusus Layout Tabel & Input */
    .input-angka {
      width: 70px; background: var(--bg-pearl); border: 1.5px solid var(--input-border);
      color: var(--navy-dark); font-size: 1rem; font-weight: 700; text-align: center;
      padding: 10px; border-radius: 12px; outline: none; transition: 0.3s; margin: auto; display: block;
    }
    .input-angka:focus { border-color: var(--gold-main); background: #fff; box-shadow: 0 4px 10px rgba(212,175,55,0.1); }
    
    .nilai-total { 
      font-weight: 800; color: var(--gold-dark); font-size: 1.15rem; text-align: center; 
    }
    
    .panel-komponen {
      grid-column: 1 / -1; 
      padding: 20px; 
      background: rgba(212,175,55,0.05); 
      border: 1px dashed var(--gold-main); 
      border-radius: 12px;
      margin-top: 10px;
    }

    .checkbox-item {
      display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--navy-dark);
    }
    
    .checkbox-item input[type="number"] {
      width: 60px; padding: 6px; font-size: 0.9rem; margin: 0; border-radius: 8px;
    }

    /* Loader Custom */
    #loadingOverlay { 
      position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); 
      z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
      color: var(--navy-dark); font-family: 'Playfair Display', serif; font-size: 1.2rem; transition: 0.5s; 
    }

    @media (max-width: 768px) {
      .input-angka { width: 55px; padding: 8px; font-size: 0.9rem; }
      .nilai-total { font-size: 1rem; }
      .panel-komponen { padding: 15px; }
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div style="font-size: 2.5rem; margin-bottom: 15px; animation: float 1s infinite alternate ease-in-out;">📚</div>
  <div style="font-weight: 700;">Menyiapkan Lembar Ujian...</div>
</div>

<main class="cahaya-container">
  <div class="cahaya-card">
    <div style="text-align: center; margin-bottom: 30px;">
      <h3 style="font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:800; color:var(--navy-dark); line-height:1.2;">Input Nilai Ujian Bulanan</h3>
      <p style="color:var(--gold-dark); font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-top:5px;" id="headerSubtitle">Pembobotan Dinamis</p>
    </div>

    <!-- MENGGUNAKAN GRID MASTER THEME -->
    <div class="grid-2">
      <div class="form-group">
        <label>Tahun Akademik</label>
        <select class="form-control" id="tahunAkademik"></select>
      </div>

      <div class="form-group">
        <label>Semester</label>
        <select class="form-control" id="semester">
          <option value="Ganjil">Ganjil</option>
          <option value="Genap">Genap</option>
        </select>
      </div>

      <div class="form-group">
        <label>Periode <span style="font-size:0.7rem; font-weight:normal; color:var(--text-muted);">(Masuk ke Raport Bulan)</span></label>
        <select class="form-control" id="bulanUjian" style="font-weight: 700; color: var(--navy-dark); border-color: var(--gold-main);">
          <option value="Januari">Januari</option>
          <option value="Februari">Februari</option>
          <option value="Maret">Maret</option>
          <option value="April">April</option>
          <option value="Mei">Mei</option>
          <option value="Juni">Juni</option>
          <option value="Juli">Juli</option>
          <option value="Agustus">Agustus</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="Desember">Desember</option>
        </select>
      </div>

      <div class="form-group">
        <label>Kategori Halqah</label>
        <select class="form-control" id="kategoriHalqah" onchange="updateKelas()">
          <option value="">-- Pilih Kategori --</option>
          <option value="Halqah Ilmiyah">Halqah Ilmiyah</option>
          <option value="Halqah Lughowiyah">Halqah Lughowiyah</option>
          <option value="Halqah Quraniyah">Halqah Quraniyah</option>
        </select>
      </div>

      <div class="form-group">
        <label>Kelas / Kelompok</label>
        <select class="form-control" id="kelasKelompok" onchange="loadSantri()">
          <option value="">-- Pilih Kelas --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Mata Pelajaran</label>
        <select class="form-control" id="mapel">
          <option value="">-- Pilih Mapel --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Penguji / Guru</label>
        <select class="form-control" id="guruPenguji">
          <option value="">-- Pilih Guru --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Tanggal Input (Real-time)</label>
        <input type="date" class="form-control" id="tanggalUjian">
      </div>
      
      <!-- Input yang mengisi full grid -->
      <div class="form-group" style="grid-column: 1 / -1;">
        <label>Materi Ujian Evaluasi</label>
        <input type="text" class="form-control" id="materiUjian" placeholder="Contoh: Bab Thaharah / Setoran Hafalan Juz 30">
      </div>

      <!-- PANEL KOMPONEN PENILAIAN -->
      <div class="panel-komponen">
        <label style="display: block; margin-bottom: 15px; font-size: 1.1rem; color: var(--navy-dark);">Pengaturan Komponen & Bobot Penilaian</label>
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
          <label class="checkbox-item">
            <input type="checkbox" id="chk_syafawi" value="Syafawi" checked onchange="refreshStrukturTabel()"> Syafawi 
            <input type="number" id="bobot_syafawi" value="60" class="input-angka" oninput="refreshStrukturTabel()"> %
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="chk_tahriri" value="Tahriri" checked onchange="refreshStrukturTabel()"> Tahriri 
            <input type="number" id="bobot_tahriri" value="15" class="input-angka" oninput="refreshStrukturTabel()"> %
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="chk_tashnif" value="Tashnif" checked onchange="refreshStrukturTabel()"> Tashnif 
            <input type="number" id="bobot_tashnif" value="25" class="input-angka" oninput="refreshStrukturTabel()"> %
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="chk_tathbiqi" value="Tathbiqi" onchange="refreshStrukturTabel()"> Tathbiqi 
            <input type="number" id="bobot_tathbiqi" value="0" class="input-angka" oninput="refreshStrukturTabel()"> %
          </label>
        </div>
        <div id="infoBobot" style="margin-top: 15px; font-size: 0.95rem; font-weight: bold; background: #fff; padding: 10px; border-radius: 8px; display: inline-block;">
          Total Bobot: 100%
        </div>
      </div>
    </div>

    <!-- TABEL RESPONSIVE -->
    <div class="table-responsive" style="margin-top: 25px;">
      <table class="cahaya-table" id="tabelEvaluasi">
        <thead>
          <tr id="tableHeaderRow">
            <!-- Di-generate otomatis lewat JavaScript -->
          </tr>
        </thead>
        <tbody id="nilaiSantriBody">
          <tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:40px;font-style:italic;">Pilih Kategori & Kelas terlebih dahulu.</td></tr>
        </tbody>
      </table>
    </div>

    <button class="btn-cahaya btn-gold" id="btnSimpan" style="margin-top: 30px;" onclick="simpanNilaiBulanan()">💾 SIMPAN NILAI KE SERVER</button>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVmM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let masterDataAkademik = {};

  function initPageData() {
    const today = new Date();
    document.getElementById('tanggalUjian').valueAsDate = today;

    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth(); 
    const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

    const tahunAkad = (currentMonth >= 6) ? `${currentYear}/${currentYear + 1}` : `${currentYear - 1}/${currentYear}`;
    const selTahun = document.getElementById('tahunAkademik');
    selTahun.innerHTML = `<option value="${tahunAkad}">${tahunAkad}</option><option value="${currentYear - 1}/${currentYear}">${currentYear - 1}/${currentYear}</option>`;

    document.getElementById('semester').value = (currentMonth >= 6) ? "Ganjil" : "Genap";
    document.getElementById('bulanUjian').value = months[currentMonth];
  }

  document.addEventListener('DOMContentLoaded', async () => {
    initPageData();
    refreshStrukturTabel(); // Render awal header tabel

    try {
      const snapshot = await get(ref(db, 'cahaya_app/master_akademik'));
      if (snapshot.exists()) {
        masterDataAkademik = snapshot.val();
        
        const selGuru = document.getElementById('guruPenguji');
        (masterDataAkademik.guru || []).forEach(g => { selGuru.add(new Option(g, g)); });

        const selMapel = document.getElementById('mapel');
        (masterDataAkademik.mapel || []).forEach(m => { selMapel.add(new Option(m, m)); });
      } else {
        alert("⚠️ Data Master Kelas/Guru kosong.");
      }
    } catch (error) {
      console.error("Gagal koneksi: ", error);
    }

    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
  });

  // --- LOGIKA KOMPONEN DINAMIS ---
  window.getKomponenAktif = function() {
    const list = [
      { id: 'syafawi', nama: 'Syafawi', isChecked: document.getElementById('chk_syafawi').checked, bobot: parseFloat(document.getElementById('bobot_syafawi').value) || 0 },
      { id: 'tahriri', nama: 'Tahriri', isChecked: document.getElementById('chk_tahriri').checked, bobot: parseFloat(document.getElementById('bobot_tahriri').value) || 0 },
      { id: 'tashnif', nama: 'Tashnif', isChecked: document.getElementById('chk_tashnif').checked, bobot: parseFloat(document.getElementById('bobot_tashnif').value) || 0 },
      { id: 'tathbiqi', nama: 'Tathbiqi', isChecked: document.getElementById('chk_tathbiqi').checked, bobot: parseFloat(document.getElementById('bobot_tathbiqi').value) || 0 }
    ];
    return list.filter(k => k.isChecked);
  };

  window.refreshStrukturTabel = function() {
    const aktif = getKomponenAktif();
    let totalBobot = aktif.reduce((sum, k) => sum + k.bobot, 0);
    
    // Update Indikator Validasi
    const infoBox = document.getElementById('infoBobot');
    const btnSimpan = document.getElementById('btnSimpan');
    const subtitle = document.getElementById('headerSubtitle');
    
    infoBox.innerText = `Total Bobot: ${totalBobot}%`;
    let subtitleText = aktif.map(k => `${k.nama} ${k.bobot}%`).join(' | ');
    subtitle.innerText = subtitleText || "Pilih komponen penilaian";

    if(totalBobot === 100) {
      infoBox.style.color = "var(--gold-dark)";
      infoBox.style.border = "1px solid var(--gold-main)";
      btnSimpan.disabled = false;
      btnSimpan.style.opacity = "1";
    } else {
      infoBox.style.color = "#ef4444";
      infoBox.style.border = "1px solid #ef4444";
      btnSimpan.disabled = true;
      btnSimpan.style.opacity = "0.5";
      infoBox.innerText += " (Harus genap 100%!)";
    }

    // Render Header Tabel
    const trHeader = document.getElementById('tableHeaderRow');
    let htmlHeader = `
      <th style="width: 50px; text-align: center;">No</th>
      <th>Nama Santri</th>
    `;
    aktif.forEach(k => {
      htmlHeader += `<th style="text-align: center;">${k.nama} (${k.bobot}%)</th>`;
    });
    htmlHeader += `<th style="text-align: center;">Total</th>`;
    trHeader.innerHTML = htmlHeader;

    // Render ulang baris santri agar input formnya menyesuaikan dengan kolom
    if(document.getElementById('kelasKelompok').value !== "") {
      loadSantri();
    }
  };

  // --- LOGIKA FILTER & SANTRI ---
  window.updateKelas = function() {
    const kategori = document.getElementById('kategoriHalqah').value;
    const kelasSelect = document.getElementById('kelasKelompok');
    kelasSelect.innerHTML = '<option value="">-- Pilih Kelas --</option>';
    
    const dataHalqah = masterDataAkademik.halqah || {};
    if(kategori && dataHalqah[kategori]) {
      Object.keys(dataHalqah[kategori]).forEach(k => { kelasSelect.add(new Option(k, k)); });
    }
  };

  window.loadSantri = function() {
    const kategori = document.getElementById('kategoriHalqah').value;
    const kelas = document.getElementById('kelasKelompok').value;
    const tbody = document.getElementById('nilaiSantriBody');
    tbody.innerHTML = '';

    if(!kategori || !kelas) return;

    const listSantri = (masterDataAkademik.halqah[kategori]?.[kelas] || []).slice().sort();
    if (listSantri.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#ef4444;font-weight:bold;padding:40px;">Data santri kosong.</td></tr>';
        return;
    }

    const aktif = getKomponenAktif();
    
    listSantri.forEach((nama, i) => {
      const tr = document.createElement('tr');
      tr.setAttribute('data-nama', nama);
      
      let htmlRow = `
        <td style="text-align: center; color: var(--text-muted); font-weight: 700;">${i+1}</td>
        <td style="font-weight: 600; color: var(--navy-dark);">${nama}</td>
      `;
      
      // Generate kolom input dinamis sesuai komponen yang aktif
      aktif.forEach(k => {
        htmlRow += `<td><input type="number" min="0" max="100" class="input-angka input-dinamis" data-id="${k.id}" data-bobot="${k.bobot}" oninput="hitungTotal(this)" placeholder="0"></td>`;
      });
      
      htmlRow += `<td class="nilai-total">0</td>`;
      tr.innerHTML = htmlRow;
      tbody.appendChild(tr);
    });
  };

  window.hitungTotal = function(el) {
    const tr = el.closest('tr');
    let total = 0;
    
    // Cari semua input dinamis di baris ini dan kalkulasi berdasarkan atribut data-bobot
    const inputs = tr.querySelectorAll('.input-dinamis');
    inputs.forEach(inp => {
      const nilai = parseFloat(inp.value) || 0;
      const bobot = parseFloat(inp.getAttribute('data-bobot')) || 0;
      total += nilai * (bobot / 100);
    });
    
    tr.querySelector('.nilai-total').innerText = total.toFixed(1);
  };

  window.simpanNilaiBulanan = async function() {
    const btn = document.getElementById('btnSimpan');
    const aktif = getKomponenAktif();
    const totalBobot = aktif.reduce((sum, k) => sum + k.bobot, 0);

    if(totalBobot !== 100) {
      alert("⚠️ Total persentase bobot belum 100%. Silakan sesuaikan terlebih dahulu.");
      return;
    }

    const params = {
      tahun: document.getElementById('tahunAkademik').value,
      semester: document.getElementById('semester').value,
      bulan: document.getElementById('bulanUjian').value, // Ini sekarang adalah "Periode"
      kategori: document.getElementById('kategoriHalqah').value,
      kelas: document.getElementById('kelasKelompok').value,
      mapel: document.getElementById('mapel').value,
      guru: document.getElementById('guruPenguji').value,
      materi: document.getElementById('materiUjian').value.trim(),
      tanggal: document.getElementById('tanggalUjian').value // Tanggal input asli/real-time
    };

    if(!params.kategori || !params.kelas || !params.mapel || !params.guru || !params.materi) {
      alert("⚠️ Harap lengkapi semua filter kelas, guru, dan tuliskan materi evaluasi.");
      return;
    }

    const rows = document.querySelectorAll('#nilaiSantriBody tr');
    if(rows.length === 0 || rows[0].cells.length === 1) return;

    btn.innerHTML = "⏳ MENYIMPAN KE CLOUD...";
    btn.disabled = true;

    try {
      const snapshot = await get(ref(db, 'cahaya_app/nilai_ujian_bulanan'));
      const oldData = snapshot.val() || {};
      let count = 0;

      for(let tr of rows) {
        const nama = tr.getAttribute('data-nama');
        const inputs = tr.querySelectorAll('.input-dinamis');
        
        // Cek apakah ada nilai yang diinput di baris ini
        let hasInput = Array.from(inputs).some(inp => inp.value !== "");
        
        if(hasInput && nama) {
          // Anti-Duplikat
          for (let key in oldData) {
            let n = oldData[key];
            if (n.nama_santri === nama && n.tahun_akademik === params.tahun && n.bulan === params.bulan && n.mata_pelajaran === params.mapel) {
              await remove(ref(db, `cahaya_app/nilai_ujian_bulanan/${key}`));
            }
          }

          // Rangkai payload dinamis
          const dataFinal = {
            tahun_akademik: params.tahun, 
            semester: params.semester, 
            bulan: params.bulan,            
            nama_santri: nama, 
            kategori_halqah: params.kategori,
            kelas_kelompok: params.kelas, 
            mata_pelajaran: params.mapel,
            materi_ujian: params.materi, 
            guru_penguji: params.guru,
            tanggal_ujian: params.tanggal, // Tetap tersimpan sebagai audit trail kapan diinput
            nilai_total: parseFloat(tr.querySelector('.nilai-total').innerText),
            timestamp: new Date().toISOString()
          };

          // Masukkan nilai per-komponen yang diceklis
          aktif.forEach(k => {
             const valField = tr.querySelector(`.input-dinamis[data-id="${k.id}"]`);
             dataFinal[`nilai_${k.id}`] = valField ? (parseFloat(valField.value) || 0) : 0;
             // Opsional: simpan metadata bobot jika dibutuhkan untuk audit history di database
             dataFinal[`bobot_${k.id}_persen`] = k.bobot; 
          });

          await push(ref(db, 'cahaya_app/nilai_ujian_bulanan'), dataFinal);
          count++;
        }
      }

      alert(`✅ Berhasil! ${count} data evaluasi santri telah diunggah.`);
      location.reload();
    } catch(e) {
      alert("Gagal: " + e.message);
    } finally {
      btn.innerHTML = "💾 SIMPAN NILAI KE SERVER";
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
