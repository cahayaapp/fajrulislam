<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Edit Halaqah - Cahaya App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-dark: #0f172a;
      --navy-light: #1e293b;
      --gold-main: #d4af37;
      --gold-dark: #b49126;
      --bg-pearl: #f8fafc;
      --input-border: #e2e8f0;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background-color: transparent; color: var(--navy-dark); padding: 10px; }
    main { max-width: 1000px; margin: 0 auto; animation: fadeIn 0.6s ease-out backwards; }
    @keyframes fadeIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .card { background: #ffffff; border: 1px solid var(--input-border); border-radius: 24px; padding: 35px 40px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.03); position: relative; }
    .card::before { content: ''; position: absolute; top: 0; left: 5%; right: 5%; height: 3px; background: linear-gradient(90deg, transparent, var(--gold-main), transparent); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 30px; }

    .form-group { margin-bottom: 25px; }
    label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    select, input[type="text"] { width: 100%; padding: 14px 20px; border-radius: 14px; border: 1px solid var(--input-border); background: #f8fafc; font-family: inherit; font-size: 1rem; font-weight: 600; transition: all 0.3s; outline: none; }
    select:focus, input[type="text"]:focus { border-color: var(--gold-main); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }

    /* TAMBAH SANTRI AREA */
    .add-santri-box { background: #f1f5f9; padding: 20px; border-radius: 18px; margin-bottom: 30px; border: 1px dashed var(--gold-main); display: flex; gap: 10px; align-items: flex-end; }
    .add-santri-box .form-group { margin-bottom: 0; flex: 1; }
    .btn-add { background: var(--gold-main); color: white; border: none; padding: 14px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-add:hover { background: var(--gold-dark); }

    /* TRANSFER BOX */
    .transfer-box { display: flex; gap: 20px; margin-top: 20px; align-items: stretch; }
    .list-wrapper { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .list-container { border: 2px solid var(--input-border); border-radius: 18px; height: 400px; overflow-y: auto; background: #f1f5f9; padding: 12px; }

    .santri-item { background: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
    .santri-name { cursor: pointer; flex: 1; }
    .santri-name:hover { color: var(--gold-main); transform: translateX(5px); transition: 0.2s; }
    
    .btn-delete { color: #ef4444; cursor: pointer; padding: 5px; opacity: 0.3; transition: 0.3s; font-size: 1.1rem; }
    .btn-delete:hover { opacity: 1; transform: scale(1.2); }

    .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
    .btn { padding: 18px; border-radius: 16px; border: none; font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-save { background: linear-gradient(135deg, var(--navy-light), var(--navy-dark)); color: white; box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15); }
    .btn-save:hover { transform: translateY(-3px); filter: brightness(1.2); }
    .btn-download { background: #ffffff; color: var(--navy-dark); border: 2px solid var(--navy-dark); }

    @media (max-width: 768px) { .transfer-box { flex-direction: column; } .add-santri-box { flex-direction: column; align-items: stretch; } .action-area { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<main>
  <div class="card">
    <h2 class="card-title">⚙️ Manajemen Anggota Halaqah</h2>

    <!-- PILIH RUMPUN -->
    <div class="form-group">
      <label>1. Pilih Rumpun Kelas</label>
      <select id="selRumpun" onchange="loadDaftarKelas()">
        <option value="">-- Pilih Rumpun --</option>
        <option value="Halqah Ilmiyah">Halqah Ilmiyah</option>
        <option value="Halqah Lughowiyah">Halqah Lughowiyah</option>
        <option value="Halqah Quraniyah">Halqah Quraniyah</option>
      </select>
    </div>

    <!-- TAMBAH SANTRI BARU -->
    <div class="add-santri-box">
      <div class="form-group">
        <label>Tambah Santri Baru ke Kelas Asal</label>
        <input type="text" id="namaBaru" placeholder="Masukkan nama lengkap santri...">
      </div>
      <button class="btn-add" onclick="tambahSantri()">➕ Tambah</button>
    </div>

    <div class="transfer-box">
      <div class="list-wrapper">
        <label>Kelas Asal</label>
        <select id="selAsal" onchange="renderSantri('Asal')"><option value="">-- Pilih Kelas --</option></select>
        <div class="list-container" id="boxAsal"></div>
      </div>

      <div class="list-wrapper">
        <label>Kelas Tujuan</label>
        <select id="selTujuan" onchange="renderSantri('Tujuan')"><option value="">-- Pilih Kelas --</option></select>
        <div class="list-container" id="boxTujuan"></div>
      </div>
    </div>

    <div class="action-area">
      <button class="btn btn-save" onclick="simpanKeBrowser()">💾 TERAPKAN PERUBAHAN</button>
      <button class="btn btn-download" onclick="exportDataJS()">📥 DOWNLOAD BACKUP JS</button>
    </div>
  </div>
</main>

<script src="../js/data-pusat.js"></script>

<script>
  function loadDaftarKelas() {
    const rumpun = document.getElementById('selRumpun').value;
    const asal = document.getElementById('selAsal');
    const tujuan = document.getElementById('selTujuan');
    asal.innerHTML = tujuan.innerHTML = '<option value="">-- Pilih Kelas --</option>';
    document.getElementById('boxAsal').innerHTML = '';
    document.getElementById('boxTujuan').innerHTML = '';
    if (!rumpun) return;
    const daftarKelas = Object.keys(window.dataSantri[rumpun] || {});
    daftarKelas.forEach(namaKelas => {
      asal.innerHTML += `<option value="${namaKelas}">${namaKelas}</option>`;
      tujuan.innerHTML += `<option value="${namaKelas}">${namaKelas}</option>`;
    });
  }

  function renderSantri(posisi) {
    const rumpun = document.getElementById('selRumpun').value;
    const namaKelas = document.getElementById('sel' + posisi).value;
    const wadah = document.getElementById('box' + posisi);
    wadah.innerHTML = '';
    if (!rumpun || !namaKelas) return;
    const list = window.dataSantri[rumpun][namaKelas] || [];
    list.sort().forEach(nama => {
      const item = document.createElement('div');
      item.className = 'santri-item';
      item.innerHTML = `
        <span class="santri-name" onclick="pindahkan('${nama}', '${posisi}')">${nama}</span>
        <span class="btn-delete" onclick="hapusSantri('${nama}', '${posisi}')" title="Hapus dari kelas">🗑️</span>
      `;
      wadah.appendChild(item);
    });
  }

  function pindahkan(nama, dariMana) {
    const rumpun = document.getElementById('selRumpun').value;
    const kAsal = document.getElementById('selAsal').value;
    const kTujuan = document.getElementById('selTujuan').value;
    if (!kAsal || !kTujuan) return alert("Pilih Kelas Asal dan Tujuan dulu!");
    if (kAsal === kTujuan) return alert("Klik nama untuk memindahkan ke kotak seberang.");
    const sumber = dariMana === 'Asal' ? kAsal : kTujuan;
    const target = dariMana === 'Asal' ? kTujuan : kAsal;
    window.dataSantri[rumpun][sumber] = window.dataSantri[rumpun][sumber].filter(n => n !== nama);
    window.dataSantri[rumpun][target].push(nama);
    renderSantri('Asal'); renderSantri('Tujuan');
  }

  function tambahSantri() {
    const rumpun = document.getElementById('selRumpun').value;
    const kAsal = document.getElementById('selAsal').value;
    const nama = document.getElementById('namaBaru').value.trim().toUpperCase();
    if (!rumpun || !kAsal) return alert("Pilih Rumpun dan Kelas Asal terlebih dahulu!");
    if (!nama) return alert("Masukkan nama santri!");
    if (window.dataSantri[rumpun][kAsal].includes(nama)) return alert("Nama tersebut sudah ada di kelas ini.");
    window.dataSantri[rumpun][kAsal].push(nama);
    document.getElementById('namaBaru').value = '';
    renderSantri('Asal');
  }

  function hapusSantri(nama, posisi) {
    if (!confirm(`Hapus ${nama} dari kelas ini?`)) return;
    const rumpun = document.getElementById('selRumpun').value;
    const namaKelas = document.getElementById('sel' + posisi).value;
    window.dataSantri[rumpun][namaKelas] = window.dataSantri[rumpun][namaKelas].filter(n => n !== nama);
    renderSantri(posisi);
  }

  function simpanKeBrowser() {
    localStorage.setItem('cahayaDataSantriCustom', JSON.stringify(window.dataSantri));
    alert("✅ BERHASIL DISIMPAN! Seluruh fitur sekarang menggunakan data terbaru.");
  }

  function exportDataJS() {
    const dataStr = "window.dataSantri = " + JSON.stringify(window.dataSantri, null, 2) + ";";
    const blob = new Blob([dataStr], { type: "text/javascript" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = "data-pusat-update.js"; a.click();
  }
</script>
</body>
</html>
