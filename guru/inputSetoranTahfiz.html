<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CAHAYA APP - Input Setoran Santri</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 1. PANGGIL PUSAT DATA -->
  <script src="../js/data-pusat.js"></script>

  <style>
    :root {
      --navy-dark: #0f172a; --navy-light: #1e293b; --gold-main: #d4af37;
      --gold-dark: #b49126; --text-main: #0f172a; --text-muted: #64748b;
      --input-bg: #f8fafc; --input-border: #e2e8f0;
      --pred-mumtaz-bg: #ecfdf5; --pred-mumtaz-text: #059669;
      --pred-jayyid-bg: #f0f9ff; --pred-jayyid-text: #0284c7;
      --pred-maqbul-bg: #fffbeb; --pred-maqbul-text: #d97706;
      --pred-bimb-bg: #fef2f2; --pred-bimb-text: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; color: var(--text-main); background-color: transparent; padding: 10px; }
    main { max-width: 800px; margin: 0 auto; padding-bottom: 40px; animation: fadeIn 0.6s ease-out backwards; }
    @keyframes fadeIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .card { background: #ffffff; border: 1px solid var(--input-border); border-radius: 24px; padding: 35px 40px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.03); position: relative; }
    .card::before { content: ''; position: absolute; top: 0; left: 5%; right: 5%; height: 3px; background: linear-gradient(90deg, transparent, var(--gold-main), transparent); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 25px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }

    .form-group { margin-bottom: 20px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; }
    select, input, textarea { width: 100%; padding: 14px 20px; border-radius: 14px; border: 1px solid var(--input-border); background: var(--input-bg); font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.3s; }
    select:focus, input:focus, textarea:focus { border-color: var(--gold-main); background: #fff; }
    
    #sectionInputData { display: none; margin-top: 30px; padding-top: 30px; border-top: 2px dashed #e2e8f0; animation: fadeInUp 0.5s ease; }
    @keyframes fadeInUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .surat-row { display: flex; gap: 15px; background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid var(--input-border); margin-bottom: 15px; flex-wrap: wrap; }
    .col-surat { flex: 2; min-width: 180px; }
    .col-ayat { flex: 1; min-width: 80px; }
    .btn-hapus { background: #fef2f2; border: 1px solid #fecaca; color: #ef4444; border-radius: 12px; padding: 0 15px; cursor: pointer; height: 48px; margin-top: 31px; }

    .btn-tambah-surat { background: #f0f9ff; border: 1px dashed #0ea5e9; color: #0284c7; width: 100%; padding: 14px; border-radius: 14px; margin-bottom: 30px; cursor: pointer; font-weight: 600; }
    
    /* Tombol Lihat Buku Setoran */
    .btn-lihat-buku { background: #fffbeb; border: 1px solid #fde68a; color: #d97706; padding: 10px 15px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: 0.3s; margin-top: 10px; width: 100%; justify-content: center; }
    .btn-lihat-buku:hover { background: #fef3c7; border-color: #fbbf24; transform: translateY(-2px); }

    .input-predikat { font-weight: 800 !important; text-align: center; font-size: 1.2rem; }
    .pred-mumtaz { color: var(--pred-mumtaz-text) !important; background: var(--pred-mumtaz-bg) !important; border-color: var(--pred-mumtaz-text) !important; }
    .pred-jayyid { color: var(--pred-jayyid-text) !important; background: var(--pred-jayyid-bg) !important; border-color: var(--pred-jayyid-text) !important; }
    .pred-maqbul { color: var(--pred-maqbul-text) !important; background: var(--pred-maqbul-bg) !important; border-color: var(--pred-maqbul-text) !important; }
    .pred-bimbingan { color: var(--pred-bimb-text) !important; background: var(--pred-bimb-bg) !important; border-color: var(--pred-bimb-text) !important; }

    .checkbox-container { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; cursor: pointer; }
    .checkmark { width: 22px; height: 22px; border: 2px solid var(--input-border); border-radius: 6px; display: flex; justify-content: center; align-items: center; }
    input:checked + .checkmark { background: var(--gold-main); border-color: var(--gold-main); }
    input:checked + .checkmark::after { content: '✓'; color: white; font-weight: bold; }

    .btn-save { width: 100%; padding: 18px; border-radius: 16px; border: none; background: linear-gradient(135deg, var(--navy-light), var(--navy-dark)); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s; }
    .btn-save:hover { background: var(--gold-main); transform: translateY(-2px); box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3); }

    /* MODAL BUKU SETORAN BULANAN */
    .modal-buku { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; animation: fadeIn 0.3s; }
    .modal-buku-content { background: white; border-radius: 24px; padding: 30px; width: 100%; max-width: 900px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--input-border); padding-bottom: 15px;}
    .modal-header h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--navy-dark); margin: 0; }
    .btn-close { background: #fef2f2; color: #ef4444; border: none; width: 35px; height: 35px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    
    .table-responsive { overflow-x: auto; }
    .table-riwayat { width: 100%; border-collapse: collapse; min-width: 700px; font-size: 0.85rem; }
    .table-riwayat th, .table-riwayat td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--input-border); }
    .table-riwayat th { background: var(--input-bg); font-weight: 700; color: var(--navy-dark); text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.75rem; }
    .table-riwayat tr:hover { background: #f8fafc; }
    
    .badge-mumtaz { background: var(--pred-mumtaz-bg); color: var(--pred-mumtaz-text); padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; border: 1px solid var(--pred-mumtaz-text); }
    .badge-jayyid { background: var(--pred-jayyid-bg); color: var(--pred-jayyid-text); padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; border: 1px solid var(--pred-jayyid-text); }
    .badge-maqbul { background: var(--pred-maqbul-bg); color: var(--pred-maqbul-text); padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; border: 1px solid var(--pred-maqbul-text); }
    .badge-bimbingan { background: var(--pred-bimb-bg); color: var(--pred-bimb-text); padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; border: 1px solid var(--pred-bimb-text); }

    @media(max-width: 480px) { .card { padding: 25px 20px; } .modal-buku-content { padding: 20px; } }
  </style>
</head>
<body>

<main>
  <div class="card">
    <h2 class="card-title">📖 Input Setoran Individu</h2>

    <div class="form-group">
      <label>📅 Tanggal Setoran</label>
      <input type="date" id="tfzTanggal">
    </div>

    <div class="input-row">
      <div class="form-group">
        <label>📚 Program</label>
        <select id="tfzProgram" onchange="updateKelompok()">
          <option value="">-- Pilih Program --</option>
          <option value="Tahsin">Tahsin</option>
          <option value="Tahfiz">Tahfiz</option>
        </select>
      </div>
      <div class="form-group">
        <label>👥 Halaqah</label>
        <select id="tfzKelompok" onchange="updateSantri()">
          <option value="">-- Menunggu Program --</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>👤 Nama Santri</label>
      <select id="tfzNamaSantri" onchange="siapkanForm()">
        <option value="">-- Pilih Halaqah Dulu --</option>
      </select>
      
      <!-- Tombol Baru: Muncul saat nama santri dipilih -->
      <button id="btnLihatBuku" class="btn-lihat-buku" style="display:none;" onclick="bukaBukuSetoran()">
        <span>📖</span> LIHAT BUKU SETORAN BULAN INI
      </button>
    </div>

    <div id="sectionInputData">
      <div id="wadahListSurat"></div>
      <button class="btn-tambah-surat" onclick="tambahBarisSurat()">➕ Tambah Surat Lain</button>

      <div class="form-group" style="background:#f8fafc; padding:20px; border-radius:16px; border:1px solid #e2e8f0;">
        <label style="text-align:center;">∑ Total Ayat</label>
        <input type="number" id="inputJumlahAyat" readonly style="font-size:1.5rem; text-align:center; font-weight:bold; color:var(--navy-dark);">
      </div>

      <div class="input-row">
        <div class="form-group">
          <label>❌ Kesalahan Lahn Jali</label>
          <input type="number" id="inputKesalahan" placeholder="Kosong = Mumtaz" oninput="hitungPredikat()">
        </div>
        <div class="form-group">
          <label>🏆 Predikat</label>
          <input type="text" id="inputPredikat" class="input-predikat" readonly>
        </div>
      </div>

      <div class="form-group">
        <label class="checkbox-container">
          <input type="checkbox" id="checkTahfizCahaya" onchange="toggleTahfizCahaya()" style="display:none;">
          <span class="checkmark"></span>
          <span style="font-weight:600;">Tahfiz CAHAYA (Tafsir & Aksi)</span>
        </label>
        <textarea id="inputCatatan" placeholder="Catatan tajwid..."></textarea>
      </div>

      <button class="btn-save" id="btnSimpanSetoran" onclick="simpanSetoranPerAnak()">💾 SIMPAN DATA SETORAN</button>
    </div>
  </div>
</main>

<!-- MODAL BUKU SETORAN -->
<div id="modalBuku" class="modal-buku">
  <div class="modal-buku-content">
    <div class="modal-header">
      <h3 id="titleBukuSantri">Buku Setoran Santri</h3>
      <button class="btn-close" onclick="tutupBukuSetoran()">✕</button>
    </div>
    
    <div class="table-responsive">
      <table class="table-riwayat">
        <thead>
          <tr>
            <th width="15%">Tanggal</th>
            <th width="30%">Surat (Ayat)</th>
            <th width="10%" style="text-align:center;">Jml Ayat</th>
            <th width="15%">Predikat</th>
            <th width="15%">Penerima</th>
            <th width="15%">Keterangan</th>
          </tr>
        </thead>
        <tbody id="tbodyRiwayat">
          <!-- Data akan dimuat disini oleh JavaScript -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  // 2. IMPORT 'get' untuk mengambil data membaca database
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVmM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam",
    storageBucket: "absensi-santri-fajrul-islam.appspot.com",
    messagingSenderId: "739928369926",
    appId: "1:739928369926:web:7e95375c3ddba0f584cdd07"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const user = JSON.parse(localStorage.getItem('cahayaCurrentUser') || 'null');

  window.init = () => { document.getElementById('tfzTanggal').value = new Date().toISOString().split('T')[0]; };

  window.updateKelompok = () => {
    const prog = document.getElementById('tfzProgram').value;
    const kmpk = document.getElementById('tfzKelompok');
    kmpk.innerHTML = '<option value="">-- Pilih --</option>';
    if (!prog) return;
    const kategori = window.dataSantri["Halqah Quraniyah"];
    Object.keys(kategori).filter(k => k.startsWith(prog)).forEach(k => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = k.replace(prog + ' ', '');
      kmpk.appendChild(opt);
    });
  };

  window.updateSantri = () => {
    const prog = document.getElementById('tfzProgram').value;
    const kmpk = document.getElementById('tfzKelompok').value;
    const nama = document.getElementById('tfzNamaSantri');
    nama.innerHTML = '<option value="">-- Pilih --</option>';
    if (!prog || !kmpk) return;
    const list = (window.dataSantri["Halqah Quraniyah"][`${prog} ${kmpk}`] || []).slice().sort();
    list.forEach(n => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = n;
      nama.appendChild(opt);
    });
  };

  window.siapkanForm = () => {
    const n = document.getElementById('tfzNamaSantri').value;
    document.getElementById('sectionInputData').style.display = n ? 'block' : 'none';
    document.getElementById('btnLihatBuku').style.display = n ? 'flex' : 'none'; // Munculkan Tombol
    if(n) { document.getElementById('wadahListSurat').innerHTML = ''; tambahBarisSurat(); hitungPredikat(); }
  };

  // --- LOGIKA FITUR BARU: LIHAT BUKU SETORAN BULAN INI ---
  window.bukaBukuSetoran = async () => {
    const nama = document.getElementById('tfzNamaSantri').value;
    if (!nama) return;

    const modal = document.getElementById('modalBuku');
    const tbody = document.getElementById('tbodyRiwayat');
    const title = document.getElementById('titleBukuSantri');

    title.textContent = `Buku Setoran: ${nama}`;
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px;">⏳ Mengambil data dari server...</td></tr>';
    modal.style.display = 'flex';

    try {
      const snapshot = await get(ref(db, 'cahaya_app/setoran_tahfiz'));
      if (!snapshot.exists()) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px;">Belum ada riwayat setoran di sistem.</td></tr>';
        return;
      }

      const dataObj = snapshot.val();
      
      // Ambil YYYY-MM dari tanggal hari ini untuk disamakan (Misal: "2026-04")
      const bulanIni = new Date().toISOString().slice(0, 7); 
      let riwayat = [];

      for (let key in dataObj) {
        const record = dataObj[key];
        // Filter 1: Apakah setoran terjadi di bulan ini?
        if (record.tanggal && record.tanggal.startsWith(bulanIni)) {
          // Filter 2: Apakah setoran ini milik santri yang dipilih?
          if (record.data && record.data[0] && record.data[0].nama === nama) {
            riwayat.push({
              tanggal: record.tanggal,
              setoran: record.data[0].setoran,
              ayat: record.data[0].ayat,
              nilai: record.data[0].nilai,
              keterangan: record.data[0].keterangan || '-',
              guru: record.guru || 'Tidak Diketahui'
            });
          }
        }
      }

      // Urutkan dari yang terbaru (Descending)
      riwayat.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

      if (riwayat.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-muted);">Belum ada setoran di bulan ini.</td></tr>';
        return;
      }

      tbody.innerHTML = riwayat.map((r) => {
        // Format Tanggal (YYYY-MM-DD -> DD/MM/YYYY)
        const [y, m, d] = r.tanggal.split('-');
        const tglIndo = `${d}/${m}/${y}`;

        // Tentukan style badge nilai
        let badgeClass = 'badge-mumtaz';
        if(r.nilai.includes("JAYYID")) badgeClass = 'badge-jayyid';
        if(r.nilai.includes("MAQBUL")) badgeClass = 'badge-maqbul';
        if(r.nilai.includes("BIMBINGAN")) badgeClass = 'badge-bimbingan';

        return `
          <tr>
            <td style="font-weight:600; color:var(--text-muted);">${tglIndo}</td>
            <td style="font-weight:700; color:var(--navy-dark);">${r.setoran}</td>
            <td style="text-align:center; font-weight:600;">${r.ayat}</td>
            <td><span class="${badgeClass}">${r.nilai}</span></td>
            <td style="text-transform:capitalize;">Ust. ${r.guru}</td>
            <td style="font-size:0.75rem;">${r.keterangan}</td>
          </tr>
        `;
      }).join('');

    } catch (error) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:red;">❌ Gagal menarik data: ${error.message}</td></tr>`;
    }
  };

  window.tutupBukuSetoran = () => {
    document.getElementById('modalBuku').style.display = 'none';
  };
  // -----------------------------------------------------

  window.tambahBarisSurat = () => {
    const id = 'row_' + Date.now();
    let opsi = '<option value="">-- Pilih Surat --</option>';
    window.daftarSurat.forEach((s, i) => { opsi += `<option value="${i}">${i+1}. ${s.nama}</option>`; });
    const html = `<div class="surat-row" id="${id}"><div class="col-surat"><label>Surat</label><select class="pilih-surat" onchange="hitungTotalAyat()">${opsi}</select></div><div class="col-ayat"><label>Dari</label><input type="number" class="input-mulai" oninput="hitungTotalAyat()"></div><div class="col-ayat"><label>Sampai</label><input type="number" class="input-sampai" oninput="hitungTotalAyat()"></div><button class="btn-hapus" onclick="document.getElementById('${id}').remove(); hitungTotalAyat();">🗑️</button></div>`;
    document.getElementById('wadahListSurat').insertAdjacentHTML('beforeend', html);
  };

  window.hitungTotalAyat = () => {
    let tot = 0;
    document.querySelectorAll('.surat-row').forEach(r => {
      const m = parseInt(r.querySelector('.input-mulai').value);
      const s = parseInt(r.querySelector('.input-sampai').value);
      if(m && s && s >= m) tot += (s - m) + 1;
    });
    document.getElementById('inputJumlahAyat').value = tot || "";
  };

  window.hitungPredikat = () => {
    const s = parseInt(document.getElementById('inputKesalahan').value) || 0;
    const p = document.getElementById('inputPredikat');
    p.className = 'input-predikat';
    if(s === 0) { p.value = 'MUMTAZ'; p.classList.add('pred-mumtaz'); }
    else if(s <= 2) { p.value = 'JAYYID JIDDAN'; p.classList.add('pred-jayyid'); }
    else if(s <= 4) { p.value = 'JAYYID'; p.classList.add('pred-jayyid'); }
    else if(s <= 6) { p.value = 'MAQBUL'; p.classList.add('pred-maqbul'); }
    else { p.value = 'BIMBINGAN'; p.classList.add('pred-bimbingan'); }
  };

  window.toggleTahfizCahaya = () => {
    const cb = document.getElementById('checkTahfizCahaya');
    const txt = "Disetorkan beserta terjemah, ringkasan tafsir, tadabbur dan rencana aksi pengamalan ayat.";
    const cat = document.getElementById('inputCatatan');
    if(cb.checked) cat.value = (cat.value ? cat.value + "\n" : "") + txt;
    else cat.value = cat.value.replace(txt, "").trim();
  };

  window.simpanSetoranPerAnak = () => {
    const btn = document.getElementById('btnSimpanSetoran');
    const rows = document.querySelectorAll('.surat-row');
    let strList = [];
    rows.forEach(r => {
      const idx = r.querySelector('.pilih-surat').value;
      const m = r.querySelector('.input-mulai').value;
      const s = r.querySelector('.input-sampai').value;
      if(idx && m && s) strList.push(`${window.daftarSurat[idx].nama} (${m}-${s})`);
    });

    if(strList.length === 0) return alert("Isi data setoran!");
    btn.innerHTML = "⏳ MENYIMPAN..."; btn.disabled = true;

    const log = {
      tanggal: document.getElementById('tfzTanggal').value,
      program: document.getElementById('tfzProgram').value,
      kelompok: document.getElementById('tfzKelompok').value,
      guru: user ? user.username : 'Unknown',
      data: [{
        nama: document.getElementById('tfzNamaSantri').value,
        setoran: strList.join(", "),
        ayat: document.getElementById('inputJumlahAyat').value,
        kesalahan: document.getElementById('inputKesalahan').value || "0",
        nilai: document.getElementById('inputPredikat').value,
        keterangan: document.getElementById('inputCatatan').value
      }],
      waktuSimpan: new Date().toISOString()
    };

    push(ref(db, 'cahaya_app/setoran_tahfiz'), log).then(() => {
      alert("✅ BERHASIL!"); btn.innerHTML = "💾 SIMPAN DATA SETORAN"; btn.disabled = false;
      document.getElementById('tfzNamaSantri').value = ""; siapkanForm();
    });
  };

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
