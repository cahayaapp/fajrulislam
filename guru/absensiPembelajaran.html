<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CAHAYA APP - Absensi KBM Guru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="stylesheet" href="../css/cahaya-theme.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; margin: 0; padding: 0;}
    
    .cahaya-card { background: #ffffff; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; margin-bottom: 30px; }
    .cahaya-title { font-family: 'Playfair Display', serif; color: #0f172a; margin-top: 0; font-size: 1.6rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
    
    .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #334155; margin-bottom: 8px; }
    .form-control { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 0.9rem; outline: none; background: #f8fafc; transition: 0.3s; box-sizing: border-box; }
    .form-control:focus { background: #ffffff; border-color: #d4af37; box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }

    .table-header-flex { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; margin-top: 25px; margin-bottom: 10px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 10px; }
    .btn-mark-all { background: #ecfdf5; color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); padding: 8px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.3s; }

    /* =========================================
       STRATEGI TABEL KUNCI (ANTI-TERPOTONG)
       ========================================= */
    .table-responsive { width: 100%; border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
    
    .cahaya-table { 
      width: 100%; 
      border-collapse: collapse; 
      table-layout: fixed; /* Memaksa browser mengikuti lebar yang kita buat */
    }
    
    .cahaya-table th { background: #f1f5f9; padding: 10px 0; font-size: 0.7rem; color: #475569; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; text-align: center; }
    .cahaya-table td { padding: 8px 2px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; text-align: center; }

    /* UKURAN KOLOM DESKTOP (Default) */
    .col-no { width: 5%; }
    .col-nama { width: 55%; text-align: left !important; padding-left: 10px !important; }
    .col-aksi { width: 8%; } 

    .cahaya-table td.col-nama { 
      font-weight: 600; color: #0f172a; font-size: 0.8rem; text-transform: capitalize; line-height: 1.4;
      white-space: normal !important; /* WAJIB: Memaksa teks yang panjang turun ke bawah */
      word-wrap: break-word;
    }

    /* RADIO BUTTON */
    .radio-label { display: inline-block; cursor: pointer; user-select: none; margin: 0; width: 100%; height: 100%; }
    .radio-label input { display: none; }
    .radio-circle { display: inline-flex; justify-content: center; align-items: center; width: 28px; height: 28px; border-radius: 50%; background: #f8fafc; border: 1px solid #cbd5e1; color: #94a3b8; font-weight: 800; font-size: 0.7rem; transition: 0.2s; margin: 0 auto; }
    
    .radio-label input:checked + .radio-circle { color: white; transform: scale(1.1); }
    .radio-label input[value="Hadir"]:checked + .radio-circle { background: #10b981; border-color: #10b981; }
    .radio-label input[value="Terlambat"]:checked + .radio-circle { background: #f59e0b; border-color: #f59e0b; }
    .radio-label input[value="Izin"]:checked + .radio-circle { background: #3b82f6; border-color: #3b82f6; }
    .radio-label input[value="Sakit"]:checked + .radio-circle { background: #8b5cf6; border-color: #8b5cf6; }
    .radio-label input[value="Alfa"]:checked + .radio-circle { background: #ef4444; border-color: #ef4444; }

    tr.status-hadir { background: #ecfdf5 !important; }
    tr.status-terlambat { background: #fffbeb !important; }
    tr.status-izin { background: #eff6ff !important; }
    tr.status-sakit { background: #f5f3ff !important; }
    tr.status-alfa { background: #fef2f2 !important; }

    .btn-simpan { background: linear-gradient(135deg, #d4af37, #fde047); color: #0f172a; border: none; padding: 15px 30px; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 20px; box-shadow: 0 10px 20px rgba(212,175,55,0.2); }

    #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #0f172a; font-family: 'Playfair Display', serif; font-size: 1.2rem; }

    /* =========================================
       EKSEKUSI KHUSUS LAYAR HP
       ========================================= */
    @media (max-width: 600px) {
      .cahaya-container { padding: 5px !important; }
      .cahaya-card { padding: 12px; }
      
      /* Hilangkan sama sekali kolom No di HP agar hemat layar */
      .col-no { display: none !important; } 
      
      /* PENGATURAN PERSENTASE MUTLAK (TOTAL HARUS 100%) */
      .col-nama { width: 45% !important; font-size: 0.75rem !important; padding-left: 5px !important; }
      .col-aksi { width: 11% !important; padding: 0 !important; } 
      /* Matematikanya: 45% (Nama) + (5 x 11% Tombol Aksi) = 100%. Pas sejajar! */

      .cahaya-table th { font-size: 0.6rem !important; padding: 8px 0; }
      .cahaya-table td { padding: 8px 0; }

      /* Lingkaran tombol sedikit diperkecil agar tidak saling nabrak */
      .radio-circle { width: 22px; height: 22px; font-size: 0.6rem; }
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div style="font-size: 2.5rem; margin-bottom: 15px; animation: pulse 1.5s infinite alternate ease-in-out;">📚</div>
  <div style="font-weight: 700;">Menarik Data Akademik...</div>
</div>

<main class="cahaya-container" style="padding: 10px;">
  <div class="cahaya-card">
    <h2 class="cahaya-title">📝 Absensi Halqah</h2>
    
    <div class="grid-2">
      <div class="form-group">
        <label>📅 Tanggal KBM</label>
        <input type="date" class="form-control" id="kbmTanggal">
      </div>
      <div class="form-group">
        <label>📚 Rumpun Kelas</label>
        <select class="form-control" id="kbmJenisKelas" onchange="updatePilihan()">
          <option value="">-- Pilih Rumpun --</option>
          <option value="Halqah Ilmiyah">Halqah Ilmiyah</option>
          <option value="Halqah Lughowiyah">Halqah Lughowiyah</option>
          <option value="Halqah Quraniyah">Halqah Quraniyah</option>
        </select>
      </div>
      <div class="form-group" id="opsiKhusus" style="display: none;">
        <label>🏫 Kelas / Kelompok</label>
        <select class="form-control" id="subPilihan" onchange="tampilkanSantri()">
          <option value="">-- Pilih Kelas --</option>
        </select>
      </div>
      <div class="form-group">
        <label>📝 Mata Pelajaran</label>
        <select class="form-control" id="kbmMapel"><option value="">-- Pilih Mapel --</option></select>
      </div>
    </div>

    <div class="table-header-flex">
      <h3 style="font-family:'Playfair Display'; font-size:1.1rem; color:#0f172a; font-weight:800; margin:0;">Daftar Santri</h3>
      <button type="button" class="btn-mark-all" onclick="markAll()">✓ Hadir Semua</button>
    </div>

    <div class="table-responsive">
      <table class="cahaya-table">
        <thead>
          <tr>
            <th class="col-no">No</th>
            <th class="col-nama">Nama Santri</th>
            <th class="col-aksi">H</th>
            <th class="col-aksi">T</th>
            <th class="col-aksi">I</th>
            <th class="col-aksi">S</th>
            <th class="col-aksi">A</th>
          </tr>
        </thead>
        <tbody id="kbmBody">
          <tr><td colspan="7" style="text-align:center;color:#64748b;padding:30px;font-style:italic;">Pilih kelas untuk memuat data.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="form-group" style="margin-top: 20px;">
      <label>📌 Ringkasan Materi (Jurnal)</label>
      <textarea class="form-control" id="kbmCatatan" rows="3" placeholder="Tuliskan bab atau materi hari ini..."></textarea>
    </div>

    <button class="btn-simpan" onclick="simpanKehadiran()">💾 SIMPAN LOG KEHADIRAN</button>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVnM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const user = JSON.parse(localStorage.getItem('cahayaCurrentUser') || 'null');
  
  let masterDataAkademik = {};

  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('kbmTanggal').value = new Date().toISOString().split('T')[0];
    try {
      const snapshot = await get(ref(db, 'cahaya_app/master_akademik'));
      if (snapshot.exists()) masterDataAkademik = snapshot.val();
    } catch (error) { console.error(error); }
    document.getElementById('loadingOverlay').style.display = 'none';
  });

  window.updatePilihan = function() {
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const boxSub = document.getElementById('opsiKhusus');
    const selSub = document.getElementById('subPilihan');
    const mapelSelect = document.getElementById('kbmMapel');
    const tbody = document.getElementById('kbmBody');

    selSub.innerHTML = '<option value="">-- Pilih Kelas --</option>';
    mapelSelect.innerHTML = '<option value="">-- Pilih Mapel --</option>';
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#64748b;padding:30px;font-style:italic;">Menunggu pilihan kelas...</td></tr>';

    if (!rumpun) { boxSub.style.display = "none"; return; }

    let mapelList = (rumpun === 'Halqah Ilmiyah' ? ['Fiqih','Akidah','Adab','Nahwu','Sirah','Sharaf','Balaghah','Kewirausahaan','Metode Pengajaran','Matematika','IPA'] : (rumpun === 'Halqah Lughowiyah' ? ['Bahasa Arab','Bahasa Inggris','Muhadatsah'] : ['Tahsin','Tahfiz','Murojaah']));
    mapelList.sort().forEach(m => mapelSelect.add(new Option(m, m)));

    const kategori = masterDataAkademik.halqah?.[rumpun];
    if (kategori) {
      boxSub.style.display = "block";
      Object.keys(kategori).forEach(k => selSub.add(new Option(k, k)));
    } else { boxSub.style.display = "none"; }
  };

  window.tampilkanSantri = function() {
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const sub = document.getElementById('subPilihan').value;
    const tbody = document.getElementById('kbmBody');
    tbody.innerHTML = '';
    
    const list = (masterDataAkademik.halqah?.[rumpun]?.[sub] || []).slice().sort();
    if (list.length === 0) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;">Data kosong.</td></tr>`; return; }

    list.forEach((nama, i) => {
      const tr = document.createElement('tr');
      tr.className = 'status-hadir';
      tr.innerHTML = `
        <td class="col-no">${i + 1}</td>
        <td class="col-nama">${nama.toLowerCase()}</td>
        <td class="col-aksi"><label class="radio-label"><input type="radio" name="s_${i}" value="Hadir" checked><span class="radio-circle">H</span></label></td>
        <td class="col-aksi"><label class="radio-label"><input type="radio" name="s_${i}" value="Terlambat"><span class="radio-circle">T</span></label></td>
        <td class="col-aksi"><label class="radio-label"><input type="radio" name="s_${i}" value="Izin"><span class="radio-circle">I</span></label></td>
        <td class="col-aksi"><label class="radio-label"><input type="radio" name="s_${i}" value="Sakit"><span class="radio-circle">S</span></label></td>
        <td class="col-aksi"><label class="radio-label"><input type="radio" name="s_${i}" value="Alfa"><span class="radio-circle">A</span></label></td>`;
      tbody.appendChild(tr);
      tr.querySelectorAll('input').forEach(r => r.addEventListener('change', () => tr.className = 'status-' + r.value.toLowerCase()));
    });
  };

  window.markAll = function() {
    document.querySelectorAll('#kbmBody tr').forEach(tr => {
      const radio = tr.querySelector('input[value="Hadir"]');
      if (radio) { radio.checked = true; radio.dispatchEvent(new Event('change')); }
    });
  };

  window.simpanKehadiran = function() {
    const tanggal = document.getElementById('kbmTanggal').value;
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const mapel = document.getElementById('kbmMapel').value;
    const sub = document.getElementById('subPilihan').value;
    const catatan = document.getElementById('kbmCatatan').value;

    if (!tanggal || !rumpun || !sub || !mapel) { alert('⚠️ Lengkapi data.'); return; }
    
    const btn = document.querySelector('.btn-simpan');
    btn.innerHTML = "⏳ MENYIMPAN..."; btn.disabled = true;

    const hasil = [];
    document.querySelectorAll('#kbmBody tr').forEach((tr, i) => {
      const nama = tr.querySelector('.col-nama').textContent;
      const status = document.querySelector(`input[name="s_${i}"]:checked`).value;
      let poin = (status === 'Hadir') ? (rumpun === 'Halqah Quraniyah' ? 40 : 30) : (status === 'Terlambat' ? -20 : (status === 'Alfa' ? -40 : 0));
      hasil.push({ nama, status, poin });
    });

    const payload = { 
      tanggal, rumpun, sub, mapel, catatan,
      guru: user?.label || 'Guru', 
      data: hasil, 
      waktuSimpan: new Date().toISOString() 
    };

    push(ref(db, 'cahaya_app/absensi_pembelajaran'), payload).then(() => {
      alert('✅ BERHASIL DISIMPAN!');
      location.reload();
    }).catch(err => {
      alert('❌ Gagal simpan: ' + err.message);
      btn.innerHTML = "💾 SIMPAN LOG KEHADIRAN"; btn.disabled = false;
    });
  };
</script>
</body>
</html>
