<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CAHAYA APP - Absensi KBM Guru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="stylesheet" href="../css/cahaya-theme.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; margin: 0; padding: 0;}
    
    .cahaya-card {
      background: #ffffff; border-radius: 16px; padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0;
      margin-bottom: 30px;
    }
    
    .cahaya-title { font-family: 'Playfair Display', serif; color: #0f172a; margin-top: 0; font-size: 1.8rem; }

    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
    
    .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #334155; margin-bottom: 8px; }
    .form-control { 
      width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 10px; 
      font-family: 'Poppins', sans-serif; font-size: 0.95rem; outline: none; background: #f8fafc; transition: 0.3s;
      box-sizing: border-box;
    }
    .form-control:focus { background: #ffffff; border-color: #d4af37; box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }

    .table-header-flex { 
      display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 15px;
      margin-top: 25px; margin-bottom: 15px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px; 
    }
    .btn-mark-all { 
      background: #ecfdf5; color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); 
      padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 700; 
      cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 5px; font-family: 'Poppins';
    }

    /* =========================================================
       SISTEM LIST FLEXBOX (PENGGANTI TABEL YANG SUDAH TERUJI)
       ========================================================= */
    .list-container {
      width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;
    }

    .list-header {
      display: flex; background: #f1f5f9; padding: 12px 10px;
      font-size: 0.75rem; font-weight: 700; color: #475569; border-bottom: 2px solid #e2e8f0;
      text-transform: uppercase;
    }

    .santri-row {
      display: flex; align-items: center; padding: 10px;
      border-bottom: 1px solid #f1f5f9; min-height: 55px; background: #ffffff; transition: 0.2s;
    }

    .santri-name {
      flex: 0 0 40%; 
      font-size: 0.85rem; font-weight: 600; color: #0f172a; 
      text-transform: capitalize; line-height: 1.3;
      word-wrap: break-word;
      padding-right: 5px;
    }

    .action-group {
      flex: 0 0 60%;
      display: flex; justify-content: space-between; align-items: center;
    }

    .radio-item { position: relative; width: 30px; height: 30px; margin: 0; display: inline-block; cursor: pointer; }
    .radio-item input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
    
    .checkmark {
      display: flex; justify-content: center; align-items: center;
      width: 28px; height: 28px; background-color: #f8fafc; border: 1px solid #cbd5e1;
      border-radius: 50%; font-size: 0.75rem; font-weight: 800; color: #94a3b8; transition: 0.2s; margin: 0 auto;
    }

    .radio-item input:checked ~ .checkmark { transform: scale(1.1); color: white; }
    .radio-item input[value="Hadir"]:checked ~ .checkmark { background: #10b981; border-color: #10b981; }
    .radio-item input[value="Terlambat"]:checked ~ .checkmark { background: #f59e0b; border-color: #f59e0b; }
    .radio-item input[value="Izin"]:checked ~ .checkmark { background: #3b82f6; border-color: #3b82f6; }
    .radio-item input[value="Sakit"]:checked ~ .checkmark { background: #8b5cf6; border-color: #8b5cf6; }
    .radio-item input[value="Alfa"]:checked ~ .checkmark { background: #ef4444; border-color: #ef4444; }

    .row-hadir { background: #ecfdf5; }
    .row-terlambat { background: #fffbeb; }
    .row-izin { background: #eff6ff; }
    .row-sakit { background: #f5f3ff; }
    .row-alfa { background: #fef2f2; }

    .btn-simpan {
      background: linear-gradient(135deg, #d4af37, #fde047); color: #0f172a;
      border: none; padding: 15px 30px; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; width: 100%; transition: 0.3s; margin-top: 25px; box-shadow: 0 10px 20px rgba(212,175,55,0.2);
    }

    #loadingOverlay { 
      position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); 
      z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
      color: #0f172a; font-family: 'Playfair Display', serif; font-size: 1.2rem;
    }

    @media (max-width: 600px) {
      .cahaya-card { padding: 15px; }
      .santri-name { font-size: 0.75rem; }
      .checkmark { width: 24px; height: 24px; font-size: 0.65rem; }
      .radio-item { width: 26px; height: 26px; }
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div style="font-size: 2.5rem; margin-bottom: 15px; animation: pulse 1.5s infinite alternate ease-in-out;">📚</div>
  <div style="font-weight: 700;">Menarik Data Kelas...</div>
</div>

<main class="cahaya-container" style="padding: 15px;">
  <div class="cahaya-card">
    <h2 class="cahaya-title">📝 Absensi HALQAH</h2>
    
    <div class="grid-2">
      <div class="form-group">
        <label>📅 Tanggal KBM</label>
        <input type="date" class="form-control" id="kbmTanggal">
      </div>
      <div class="form-group">
        <label>📚 Rumpun Kelas</label>
        <select class="form-control" id="kbmJenisKelas" onchange="updatePilihan()">
          <option value="">-- Pilih Rumpun --</option>
          <option value="Halqah Ilmiyah">Halqah Ilmiyah</option>
          <option value="Halqah Lughowiyah">Halqah Lughowiyah</option>
          <option value="Halqah Quraniyah">Halqah Quraniyah</option>
        </select>
      </div>
      <div class="form-group" id="opsiKhusus" style="display: none;">
        <label>🏫 Kelas / Kelompok</label>
        <select class="form-control" id="subPilihan" onchange="tampilkanSantri()">
          <option value="">-- Pilih Kelas --</option>
        </select>
      </div>
      <div class="form-group">
        <label>📝 Mata Pelajaran</label>
        <select class="form-control" id="kbmMapel"><option value="">-- Pilih Mapel --</option></select>
      </div>
    </div>

    <div class="table-header-flex">
      <h3 style="font-family:'Playfair Display'; font-size:1.2rem; color:#0f172a; font-weight:800; margin:0;">Daftar Santri</h3>
      <button type="button" class="btn-mark-all" onclick="markAll()">✓ Set Semua Hadir</button>
    </div>

    <div class="list-container">
      <div class="list-header">
        <div style="flex: 0 0 40%; padding-left: 5px;">Nama Santri</div>
        <div style="flex: 0 0 60%; display: flex; justify-content: space-between; text-align: center;">
          <div style="width:30px">H</div>
          <div style="width:30px">T</div>
          <div style="width:30px">I</div>
          <div style="width:30px">S</div>
          <div style="width:30px">A</div>
        </div>
      </div>
      
      <div id="santriList">
        <div style="text-align:center;color:#64748b;padding:30px;font-style:italic;font-size:0.85rem;">Pilih kelas untuk memuat data.</div>
      </div>
    </div>

    <div class="form-group" style="margin-top: 25px;">
      <label>📌 Ringkasan Materi / Jurnal Mengajar</label>
      <textarea class="form-control" id="kbmCatatan" rows="3" placeholder="Tuliskan bab atau materi yang diajarkan hari ini..."></textarea>
    </div>

    <button class="btn-simpan" onclick="simpanKehadiran()">💾 SIMPAN LOG KEHADIRAN</button>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVnM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const user = JSON.parse(localStorage.getItem('cahayaCurrentUser') || 'null');
  
  let masterDataAkademik = {};

  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('kbmTanggal').value = new Date().toISOString().split('T')[0];
    try {
      const snapshot = await get(ref(db, 'cahaya_app/master_akademik'));
      if (snapshot.exists()) masterDataAkademik = snapshot.val();
    } catch (error) { console.error(error); }
    document.getElementById('loadingOverlay').style.display = 'none';
  });

  window.updatePilihan = function() {
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const boxSub = document.getElementById('opsiKhusus');
    const selSub = document.getElementById('subPilihan');
    const mapelSelect = document.getElementById('kbmMapel');
    const listArea = document.getElementById('santriList');

    selSub.innerHTML = '<option value="">-- Pilih Kelas --</option>';
    mapelSelect.innerHTML = '<option value="">-- Pilih Mapel --</option>';
    listArea.innerHTML = '<div style="text-align:center;color:#64748b;padding:30px;font-style:italic;font-size:0.85rem;">Menunggu pilihan kelas...</div>';

    if (!rumpun) { boxSub.style.display = "none"; return; }

    let mapelList = (rumpun === 'Halqah Ilmiyah' ? ['Fiqih','Akidah','Adab','Nahwu','Sirah','Sharaf','Balaghah','Kewirausahaan','Metode Pengajaran','Matematika','IPA'] : (rumpun === 'Halqah Lughowiyah' ? ['Bahasa Arab','Bahasa Inggris','Muhadatsah'] : ['Tahsin','Tahfiz','Murojaah']));
    mapelList.sort().forEach(m => mapelSelect.add(new Option(m, m)));

    const kategori = masterDataAkademik.halqah?.[rumpun];
    if (kategori) {
      boxSub.style.display = "block";
      Object.keys(kategori).forEach(k => selSub.add(new Option(k, k)));
    } else { boxSub.style.display = "none"; }
  };

  window.tampilkanSantri = function() {
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const sub = document.getElementById('subPilihan').value;
    const listArea = document.getElementById('santriList');
    listArea.innerHTML = '';
    
    const list = (masterDataAkademik.halqah?.[rumpun]?.[sub] || []).slice().sort();
    if (list.length === 0) { listArea.innerHTML = `<div style="text-align:center;padding:30px;">Data kosong.</div>`; return; }

    list.forEach((nama, i) => {
      const row = document.createElement('div');
      row.className = 'santri-row row-hadir';
      row.innerHTML = `
        <div class="santri-name">${i + 1}. ${nama.toLowerCase()}</div>
        <div class="action-group">
          ${['Hadir', 'Terlambat', 'Izin', 'Sakit', 'Alfa'].map(status => `
            <label class="radio-item">
              <input type="radio" name="s_${i}" value="${status}" ${status === 'Hadir' ? 'checked' : ''} 
                onchange="this.closest('.santri-row').className = 'santri-row row-${status.toLowerCase()}'">
              <span class="checkmark">${status.charAt(0)}</span>
            </label>
          `).join('')}
        </div>
      `;
      listArea.appendChild(row);
    });
  };

  window.markAll = function() {
    document.querySelectorAll('.santri-row').forEach(row => {
      const radioHadir = row.querySelector('input[value="Hadir"]');
      if (radioHadir) { 
        radioHadir.checked = true; 
        radioHadir.dispatchEvent(new Event('change')); 
      }
    });
  };

  window.simpanKehadiran = function() {
    const tanggal = document.getElementById('kbmTanggal').value;
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const mapel = document.getElementById('kbmMapel').value;
    const sub = document.getElementById('subPilihan').value;
    const catatan = document.getElementById('kbmCatatan').value;

    if (!tanggal || !rumpun || !sub || !mapel) { alert('⚠️ Lengkapi data.'); return; }
    
    const btn = document.querySelector('.btn-simpan');
    btn.innerHTML = "⏳ MENYIMPAN..."; btn.disabled = true;

    const hasil = [];
    document.querySelectorAll('.santri-row').forEach((row, i) => {
      const namaRaw = row.querySelector('.santri-name').textContent;
      const nama = namaRaw.replace(/^\d+\.\s*/, '').trim(); 
      const status = row.querySelector(`input[name="s_${i}"]:checked`).value;
      
      // --- LOGIKA POIN BARU ---
      let poin = 0;
      if (status === 'Hadir') {
        poin = 50;
      } else if (status === 'Terlambat') {
        poin = -25; // Minus 50% dari Hadir (50)
      } else if (status === 'Alfa') {
        poin = -50; // Minus 100% dari Hadir (50)
      } else {
        poin = 0;   // Sakit & Izin
      }
      
      hasil.push({ nama, status, poin });
    });

    const payload = { 
      tanggal, rumpun, sub, mapel, catatan,
      guru: user?.label || 'Guru', 
      data: hasil, 
      waktuSimpan: new Date().toISOString() 
    };

    push(ref(db, 'cahaya_app/absensi_pembelajaran'), payload).then(() => {
      alert('✅ BERHASIL DISIMPAN!');
      location.reload();
    }).catch(err => {
      alert('❌ Gagal simpan: ' + err.message);
      btn.innerHTML = "💾 SIMPAN LOG KEHADIRAN"; btn.disabled = false;
    });
  };
</script>
</body>
</html>
