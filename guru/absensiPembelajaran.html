<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Absensi Pembelajaran (KBM) - CAHAYA APP</title>
  
  <!-- PANGGIL MASTER THEME -->
  <link rel="stylesheet" href="../css/cahaya-theme.css" />

  <style>
    /* =========================================
       PERBAIKAN TABEL AGAR FIT DI LAYAR HP
       ========================================= */
    .cahaya-card {
      background: white; border-radius: 16px; padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px;
    }

    /* Bungkus agar bisa digeser jika benar-benar sempit */
    .table-responsive {
      width: 100%; overflow-x: auto;
      -webkit-overflow-scrolling: touch; margin-top: 15px;
      background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;
    }

    .cahaya-table { width: 100%; border-collapse: collapse; }
    
    .cahaya-table th {
      background: #f1f5f9; color: var(--navy-dark); font-size: 0.8rem;
      font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      padding: 15px 5px; border-bottom: 2px solid #cbd5e1;
    }

    .cahaya-table td { padding: 12px 5px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }

    /* Porsi Nama Santri Lebih Lebar & Boleh Turun ke Bawah */
    .cahaya-table td:first-child, .cahaya-table th:first-child {
      text-align: left; white-space: normal; width: 45%; 
      padding-left: 15px; font-weight: 700; color: var(--navy-dark); font-size: 0.9rem; line-height: 1.3;
    }

    /* Porsi Tombol Absen di Tengah */
    .cahaya-table td:not(:first-child), .cahaya-table th:not(:first-child) {
      text-align: center; white-space: nowrap; width: 11%;
    }

    /* --- DESAIN TOMBOL RADIO (H, T, I, S, A) --- */
    .radio-label { display: inline-block; cursor: pointer; margin: 0; }
    .radio-label input[type="radio"] { display: none; }
    .radio-btn {
      width: 32px; height: 32px; border-radius: 50%; background: #ffffff;
      border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: #64748b; transition: all 0.2s ease;
      margin: 0 auto;
    }
    
    /* Warna saat dipilih */
    .radio-label input[type="radio"][value="H"]:checked + .radio-btn { background: #10b981; border-color: #10b981; color: white; box-shadow: 0 4px 10px rgba(16,185,129,0.3); }
    .radio-label input[type="radio"][value="T"]:checked + .radio-btn { background: #f59e0b; border-color: #f59e0b; color: white; box-shadow: 0 4px 10px rgba(245,158,11,0.3); }
    .radio-label input[type="radio"][value="I"]:checked + .radio-btn { background: #3b82f6; border-color: #3b82f6; color: white; box-shadow: 0 4px 10px rgba(59,130,246,0.3); }
    .radio-label input[type="radio"][value="S"]:checked + .radio-btn { background: #8b5cf6; border-color: #8b5cf6; color: white; box-shadow: 0 4px 10px rgba(139,92,246,0.3); }
    .radio-label input[type="radio"][value="A"]:checked + .radio-btn { background: #ef4444; border-color: #ef4444; color: white; box-shadow: 0 4px 10px rgba(239,68,68,0.3); }

    /* Responsif Super Ketat untuk Layar HP Kecil */
    @media (max-width: 480px) {
      .radio-btn { width: 26px; height: 26px; font-size: 0.75rem; border-width: 1px; }
      .cahaya-table td:first-child { font-size: 0.8rem; padding-left: 10px; }
      .cahaya-table th { font-size: 0.7rem; padding: 10px 2px; }
      .cahaya-table td { padding: 10px 2px; }
    }

    /* Keterangan Form */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--navy-dark); margin-bottom: 5px; text-transform: uppercase; }
    .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 0.95rem; outline: none; }
    .form-control:focus { border-color: var(--gold-main); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
    
    .header-page { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px; }
    .header-page h2 { color: var(--navy-dark); font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 0; }
  </style>
</head>
<body>

<main class="cahaya-container" style="max-width: 800px; margin: 0 auto; padding-top: 20px;">
  
  <div class="header-page">
    <div style="font-size: 2.5rem;">👨‍🏫</div>
    <div>
      <h2>Absensi Pembelajaran</h2>
      <p style="margin:0; font-size:0.85rem; color:var(--text-muted);">Pencatatan Kehadiran KBM oleh Guru</p>
    </div>
  </div>

  <div class="cahaya-card">
    <div class="form-group">
      <label>🗓️ Tanggal Pelaksanaan</label>
      <input type="date" id="tglKBM" class="form-control" />
    </div>

    <div class="form-group">
      <label>📚 Mata Pelajaran</label>
      <input type="text" id="mapelKBM" class="form-control" placeholder="Contoh: Matematika, Fiqih..." />
    </div>

    <div class="form-group">
      <label>🏫 Pilih Kelas / Kelompok</label>
      <select id="pilihKelas" class="form-control" onchange="renderTabelSantri()">
        <option value="">-- Pilih Kelas --</option>
        <!-- Daftar kelas akan dimuat dari JS -->
      </select>
    </div>
  </div>

  <!-- AREA TABEL ABSENSI -->
  <div class="cahaya-card" id="areaTabel" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
      <h3 style="margin:0; font-size:1.1rem; color:var(--navy-dark);">Daftar Santri</h3>
      <button class="btn-cahaya" style="background: #ecfdf5; color: #059669; border: 1px solid #34d399; padding: 8px 15px; font-size: 0.85rem;" onclick="setSemuaHadir()">
        ✓ Set Semua Hadir
      </button>
    </div>

    <!-- BUNGKUS RESPONSIVE WAJIB -->
    <div class="table-responsive">
      <table class="cahaya-table">
        <thead>
          <tr>
            <th>NAMA LENGKAP</th>
            <th>H</th>
            <th>T</th>
            <th>I</th>
            <th>S</th>
            <th>A</th>
          </tr>
        </thead>
        <tbody id="tabelSantri">
          <!-- Diisi via JavaScript -->
        </tbody>
      </table>
    </div>

    <button class="btn-cahaya btn-gold" id="btnSimpan" style="width: 100%; margin-top: 25px; padding: 15px; font-size: 1.1rem;" onclick="simpanAbsensi()">
      💾 SIMPAN ABSENSI KBM
    </button>
  </div>

</main>

<!-- SCRIPT FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // Inisialisasi Firebase (Gunakan config asli Anda)
  const firebaseConfig = {
    apiKey: "AIzaSyB0Eza852WuQL2R8U-yHpVnM3o8NMxZolI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };
  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  const db = firebase.database();

  // Set Tanggal Hari Ini
  document.getElementById('tglKBM').value = new Date().toISOString().split('T')[0];

  // Identitas Guru dari Sesi Login
  const currentUser = JSON.parse(localStorage.getItem('cahayaCurrentUser') || '{}');
  const namaGuru = currentUser.label || currentUser.username || "Guru Pengajar";

  // Data Dummy/Sementara Kelas (Ganti logika ini dengan penarikan data dari DB Anda jika perlu)
  const dataKelasDummy = {
    "Kelas 7A": ["Abdullah Mukti Hafidzallah", "Anugrah Pratama", "Canza Ryanda Hutasuhut", "Dedi Setiadi", "Dikki Kurniawan", "Fahrie Oktavirano Fitris"],
    "Kelas 7B": ["Fakhri Al Muzakki", "Farazh Sayyid Putra Kenega", "Ghozy Faturrahman", "Ilham", "Ilham Mukmin Al Farabi", "M. Firaas Al Insyiroh"],
    "Usrah Evita": ["Bilqis Nur Anisah", "Jessica Putry Ayra", "Ghenis Andientiaz", "Dina Ruhayah", "Pitri Ramadani", "Grinneta Nalani Putri"]
  };

  // Muat Dropdown Kelas
  window.onload = () => {
    const sel = document.getElementById('pilihKelas');
    for(let kelas in dataKelasDummy) {
      sel.appendChild(new Option(kelas, kelas));
    }
  };

  // Render Tabel
  window.renderTabelSantri = function() {
    const kelasTerpilih = document.getElementById('pilihKelas').value;
    const areaTabel = document.getElementById('areaTabel');
    const tbody = document.getElementById('tabelSantri');
    
    if(!kelasTerpilih) {
      areaTabel.style.display = 'none';
      return;
    }

    const daftarNama = dataKelasDummy[kelasTerpilih] || [];
    let html = '';

    daftarNama.forEach((nama, i) => {
      html += `
        <tr>
          <td>${nama}</td>
          <td><label class="radio-label"><input type="radio" name="abs_${i}" value="H"><div class="radio-btn">H</div></label></td>
          <td><label class="radio-label"><input type="radio" name="abs_${i}" value="T"><div class="radio-btn">T</div></label></td>
          <td><label class="radio-label"><input type="radio" name="abs_${i}" value="I"><div class="radio-btn">I</div></label></td>
          <td><label class="radio-label"><input type="radio" name="abs_${i}" value="S"><div class="radio-btn">S</div></label></td>
          <td><label class="radio-label"><input type="radio" name="abs_${i}" value="A"><div class="radio-btn">A</div></label></td>
        </tr>
      `;
    });

    tbody.innerHTML = html;
    areaTabel.style.display = 'block';
  }

  // Tombol Set Semua Hadir
  window.setSemuaHadir = function() {
    const radios = document.querySelectorAll('input[type="radio"][value="H"]');
    radios.forEach(radio => radio.checked = true);
  }

  // Fungsi Simpan ke Firebase
  window.simpanAbsensi = async function() {
    const tgl = document.getElementById('tglKBM').value;
    const mapel = document.getElementById('mapelKBM').value.trim();
    const kelas = document.getElementById('pilihKelas').value;

    if(!tgl || !mapel || !kelas) {
      return alert("⚠️ Mohon lengkapi Tanggal, Mata Pelajaran, dan Kelas!");
    }

    const daftarNama = dataKelasDummy[kelas];
    let dataAbsensi = [];
    let belumDiabsen = false;

    daftarNama.forEach((nama, i) => {
      const terpilih = document.querySelector(`input[name="abs_${i}"]:checked`);
      if(!terpilih) { belumDiabsen = true; return; }
      
      let val = terpilih.value;
      let namaStatus = ''; let poin = 0;
      
      if(val === 'H') { namaStatus = 'Hadir'; poin = 0; }
      else if(val === 'T') { namaStatus = 'Terlambat'; poin = -5; }
      else if(val === 'I') { namaStatus = 'Izin'; poin = 0; }
      else if(val === 'S') { namaStatus = 'Sakit'; poin = 0; }
      else if(val === 'A') { namaStatus = 'Alfa'; poin = -10; }

      dataAbsensi.push({
        nama: nama,
        status: namaStatus,
        kode: val,
        poin: poin,
        keterangan: "",
        statusKonseling: "Belum" // Disiapkan untuk masuk Buku Kasus jika Alfa/Terlambat
      });
    });

    if(belumDiabsen) {
      return alert("⚠️ Ada santri yang belum diabsen (H/T/I/S/A belum diklik).");
    }

    const btn = document.getElementById('btnSimpan');
    btn.disabled = true; btn.innerHTML = "⏳ MENYIMPAN DATA...";

    const payload = {
      tanggal: tgl,
      mapel: mapel,
      kelas: kelas,
      guru: namaGuru,
      waktuSimpan: new Date().toISOString(),
      data: dataAbsensi
    };

    try {
      // Simpan ke node absensi_pembelajaran
      await db.ref('cahaya_app/absensi_pembelajaran').push(payload);
      alert("✅ Absensi KBM berhasil disimpan!");
      
      // Reset Form
      document.getElementById('mapelKBM').value = '';
      document.getElementById('pilihKelas').value = '';
      document.getElementById('areaTabel').style.display = 'none';

    } catch (error) {
      alert("❌ Gagal menyimpan absensi: " + error.message);
    } finally {
      btn.disabled = false; btn.innerHTML = "💾 SIMPAN ABSENSI KBM";
    }
  }
</script>

</body>
</html>
