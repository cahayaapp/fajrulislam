<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CAHAYA APP - Absensi KBM Guru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 1. PANGGIL PUSAT DATA (Gantikan dataSantri manual) -->
  <script src="../js/data-pusat.js"></script>

  <style>
    :root {
      --navy-dark: #0f172a;
      --navy-light: #1e293b;
      --gold-main: #d4af37;
      --gold-dark: #b49126;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --input-bg: #f8fafc;
      --input-border: #e2e8f0;
      --st-hadir: #ecfdf5;
      --st-hadir-border: #10b981;
      --st-telat: #fffbeb;
      --st-telat-border: #f59e0b;
      --st-izin: #f0f9ff;
      --st-izin-border: #0ea5e9;
      --st-sakit: #fefce8;
      --st-sakit-border: #eab308;
      --st-alfa: #fef2f2;
      --st-alfa-border: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; color: var(--text-main); background-color: transparent; padding: 10px; }
    main { max-width: 1000px; margin: 0 auto; padding-bottom: 40px; animation: fadeIn 0.6s ease-out backwards; }
    @keyframes fadeIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .card { background: #ffffff; border: 1px solid var(--input-border); border-radius: 24px; padding: 35px 40px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.03); position: relative; }
    .card::before { content: ''; position: absolute; top: 0; left: 5%; right: 5%; height: 3px; background: linear-gradient(90deg, transparent, var(--gold-main), transparent); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 800; color: var(--navy-dark); margin-bottom: 25px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }

    .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--navy-dark); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    select, input[type="date"], textarea { width: 100%; padding: 14px 20px; border-radius: 14px; border: 1px solid var(--input-border); background: var(--input-bg); font-family: inherit; font-size: 0.95rem; font-weight: 500; transition: all 0.3s ease; outline: none; }
    select:focus, input[type="date"]:focus, textarea:focus { border-color: var(--gold-main); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); background: #ffffff; }

    .table-header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 40px; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
    .table-header-flex h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--gold-dark); margin: 0; }
    .btn-mark-all { background: var(--st-hadir); color: var(--st-hadir-border); border: 1px solid rgba(16, 185, 129, 0.3); padding: 8px 18px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.3s; }

    .table-responsive { overflow-x: auto; padding-bottom: 10px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 600px; }
    thead th { color: var(--text-muted); font-weight: 600; font-size: 0.85rem; text-align: center; padding-bottom: 5px; }
    thead th:nth-child(2) { text-align: left; }
    tbody tr { background: white; border-radius: 12px; transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    tbody td { padding: 12px 6px; text-align: center; border-top: 1px solid var(--input-border); border-bottom: 1px solid var(--input-border); }
    tbody td:first-child { border-radius: 12px 0 0 12px; border-left: 4px solid var(--input-border); }
    tbody td:nth-child(2) { text-align: left; font-weight: 600; color: var(--navy-dark); }
    tbody td:last-child { border-radius: 0 12px 12px 0; border-right: 1px solid var(--input-border); }

    .radio-label { display: inline-block; cursor: pointer; user-select: none; }
    .radio-label input { display: none; }
    .radio-circle { display: inline-flex; justify-content: center; align-items: center; width: 34px; height: 34px; border-radius: 50%; background: #f8fafc; border: 1px solid #cbd5e1; color: var(--text-muted); font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
    
    .radio-label input[value="Hadir"]:checked + .radio-circle { background: var(--st-hadir-border); color: white; border-color: var(--st-hadir-border); }
    .radio-label input[value="Terlambat"]:checked + .radio-circle { background: var(--st-telat-border); color: white; border-color: var(--st-telat-border); }
    .radio-label input[value="Izin"]:checked + .radio-circle { background: var(--st-izin-border); color: white; border-color: var(--st-izin-border); }
    .radio-label input[value="Sakit"]:checked + .radio-circle { background: var(--st-sakit-border); color: white; border-color: var(--st-sakit-border); }
    .radio-label input[value="Alfa"]:checked + .radio-circle { background: var(--st-alfa-border); color: white; border-color: var(--st-alfa-border); }

    tr.status-hadir { background: var(--st-hadir); }
    tr.status-terlambat { background: var(--st-telat); }
    tr.status-izin { background: var(--st-izin); }
    tr.status-sakit { background: var(--st-sakit); }
    tr.status-alfa { background: var(--st-alfa); }

    .btn-save { width: 100%; padding: 18px; border-radius: 16px; border: none; background: linear-gradient(135deg, var(--navy-light), var(--navy-dark)); color: white; font-weight: 600; letter-spacing: 1px; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15); transition: 0.3s; }
    .btn-save:hover { transform: translateY(-3px); background: linear-gradient(135deg, var(--gold-dark), var(--gold-main)); }

    @media (max-width: 768px) { .card { padding: 25px 20px; } .radio-circle { width: 28px; height: 28px; font-size: 0.75rem; } }
  </style>
</head>
<body>

<main>
  <div class="card">
    <h2 class="card-title">📝 Log Kehadiran KBM</h2>
    
    <div class="filters">
      <div class="filter-item">
        <label>📅 Tanggal KBM</label>
        <input type="date" id="kbmTanggal">
      </div>
      <div class="filter-item">
        <label>📚 Rumpun Kelas</label>
        <select id="kbmJenisKelas" onchange="updatePilihan()">
          <option value="">-- Pilih Rumpun --</option>
          <option value="Halqah Ilmiyah">Halqah Ilmiyah</option>
          <option value="Halqah Lughowiyah">Halqah Lughowiyah</option>
          <option value="Halqah Quraniyah">Halqah Quraniyah</option>
        </select>
      </div>
      <div class="filter-item" id="opsiKhusus"></div>
      <div class="filter-item">
        <label>📝 Mata Pelajaran</label>
        <select id="kbmMapel"><option value="">-- Pilih Mapel --</option></select>
      </div>
    </div>

    <div class="table-header-flex">
      <h3>Daftar Santri</h3>
      <button type="button" class="btn-mark-all" onclick="markAll()">✓ Set Semua Hadir</button>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th width="5%">No</th>
            <th width="45%">Nama Lengkap</th>
            <th title="Hadir" width="10%">H</th>
            <th title="Terlambat" width="10%">T</th>
            <th title="Izin" width="10%">I</th>
            <th title="Sakit" width="10%">S</th>
            <th title="Alfa" width="10%">A</th>
          </tr>
        </thead>
        <tbody id="kbmBody">
          <tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:30px;font-style:italic;">Pilih kelas untuk memuat data.</td></tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top: 30px;">
      <label>📌 Ringkasan Materi / Jurnal Mengajar</label>
      <textarea id="kbmCatatan" rows="3" placeholder="Tuliskan materi yang diajarkan..."></textarea>
    </div>

    <button class="btn-save" onclick="simpanKehadiran()">💾 SIMPAN LOG KEHADIRAN</button>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVmM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam",
    storageBucket: "absensi-santri-fajrul-islam.appspot.com",
    messagingSenderId: "739928369926",
    appId: "1:739928369926:web:7e95375c3ddba0f584cdd07"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const user = JSON.parse(localStorage.getItem('cahayaCurrentUser') || 'null');

  window.init = function() {
    document.getElementById('kbmTanggal').value = new Date().toISOString().split('T')[0];
  };

  window.updatePilihan = function() {
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const container = document.getElementById('opsiKhusus');
    const tbody = document.getElementById('kbmBody');
    const mapelSelect = document.getElementById('kbmMapel');

    container.innerHTML = '';
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:30px;font-style:italic;">Menunggu pilihan kelas...</td></tr>';
    mapelSelect.innerHTML = '<option value="">-- Pilih Mapel --</option>';

    if (!rumpun) return;

    // 2. AMBIL MAPEL DARI PUSAT DATA ATAU LOGIKA KHUSUS
    let mapelList = (rumpun === 'Halqah Ilmiyah' ? ['Fiqih','Akidah','Adab','Nahwu','Sirah','Sharaf','Balaghah','Kewirausahaan','Metode Pengajaran','Matematika','IPA'] : (rumpun === 'Halqah Lughowiyah' ? ['Bahasa Arab','Bahasa Inggris','Muhadatsah'] : ['Tahsin','Tahfiz','Murojaah']));
    mapelList.forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.textContent = m; mapelSelect.appendChild(opt); });

    // 3. AMBIL DAFTAR KELAS DARI window.dataSantri (Pusat Data)
    const kategori = window.dataSantri[rumpun];
    if (!kategori) return;

    container.innerHTML = `<label>🏫 Pilih Kelas / Kelompok</label>
      <select id="subPilihan" onchange="tampilkanSantri()"><option value="">-- Pilih --</option>
        ${Object.keys(kategori).map(k => `<option value="${k}">${k}</option>`).join('')}</select>`;
  };

  window.tampilkanSantri = function() {
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const sub = document.getElementById('subPilihan').value;
    const tbody = document.getElementById('kbmBody');
    tbody.innerHTML = '';
    
    // 4. AMBIL LIST SANTRI (SORT A-Z)
    const list = (window.dataSantri[rumpun][sub] || []).slice().sort((a, b) => a.localeCompare(b));

    if (list.length === 0) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#ef4444;padding:30px">Data santri kosong.</td></tr>`; return; }

    list.forEach((nama, i) => {
      const tr = document.createElement('tr');
      tr.className = 'status-hadir';
      tr.innerHTML = `<td>${i + 1}</td><td style="text-align:left;">${nama}</td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Hadir" checked><span class="radio-circle">H</span></label></td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Terlambat"><span class="radio-circle">T</span></label></td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Izin"><span class="radio-circle">I</span></label></td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Sakit"><span class="radio-circle">S</span></label></td>
        <td><label class="radio-label"><input type="radio" name="s_${i}" value="Alfa"><span class="radio-circle">A</span></label></td>`;
      tbody.appendChild(tr);

      tr.querySelectorAll('input[type="radio"]').forEach(r => {
        r.addEventListener('change', () => {
          tr.className = 'status-' + r.value.toLowerCase();
        });
      });
    });
  };

  window.markAll = function() {
    document.querySelectorAll('#kbmBody tr').forEach(tr => {
      const radio = tr.querySelector('input[value="Hadir"]');
      if (radio) { radio.checked = true; radio.dispatchEvent(new Event('change')); }
    });
  };

  window.simpanKehadiran = function() {
    const tanggal = document.getElementById('kbmTanggal').value;
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const mapel = document.getElementById('kbmMapel').value;
    const sub = document.getElementById('subPilihan')?.value || '';
    const catatan = document.getElementById('kbmCatatan').value.trim();

    if (!tanggal || !rumpun || !sub || !mapel) { alert('⚠️ Lengkapi filter.'); return; }
    
    const rows = document.querySelectorAll('#kbmBody tr');
    if (rows.length === 0 || rows[0].cells.length === 1) { alert('⚠️ Daftar kosong.'); return; }

    const btn = document.querySelector('.btn-save');
    btn.innerHTML = "⏳ MENYIMPAN..."; btn.disabled = true;

    const hasil = [];
    rows.forEach((tr, i) => {
      const nama = tr.children[1].textContent;
      const status = document.querySelector(`input[name="s_${i}"]:checked`)?.value || 'Hadir';
      // Hitung Poin Berdasarkan Rumpun (Quraniyah bobot lebih tinggi)
      const poin = (status === 'Hadir' ? (rumpun === 'Halqah Quraniyah' ? 40 : 30) : (status === 'Terlambat' ? (rumpun === 'Halqah Quraniyah' ? -20 : -15) : (status === 'Alfa' ? (rumpun === 'Halqah Quraniyah' ? -40 : -30) : 0)));
      hasil.push({ nama, status, poin });
    });

    const log = { tanggal, rumpun, sub, mapel, catatan, guru: user ? user.username : 'Unknown', data: hasil, waktuSimpan: new Date().toISOString() };
    push(ref(db, 'cahaya_app/absensi_pembelajaran'), log)
      .then(() => { alert('✅ LOG BERHASIL DISIMPAN!'); btn.innerHTML = "💾 SIMPAN LOG KEHADIRAN"; btn.disabled = false; })
      .catch(err => { alert('❌ Gagal: ' + err.message); btn.innerHTML = "💾 SIMPAN LOG KEHADIRAN"; btn.disabled = false; });
  };

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
