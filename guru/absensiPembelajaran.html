<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CAHAYA APP - Absensi KBM Guru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="stylesheet" href="../css/cahaya-theme.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; margin: 0; padding: 0;}
    
    .cahaya-card {
      background: #ffffff; border-radius: 16px; padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0;
      margin: 15px;
    }
    
    .cahaya-title { font-family: 'Playfair Display', serif; color: #0f172a; margin-top: 0; font-size: 1.6rem; }

    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px; }
    
    .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #334155; margin-bottom: 6px; }
    .form-control { 
      width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 10px; 
      font-family: 'Poppins', sans-serif; font-size: 0.9rem; outline: none; background: #f8fafc; transition: 0.3s;
      box-sizing: border-box;
    }
    .form-control:focus { background: #ffffff; border-color: #d4af37; box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }

    .table-header-flex { 
      display: flex; justify-content: space-between; align-items: center; 
      margin-top: 25px; margin-bottom: 10px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 10px; 
    }
    .btn-mark-all { 
      background: #ecfdf5; color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); 
      padding: 8px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; 
      cursor: pointer; transition: 0.3s; font-family: 'Poppins';
    }

    /* SISTEM LIST FLEXBOX (ANTI-TERPOTONG / NO SCROLL) */
    .list-container {
      width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;
    }

    .list-header {
      display: flex; background: #f1f5f9; padding: 12px 10px;
      font-size: 0.7rem; font-weight: 700; color: #475569; border-bottom: 2px solid #e2e8f0;
      text-transform: uppercase;
    }

    .santri-row {
      display: flex; align-items: center; padding: 10px;
      border-bottom: 1px solid #f1f5f9; min-height: 55px; background: #ffffff; transition: 0.2s;
    }

    /* Jatah Lebar: 40% Nama, 60% Tombol (H,T,I,S,A) */
    .santri-name {
      flex: 0 0 40%; 
      font-size: 0.8rem; font-weight: 600; color: #0f172a; 
      line-height: 1.2; word-wrap: break-word; padding-right: 5px;
      text-transform: uppercase;
    }

    .action-group {
      flex: 0 0 60%;
      display: flex; justify-content: space-between; align-items: center;
    }

    .radio-item { position: relative; width: 30px; height: 30px; margin: 0; cursor: pointer; }
    .radio-item input { position: absolute; opacity: 0; width: 0; height: 0; }
    
    .checkmark {
      display: flex; justify-content: center; align-items: center;
      width: 26px; height: 26px; background-color: #f8fafc; border: 1px solid #cbd5e1;
      border-radius: 50%; font-size: 0.65rem; font-weight: 800; color: #94a3b8; transition: 0.2s;
    }

    .radio-item input:checked ~ .checkmark { color: white; transform: scale(1.1); }
    .radio-item input[value="Hadir"]:checked ~ .checkmark { background: #10b981; border-color: #10b981; }
    .radio-item input[value="Terlambat"]:checked ~ .checkmark { background: #f59e0b; border-color: #f59e0b; }
    .radio-item input[value="Izin"]:checked ~ .checkmark { background: #3b82f6; border-color: #3b82f6; }
    .radio-item input[value="Sakit"]:checked ~ .checkmark { background: #8b5cf6; border-color: #8b5cf6; }
    .radio-item input[value="Alfa"]:checked ~ .checkmark { background: #ef4444; border-color: #ef4444; }

    .row-hadir { background: #ecfdf5; }
    .row-terlambat { background: #fffbeb; }
    .row-izin { background: #eff6ff; }
    .row-sakit { background: #f5f3ff; }
    .row-alfa { background: #fef2f2; }

    .btn-simpan {
      background: linear-gradient(135deg, #d4af37, #fde047); color: #0f172a;
      border: none; padding: 15px 30px; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; width: 100%; transition: 0.3s; margin-top: 25px; box-shadow: 0 10px 20px rgba(212,175,55,0.2);
    }

    #loadingOverlay { 
      position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); 
      z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
      color: #0f172a; font-family: 'Playfair Display', serif; font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div style="font-size: 2.5rem; margin-bottom: 15px;">📚</div>
  <div style="font-weight: 700;">Menarik Data Akademik...</div>
</div>

<main class="cahaya-card">
  <h2 class="cahaya-title">📝 Absensi HALQAH</h2>
  
  <div class="grid-2">
    <div class="form-group">
      <label>📅 Tanggal KBM</label>
      <input type="date" class="form-control" id="kbmTanggal">
    </div>
    
    <!-- BARU: Ditarik dari Database Master Guru -->
    <div class="form-group">
      <label>👨‍🏫 Guru Pengajar</label>
      <select class="form-control" id="kbmGuru">
        <option value="">-- Sedang memuat... --</option>
      </select>
    </div>

    <div class="form-group">
      <label>📚 Rumpun Kelas</label>
      <select class="form-control" id="kbmJenisKelas" onchange="updatePilihan()">
        <option value="">-- Pilih Rumpun --</option>
        <option value="Halqah Ilmiyah">Halqah Ilmiyah</option>
        <option value="Halqah Lughowiyah">Halqah Lughowiyah</option>
        <option value="Halqah Quraniyah">Halqah Quraniyah</option>
      </select>
    </div>
    <div class="form-group">
      <label>🏫 Kelas / Kelompok</label>
      <select class="form-control" id="subPilihan" onchange="tampilkanSantri()">
        <option value="">-- Pilih Kelas --</option>
      </select>
    </div>
    
    <!-- BARU: Ditarik dari Database Master Mapel -->
    <div class="form-group">
      <label>📝 Mata Pelajaran</label>
      <select class="form-control" id="kbmMapel">
        <option value="">-- Sedang memuat... --</option>
      </select>
    </div>
  </div>

  <div class="table-header-flex">
    <h3 style="font-family:'Playfair Display'; font-size:1rem; color:#0f172a; font-weight:800; margin:0;">Daftar Santri</h3>
    <button type="button" class="btn-mark-all" onclick="markAll()">✓ Hadir Semua</button>
  </div>

  <div class="list-container">
    <div class="list-header">
      <div style="flex: 0 0 40%; padding-left: 5px;">Nama Santri</div>
      <div style="flex: 0 0 60%; display: flex; justify-content: space-between; text-align: center;">
        <div style="width:30px">H</div>
        <div style="width:30px">T</div>
        <div style="width:30px">I</div>
        <div style="width:30px">S</div>
        <div style="width:30px">A</div>
      </div>
    </div>
    
    <div id="santriList">
      <div style="text-align:center;color:#64748b;padding:30px;font-style:italic;font-size:0.8rem;">Silakan pilih kelas.</div>
    </div>
  </div>

  <div class="form-group" style="margin-top: 20px;">
    <label>📌 Jurnal Mengajar / Ringkasan Materi</label>
    <textarea class="form-control" id="kbmCatatan" rows="3" placeholder="Tuliskan materi yang diajarkan hari ini..."></textarea>
  </div>

  <button class="btn-simpan" onclick="simpanKehadiran()">💾 SIMPAN LOG KEHADIRAN</button>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVnM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const user = JSON.parse(localStorage.getItem('cahayaCurrentUser') || '{}');
  
  let masterDataAkademik = {};

  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('kbmTanggal').value = new Date().toISOString().split('T')[0];
    
    try {
      // Menarik Data Master Akademik (Berisi Halqah, Guru, Mapel)
      const snapshot = await get(ref(db, 'cahaya_app/master_akademik'));
      if (snapshot.exists()) {
          masterDataAkademik = snapshot.val();
      }

      // --- SUNTIKAN DINAMIS DATA GURU ---
      const optGuru = document.getElementById('kbmGuru');
      optGuru.innerHTML = '<option value="">-- Pilih Guru --</option>';
      const dataGuru = masterDataAkademik.guru || [];
      
      if(dataGuru.length > 0) {
          dataGuru.sort().forEach(g => optGuru.add(new Option(g, g)));
          // Coba otomatis pilih nama guru jika sama dengan nama user yang sedang login
          const myName = (user.label || user.username || "").toUpperCase();
          for(let i=0; i<optGuru.options.length; i++) {
              if(optGuru.options[i].value.includes(myName) || myName.includes(optGuru.options[i].value)) {
                  optGuru.selectedIndex = i;
                  break;
              }
          }
      } else {
          optGuru.innerHTML = '<option value="">⚠️ Data Guru Kosong di Master</option>';
      }

      // --- SUNTIKAN DINAMIS DATA MAPEL ---
      const optMapel = document.getElementById('kbmMapel');
      optMapel.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
      const dataMapel = masterDataAkademik.mapel || [];
      
      if(dataMapel.length > 0) {
          dataMapel.sort().forEach(m => optMapel.add(new Option(m, m)));
      } else {
          optMapel.innerHTML = '<option value="">⚠️ Data Mapel Kosong di Master</option>';
      }

    } catch (error) { 
      console.error(error); 
      alert("Gagal memuat Database Master Akademik!");
    }
    
    document.getElementById('loadingOverlay').style.display = 'none';
  });

  window.updatePilihan = function() {
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const selSub = document.getElementById('subPilihan');
    const listArea = document.getElementById('santriList');

    selSub.innerHTML = '<option value="">-- Pilih Kelas --</option>';
    listArea.innerHTML = '<div style="text-align:center;color:#64748b;padding:30px;font-style:italic;font-size:0.8rem;">Menunggu pilihan kelas...</div>';

    if (!rumpun) return;

    const kategori = masterDataAkademik.halqah?.[rumpun];
    if (kategori) {
      Object.keys(kategori).forEach(k => selSub.add(new Option(k, k)));
    }
  };

  window.tampilkanSantri = function() {
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const sub = document.getElementById('subPilihan').value;
    const listArea = document.getElementById('santriList');
    listArea.innerHTML = '';
    
    const list = (masterDataAkademik.halqah?.[rumpun]?.[sub] || []).slice().sort();
    if (list.length === 0) { listArea.innerHTML = `<div style="text-align:center;padding:30px;">Data kosong.</div>`; return; }

    list.forEach((nama, i) => {
      const row = document.createElement('div');
      row.className = 'santri-row row-hadir';
      row.innerHTML = `
        <div class="santri-name">${nama.toUpperCase()}</div>
        <div class="action-group">
          ${['Hadir', 'Terlambat', 'Izin', 'Sakit', 'Alfa'].map(status => `
            <label class="radio-item">
              <input type="radio" name="s_${i}" value="${status}" ${status === 'Hadir' ? 'checked' : ''} 
                onchange="this.closest('.santri-row').className = 'santri-row row-${status.toLowerCase()}'">
              <span class="checkmark">${status.charAt(0)}</span>
            </label>
          `).join('')}
        </div>
      `;
      listArea.appendChild(row);
    });
  };

  window.markAll = function() {
    document.querySelectorAll('.santri-row').forEach(row => {
      const radioHadir = row.querySelector('input[value="Hadir"]');
      if (radioHadir) { radioHadir.checked = true; radioHadir.dispatchEvent(new Event('change')); }
    });
  };

  window.simpanKehadiran = function() {
    const tanggal = document.getElementById('kbmTanggal').value;
    const guru = document.getElementById('kbmGuru').value; // Mengambil dari dropdown
    const rumpun = document.getElementById('kbmJenisKelas').value;
    const sub = document.getElementById('subPilihan').value;
    const mapel = document.getElementById('kbmMapel').value; // Mengambil dari dropdown dinamis
    const catatan = document.getElementById('kbmCatatan').value;

    if (!tanggal || !guru || !rumpun || !sub || !mapel) { 
        alert('⚠️ Mohon lengkapi Tanggal, Guru Pengajar, Rumpun, Kelas & Mata Pelajaran.'); 
        return; 
    }
    
    const btn = document.querySelector('.btn-simpan');
    btn.innerHTML = "⏳ MENYIMPAN..."; btn.disabled = true;

    const hasil = [];
    document.querySelectorAll('.santri-row').forEach((row, i) => {
      const nama = row.querySelector('.santri-name').textContent.trim();
      const status = row.querySelector(`input[name="s_${i}"]:checked`).value;
      
      let poin = 0;
      if (status === 'Hadir') poin = 50;
      else if (status === 'Terlambat') poin = -25;
      else if (status === 'Alfa') poin = -50;
      else poin = 0;

      hasil.push({ nama, status, poin });
    });

    const payload = { 
      tanggal, rumpun, sub, mapel, catatan,
      guru: guru, // Menggunakan guru dari form dropdown
      data: hasil, 
      waktuSimpan: new Date().toISOString() 
    };

    push(ref(db, 'cahaya_app/absensi_pembelajaran'), payload).then(() => {
      alert('✅ BERHASIL DISIMPAN!');
      location.reload();
    }).catch(err => {
      alert('❌ Gagal: ' + err.message);
      btn.innerHTML = "💾 SIMPAN LOG KEHADIRAN"; btn.disabled = false;
    });
  };
</script>
</body>
</html>
