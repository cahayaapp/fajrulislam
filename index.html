  <style>
    /* CSS Isolasi (Hanya berlaku di halaman ini) */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px; position: relative; overflow: hidden;
      color: #334155;
    }

    /* Pattern Halus */
    body::before {
      content: ""; position: absolute; inset: 0; opacity: 0.03; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23ffffff' fill-rule='evenodd'/%3E%3C/svg%3E");
    }

    .main-card {
      background: #ffffff; width: 100%; max-width: 450px;
      border-radius: 24px; padding: 50px 40px; text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; z-index: 10;
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .brand-logo { width: 90px; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(212,175,55,0.2)); }
    .app-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 900; color: #0f172a; margin-bottom: 5px; letter-spacing: 1px; line-height: 1.1; }
    .app-subtitle { font-size: 0.85rem; color: #d4af37; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; }

    /* VIEW 1: WELCOME */
    #welcomeView { display: block; animation: fadeIn 0.5s ease forwards; }
    .welcome-text { font-size: 0.95rem; color: #64748b; line-height: 1.6; margin-bottom: 30px; }

    .btn-utama {
      background: linear-gradient(135deg, #0f172a, #1e293b); color: #ffffff;
      border: none; padding: 16px 20px; width: 100%; border-radius: 12px;
      font-size: 1.05rem; font-weight: 600; font-family: 'Poppins', sans-serif;
      cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(15,23,42,0.15); margin-top: 10px;
    }
    .btn-utama:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(15,23,42,0.25); }

    /* VIEW 2: LOGIN FORM */
    #loginView { display: none; animation: fadeIn 0.5s ease forwards; }
    .login-title { font-size: 1.2rem; font-weight: 700; color: #1e293b; margin-bottom: 25px; border-bottom: 2px dashed #cbd5e1; padding-bottom: 15px;}
    
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #0f172a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
    .form-control {
      width: 100%; padding: 14px 15px; font-size: 1rem; font-family: 'Poppins', sans-serif;
      background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 12px; color: #0f172a; outline: none; transition: 0.3s;
    }
    .form-control:focus { background: #ffffff; border-color: #d4af37; box-shadow: 0 0 0 4px rgba(212,175,55,0.15); }

    .btn-kembali {
      background: none; border: none; color: #475569; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; margin-top: 25px; text-decoration: none; font-family: 'Poppins', sans-serif; transition: 0.2s;
    }
    .btn-kembali:hover { color: #0f172a; text-decoration: underline; }

    #errorMsg { display: none; background: #fef2f2; border-left: 4px solid #ef4444; color: #b91c1c; padding: 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; margin-bottom: 20px; text-align: left; }

    footer { position: absolute; bottom: 20px; font-size: 0.75rem; color: rgba(255,255,255,0.4); font-weight: 500; letter-spacing: 1px; z-index: 10;}

    #splashScreen {
      position: fixed; inset: 0; background: #0f172a; z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s ease;
    }
    #splashScreen img { width: 100px; margin-bottom: 20px; animation: pulse 1.5s infinite; filter: drop-shadow(0 0 20px rgba(212,175,55,0.5)); }
    .loader-text { color: #d4af37; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 1px; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
    @media (max-width: 480px) { .main-card { padding: 40px 25px; border-radius: 20px; } .app-title { font-size: 2.4rem; } }
  </style>

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      let u = document.getElementById("username").value.trim().toLowerCase();
      const p = document.getElementById("password").value.trim();
      const btn = document.getElementById("btnSubmit");
      const err = document.getElementById("errorMsg");

      btn.disabled = true; btn.innerHTML = "⏳ Autentikasi..."; err.style.display = "none";

      let email = u;
      if (!u.includes("@") && !waliList.some(w => w.username.toLowerCase() === u)) email = u + "@cahayaapp.id";

      if (!email.endsWith("@cahayaapp.id")) {
        const wali = waliList.find(w => w.username.toLowerCase() === u && w.password === p);
        if (!wali) { err.textContent = "Kredensial tidak valid."; err.style.display = "block"; btn.disabled = false; btn.textContent = "Masuk Sistem"; return; }
        
        localStorage.setItem("cahayaCurrentUser", JSON.stringify({ akses: ["wali"], namaAnak: wali.nama, username: wali.username, label: `Wali ${wali.nama}` }));
        tampilkanSistemLoading("Memuat Portal Wali...");
        setTimeout(() => location.href = "wali/dashboard/index.html", 1000);
        return;
      }

      try {
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, p);
        const unameMurni = email.split("@")[0];
        const userDoc = await db.collection("users").doc(unameMurni).get();
        
        let finalUserData = userDoc.exists ? userDoc.data() : { username: unameMurni, label: "Pengguna CAHAYA", akses: ["guru"], fotoProfil: "" };
        finalUserData.uid = userCredential.user.uid;
        if(!userDoc.exists) await db.collection("users").doc(unameMurni).set(finalUserData);

        localStorage.setItem("cahayaCurrentUser", JSON.stringify(finalUserData));
        tampilkanSistemLoading("Memverifikasi Akses...");
        
        setTimeout(() => { 
            if(finalUserData.akses && finalUserData.akses.includes("konselor")) window.location.href = "konselor/index.html"; 
            else if (finalUserData.akses && (finalUserData.akses.includes("admin") || finalUserData.akses.includes("direktur"))) window.location.href = "main-dashboard.html";
            else window.location.href = "guru/index.html";
        }, 1000);

      } catch (error) {
        btn.disabled = false; btn.textContent = "Masuk Sistem";
        err.textContent = "Autentikasi Gagal: Cek kembali Username & Password Anda.";
        err.style.display = "block";
      }
    });

    function tampilkanSistemLoading(teks) {
      const splash = document.getElementById('splashScreen');
      document.getElementById('loadingText').textContent = teks;
      splash.style.visibility = 'visible'; splash.style.opacity = '1';
    }

    window.onload = () => {
      const user = JSON.parse(localStorage.getItem("cahayaCurrentUser"));
      if (user && user.akses) {
        tampilkanSistemLoading("Menghubungkan Sesi...");
        if(user.akses.includes("wali")) window.location.href = "wali/dashboard/index.html";
        else if(user.akses.includes("konselor")) window.location.href = "konselor/index.html";
        else if(user.akses.includes("admin") || user.akses.includes("direktur")) window.location.href = "main-dashboard.html";
        else window.location.href = "guru/index.html";
      }
    };
  </script>
</body>
</html>
