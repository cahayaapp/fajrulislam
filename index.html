  <style>
    :root {
      --navy-dark: #0f172a;
      --navy-light: #1e293b;

      --gold-main: #d4af37;
      --gold-dark: #b49126;
      --bg-pearl: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.65);
      --input-bg: rgba(255, 255, 255, 0.85);
      --text-main: #0f172a;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== BODY LIGHT LUXURY ===== */
    body {
      font-family: "Poppins", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-pearl);
      color: var(--text-main);
      overflow: hidden;
      padding: 20px;
      position: relative;
    }

    /* ===== LUXURY AMBIENT ORBS ===== */
    .orb { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; opacity: 0.6; pointer-events: none; }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%);
      top: -10%; left: -5%;
      animation: floatOrb1 15s infinite ease-in-out alternate;
    }
    .orb-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(15, 23, 42, 0.15) 0%, transparent 70%);
      bottom: -15%; right: -10%;
      animation: floatOrb2 18s infinite ease-in-out alternate-reverse;
    }
    .orb-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(254, 240, 138, 0.15) 0%, transparent 70%);
      top: 40%; left: 40%;
      animation: floatOrb3 20s infinite ease-in-out alternate;
    }

    @keyframes floatOrb1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 30px) scale(1.1); } }
    @keyframes floatOrb2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-40px, -50px) scale(1.15); } }
    @keyframes floatOrb3 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, -40px) scale(1.2); } }

    body::after {
      content: ""; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d4af37' fill-opacity='0.03' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none; z-index: 1;
    }

    #splash {
      position: fixed; inset: 0;
      background: var(--navy-dark);
      display: flex; justify-content: center; align-items: center;
      z-index: 100;
      animation: fadeOutSplash 1.2s cubic-bezier(0.8, 0, 0.2, 1) forwards;
      animation-delay: 2s;
    }
    #splash::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(212, 175, 55, 0.2) 0%, transparent 65%);
    }
    #splash img {
      width: 140px;
      animation: elegantCinematicZoom 2.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      filter: drop-shadow(0 20px 50px rgba(212, 175, 55, 0.5));
      position: relative; z-index: 2;
    }
    @keyframes elegantCinematicZoom { 
      0% { transform: scale(0.8); opacity: 0; filter: blur(20px) drop-shadow(0 0 0 transparent); } 
      40% { opacity: 1; filter: blur(0px) drop-shadow(0 20px 50px rgba(212, 175, 55, 0.5)); }
      100% { transform: scale(1.08); opacity: 1; filter: blur(0px) drop-shadow(0 20px 50px rgba(212, 175, 55, 0.5)); } 
    }
    @keyframes fadeOutSplash { 
      0% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; transform: scale(1.1); filter: blur(10px); } 
    }

    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(35px) saturate(180%);
      -webkit-backdrop-filter: blur(35px) saturate(180%);
      width: 100%;
      max-width: 460px;
      border-radius: 36px;
      padding: 55px 50px;
      box-shadow: 0 50px 100px rgba(15, 23, 42, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.8) inset, 0 0 0 2px rgba(212, 175, 55, 0.15) inset;
      text-align: center;
      position: relative;
      z-index: 10;
      opacity: 0;
      animation: slideUpFade 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 2.4s forwards;
    }

    @keyframes slideUpFade {
      from { transform: translateY(60px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .brand-area { margin-bottom: 40px; }
    .brand-area img { width: 85px; margin-bottom: 25px; transition: 0.6s; }
    .brand-area h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.3rem; font-weight: 800; letter-spacing: 3px;
      background: linear-gradient(to right, var(--navy-dark), var(--gold-main), var(--navy-dark));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: textShimmer 5s linear infinite;
    }
    @keyframes textShimmer { to { background-position: 200% center; } }

    .login-form { display: flex; flex-direction: column; gap: 24px; }
    .input-group input {
      width: 100%; height: 64px; padding: 0 28px;
      border-radius: 20px; border: 1.5px solid rgba(255, 255, 255, 0.5);
      background: var(--input-bg); font-family: 'Poppins'; font-size: 1.05rem;
    }

    .btn-login {
      height: 64px; border-radius: 20px; border: none;
      font-weight: 600; font-size: 1.1rem; text-transform: uppercase;
      cursor: pointer; color: white; background: var(--navy-dark);
      transition: 0.5s; letter-spacing: 2px;
    }
    .btn-login:hover { background: var(--gold-main); transform: translateY(-3px); color: var(--navy-dark); }

    .footer-note { margin-top: 45px; font-style: italic; color: var(--text-muted); }

      const found = { akses: ["wali"], namaAnak: wali.nama, username: wali.username, label: `Wali ${wali.nama}` };
      localStorage.setItem("cahayaCurrentUser", JSON.stringify(found));
      tampilkanLoadingPosh("Mempersiapkan Portal Wali...");
      setTimeout(() => location.href = "wali/dashboard/index.html", 1500);
      return;
    }

    // === 2. LOGIN PETUGAS (Firebase Auth + Firestore) ===
    try {
      const userCredential = await firebase.auth().signInWithEmailAndPassword(email, p);
      const fbUser = userCredential.user;
      const unameMurni = email.split("@")[0];

      // --- LOGIKA FIRESTORE: CEK PROFIL TERBARU ---
      const userDoc = await db.collection("users").doc(unameMurni).get();
      let finalUserData;

      if (userDoc.exists) {
        // Jika sudah ada data di Firestore (pernah edit profil), gunakan itu
        finalUserData = userDoc.data();
      } else {
        // Jika belum ada di Firestore, ambil dari list hardcoded awal
        const localUser = users.find(a => a.username === unameMurni);
        if (!localUser) {
          alert("❌ Hak akses Anda belum terdaftar di sistem.");
          await firebase.auth().signOut();
          resetTombolLogin(btn);
          return;
        }

        finalUserData = {
          username: unameMurni,
          label: localUser.label,
          akses: localUser.akses,
          fotoProfil: "",
          motto: "",
          telepon: ""
        };

        // Simpan ke Firestore untuk pertama kali agar permanen
        await db.collection("users").doc(unameMurni).set(finalUserData);
      }

      // Tambahkan UID ke objek sesi
      finalUserData.uid = fbUser.uid;
      
      // Simpan ke LocalStorage untuk akses cepat
      localStorage.setItem("cahayaCurrentUser", JSON.stringify(finalUserData));

      // Catat log masuk ke Realtime Database (History Login)
      await firebase.database().ref("login_logs/" + fbUser.uid).push({
        waktu: new Date().toISOString(),
        username: unameMurni
      });

      tampilkanLoadingPosh(`Selamat Datang, ${finalUserData.label}...`);
      setTimeout(() => {
        window.location.href = "main-dashboard.html";
      }, 1500);

    } catch (error) {
      resetTombolLogin(btn);
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          alert("❌ Username atau password salah!");
      } else {
          alert("❌ Gagal login: " + error.message);
      }
    }
  }

  function resetTombolLogin(btn) {
      btn.disabled = false;
      btn.textContent = "Masuk Portal";
  }

  /* === AUTO LOGIN CEK === */
  window.onload = () => {
    const user = JSON.parse(localStorage.getItem("cahayaCurrentUser"));
    if (user && user.akses) {
        if (user.akses.includes("wali")) {
            window.location.href = "wali/dashboard/index.html";
        } else {
            window.location.href = "main-dashboard.html";
        }
    }
  };

  /* === EFEK LOADING === */
  function tampilkanLoadingPosh(text) {
    const loading = document.createElement('div');
    loading.style.cssText = `position:fixed; inset:0; background:rgba(248, 250, 252, 0.95); backdrop-filter:blur(20px); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#0f172a; font-family:'Playfair Display',serif; font-weight:800; font-size:1.6rem; letter-spacing:1.5px;`;
    loading.innerHTML = `<img src="assets/logofi.png" alt="Loading" style="width:100px; margin-bottom:30px; filter:drop-shadow(0 20px 40px rgba(212, 175, 55, 0.4));" /><div>${text}</div>`;
    document.body.appendChild(loading);
  }
  </script>
</body>
</html>
