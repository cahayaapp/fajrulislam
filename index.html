<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CAHAYA APP - Premium Portal</title>
  <link rel="icon" type="image/png" href="assets/logofi.png" />
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#050b14" />
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* CSS Isolasi - Super Premium UI/UX */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #050b14;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px; position: relative; overflow: hidden;
      color: #e2e8f0;
    }

    /* Ambient Glow Background (Kesan Canggih & Modern) */
    body::before, body::after {
      content: ""; position: absolute; border-radius: 50%; filter: blur(120px); z-index: 0;
      animation: floatOrbs 10s infinite alternate ease-in-out;
    }
    body::before {
      width: 400px; height: 400px; background: rgba(212, 175, 55, 0.15); /* Gold Glow */
      top: -10%; left: -10%;
    }
    body::after {
      width: 500px; height: 500px; background: rgba(14, 165, 233, 0.1); /* Cyan/Blue Glow */
      bottom: -10%; right: -10%; animation-delay: -5s;
    }

    /* Glassmorphism Main Card */
    .main-card {
      width: 100%; max-width: 460px;
      padding: 50px 40px; text-align: center;
      position: relative; z-index: 10;
      background: rgba(17, 25, 40, 0.6);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .brand-logo { 
      width: 95px; margin-bottom: 20px; 
      filter: drop-shadow(0 15px 25px rgba(212,175,55,0.3)); 
      transition: transform 0.5s ease;
    }
    .brand-logo:hover { transform: scale(1.05); }

    .app-title { 
      font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 900; 
      background: linear-gradient(135deg, #f3e7e9 0%, #e3eeff 99%, #e3eeff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 2px; letter-spacing: 1px; line-height: 1.1; 
    }
    
    .app-subtitle { 
      font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 4px; 
      margin-bottom: 30px; 
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* VIEW 1: WELCOME */
    #welcomeView { display: block; animation: fadeIn 0.6s ease forwards; }
    .welcome-text { font-size: 0.95rem; color: #94a3b8; line-height: 1.7; margin-bottom: 35px; font-weight: 300; }

    /* Premium Button */
    .btn-utama {
      background: linear-gradient(135deg, #d4af37, #aa771c);
      color: #050b14; border: none; padding: 18px 20px; width: 100%; 
      border-radius: 16px; font-size: 1.05rem; font-weight: 700; 
      font-family: 'Poppins', sans-serif; cursor: pointer; 
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
      box-shadow: 0 10px 20px rgba(212,175,55,0.2); 
      position: relative; overflow: hidden;
    }
    .btn-utama::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg); animation: shine 3s infinite;
    }
    .btn-utama:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212,175,55,0.4); background: linear-gradient(135deg, #eadd84, #c99318); }
    .btn-utama:active { transform: translateY(1px); }

    /* Tombol Instal PWA */
    .btn-instal {
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1; border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 20px; width: 100%; border-radius: 14px;
      font-size: 0.95rem; font-weight: 500; font-family: 'Poppins', sans-serif;
      cursor: pointer; transition: all 0.3s ease; margin-top: 15px;
      display: none; /* Disembunyikan sampai browser siap */
    }
    .btn-instal:hover {
      background: rgba(212, 175, 55, 0.1); border-color: #d4af37; color: #d4af37;
    }

    /* VIEW 2: LOGIN FORM */
    #loginView { display: none; animation: fadeIn 0.6s ease forwards; }
    .login-title { 
      font-size: 1.1rem; font-weight: 500; color: #cbd5e1; margin-bottom: 30px; 
      display: flex; align-items: center; justify-content: center; gap: 15px;
    }
    .login-title::before, .login-title::after { content: ""; height: 1px; width: 40px; background: rgba(255,255,255,0.1); }
    
    .form-group { margin-bottom: 22px; text-align: left; position: relative; }
    .form-group label { 
      display: block; font-size: 0.75rem; font-weight: 600; color: #94a3b8; 
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
    }
    
    /* Modern Input Fields */
    .form-control {
      width: 100%; padding: 16px 20px; font-size: 1rem; font-family: 'Poppins', sans-serif;
      background: rgba(255, 255, 255, 0.04); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 14px; color: #ffffff; outline: none; 
      transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }
    .form-control::placeholder { color: #475569; font-weight: 300; }
    .form-control:focus { 
      background: rgba(255, 255, 255, 0.08); 
      border-color: #d4af37; 
      box-shadow: 0 0 0 4px rgba(212,175,55,0.1), inset 0 2px 4px rgba(0,0,0,0.2); 
    }

    /* Wrapper khusus untuk password agar tombol mata presisi */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      padding-right: 50px; /* Ruang aman agar ketikan tidak tertabrak ikon */
    }
    .btn-toggle-password {
      position: absolute;
      right: 15px;
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease;
      outline: none;
    }
    .btn-toggle-password:hover {
      color: #d4af37;
    }

    .btn-kembali {
      background: none; border: none; color: #64748b; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; margin-top: 30px; font-family: 'Poppins', sans-serif; transition: color 0.3s;
    }
    .btn-kembali:hover { color: #d4af37; }

    #errorMsg { 
      display: none; background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; 
      color: #fca5a5; padding: 14px; border-radius: 8px; font-size: 0.85rem; 
      font-weight: 400; margin-bottom: 25px; text-align: left; backdrop-filter: blur(10px);
    }

    footer { position: absolute; bottom: 25px; font-size: 0.75rem; color: #475569; font-weight: 400; letter-spacing: 1.5px; z-index: 10;}

    /* Splash Screen Enhancements */
    #splashScreen {
      position: fixed; inset: 0; background: #050b14; z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #splashScreen img { width: 110px; margin-bottom: 25px; animation: pulseGlow 2s infinite cubic-bezier(0.4, 0, 0.6, 1); }
    .loader-text { 
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-family: 'Playfair Display', serif; font-weight: 800; font-size: 1.4rem; letter-spacing: 2px; 
    }

    /* Animations */
    @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(50px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(212,175,55,0.8)); } }
    @keyframes floatOrbs { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 30px) scale(1.1); } }
    @keyframes shine { 100% { left: 200%; } }

    @media (max-width: 480px) { 
      .main-card { padding: 40px 25px; border-radius: 24px; max-width: 90%; } 
      .app-title { font-size: 2.3rem; } 
    }
  </style>
</head>
<body>

  <div id="splashScreen">
    <img src="assets/logofi.png" alt="Logo" />
    <div class="loader-text" id="loadingText">CAHAYA APP</div>
  </div>

  <div class="main-card">
    <img src="assets/logofi.png" alt="Logo Pesantren" class="brand-logo" />
    <h1 class="app-title">CAHAYA APP</h1>
    <div class="app-subtitle">Fajrul Islam</div>

    <div id="welcomeView">
      <p class="welcome-text">
        Platform eksklusif pemantauan akademik, ibadah, kedisiplinan, dan manajemen operasional Pesantren Cahaya Fajrul Islam.
      </p>
      <button class="btn-utama" onclick="tampilkanLogin()">Login Disini</button>
      
      <button id="tombolInstal" class="btn-instal">📥 Instal Aplikasi CAHAYA APP</button>
    </div>

    <div id="loginView">
      <div class="login-title">Autentikasi</div>
      
      <div id="errorMsg">⚠️ Username atau Password tidak valid.</div>

      <form id="loginForm">
        <div class="form-group">
          <label>Identitas Pengguna</label>
          <input type="text" id="username" class="form-control" placeholder="ID Santri / Username" autocomplete="off" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 30px;">
          <label>Kata Sandi</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="btn-toggle-password" onclick="togglePasswordVisibility()" title="Lihat Kata Sandi">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn-utama" id="btnSubmit">Login Sekarang</button>
      </form>

      <button class="btn-kembali" onclick="tampilkanWelcome()">← Kembali ke Beranda</button>
    </div>
  </div>

  <footer>© 2026 HAK CIPTA CAHAYA APP</footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB0Eza852WuQL2R8U-yHpVnM3o8NMxZolI",
      authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
      databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
      projectId: "absensi-santri-fajrul-islam",
      storageBucket: "absensi-santri-fajrul-islam.firebasestorage.app",
      messagingSenderId: "739982369926",
      appId: "1:739982369926:web:7e5375c3ddbaf0584cdd07"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- NAVIGASI ANTAR VIEW ---
    function tampilkanLogin() {
      document.getElementById('welcomeView').style.display = 'none';
      document.getElementById('loginView').style.display = 'block';
      setTimeout(() => document.getElementById('username').focus(), 100);
    }

    function tampilkanWelcome() {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('welcomeView').style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('loginForm').reset();
      // Kembalikan ke mode password secara default saat kembali ke beranda
      const passInput = document.getElementById('password');
      if (passInput) passInput.type = 'password';
      resetEyeIcon();
    }

    // --- FITUR TOGGLE PASSWORD ---
    function togglePasswordVisibility() {
      const passInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");
      
      if (passInput.type === "password") {
        passInput.type = "text";
        // Ubah ke ikon mata dicoret (menyembunyikan)
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        passInput.type = "password";
        resetEyeIcon();
      }
    }

    function resetEyeIcon() {
      const eyeIcon = document.getElementById("eyeIcon");
      if (eyeIcon) {
        // Kembalikan ke ikon mata terbuka
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    }

    setTimeout(() => {
      document.getElementById('splashScreen').style.opacity = '0';
      setTimeout(() => document.getElementById('splashScreen').style.visibility = 'hidden', 800);
    }, 1800);

    // === LOGIKA INSTALASI PWA ===
    let tangkapPrompt;
    const tombolInstal = document.getElementById('tombolInstal');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); // Mencegah pop-up default
      tangkapPrompt = e;
      tombolInstal.style.display = 'block'; // Memunculkan tombol instal
    });

    tombolInstal.addEventListener('click', async () => {
      if (tangkapPrompt !== null) {
        tangkapPrompt.prompt();
        const { outcome } = await tangkapPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('Instalasi aplikasi disetujui');
        }
        tangkapPrompt = null;
        tombolInstal.style.display = 'none';
      }
    });
    // ============================

    

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      let u = document.getElementById("username").value.trim().toLowerCase();
      const p = document.getElementById("password").value.trim();
      const btn = document.getElementById("btnSubmit");
      const err = document.getElementById("errorMsg");

      btn.disabled = true; btn.innerHTML = "⏳ Bismillaah..."; err.style.display = "none";

      let email = u;
      if (!u.includes("@") && !waliList.some(w => w.username.toLowerCase() === u)) email = u + "@cahayaapp.id";

      if (!email.endsWith("@cahayaapp.id")) {
        const wali = waliList.find(w => w.username.toLowerCase() === u && w.password === p);
        if (!wali) { 
          err.textContent = "Kredensial tidak valid."; 
          err.style.display = "block"; 
          btn.disabled = false; 
          btn.textContent = "Login Sekarang"; 
          return; 
        }
        
        localStorage.setItem("cahayaCurrentUser", JSON.stringify({ akses: ["wali"], namaAnak: wali.nama, username: wali.username, label: `Wali ${wali.nama}` }));
        tampilkanSistemLoading("Memuat Portal Wali...");
        setTimeout(() => location.href = "wali/dashboard/index.html", 1000);
        return;
      }

      try {
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, p);
        const unameMurni = email.split("@")[0];
        const userDoc = await db.collection("users").doc(unameMurni).get();
        
        let finalUserData = userDoc.exists ? userDoc.data() : { username: unameMurni, label: "Pengguna CAHAYA", akses: ["guru"], fotoProfil: "" };
        finalUserData.uid = userCredential.user.uid;
        if(!userDoc.exists) await db.collection("users").doc(unameMurni).set(finalUserData);

        localStorage.setItem("cahayaCurrentUser", JSON.stringify(finalUserData));
        tampilkanSistemLoading("Memverifikasi Akses...");
        
        // PENGALIHAN UTAMA KE main-dashboard.html
        setTimeout(() => { 
            window.location.href = "main-dashboard.html";
        }, 1000);

      } catch (error) {
        btn.disabled = false; btn.textContent = "Login Sekarang";
        err.textContent = "Autentikasi Gagal: Cek kembali Username & Password Anda.";
        err.style.display = "block";
      }
    });

    function tampilkanSistemLoading(teks) {
      const splash = document.getElementById('splashScreen');
      document.getElementById('loadingText').textContent = teks;
      splash.style.visibility = 'visible'; splash.style.opacity = '1';
    }

    // === REGISTRASI SERVICE WORKER (SYARAT MUTLAK PWA) ===
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker terdaftar dengan sukses!', reg))
          .catch(err => console.log('Pendaftaran Service Worker gagal:', err));
      });
    }

    window.onload = () => {
      const user = JSON.parse(localStorage.getItem("cahayaCurrentUser"));
      if (user && user.akses) {
        tampilkanSistemLoading("Menghubungkan Sesi...");
        // Logika pengalihan otomatis jika sesi masih ada
        if(user.akses.includes("wali")) {
            window.location.href = "wali/dashboard/index.html";
        } else {
            window.location.href = "main-dashboard.html";
        }
      }
    };
  </script>
</body>
</html>
