  <!-- Kombinasi Font Premium: Playfair Display untuk sentuhan elegan, Poppins untuk clean UI -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy-dark: #0f172a;
      --navy-light: #1e293b;
      --gold-light: #fef08a;
      --gold-main: #d4af37;
      --gold-dark: #b49126;
      --bg-pearl: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.95);
      --input-bg: #f1f5f9;
      --input-border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; }

    /* ===== BODY LIGHT LUXURY ===== */
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-pearl);
      background-image: 
        radial-gradient(circle at 15% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(15, 23, 42, 0.05) 0%, transparent 40%);
      color: var(--text-main);
      overflow: hidden;
      padding: 20px;
    }

    /* Tekstur Halus agar tidak terlalu polos */
    body::after {
      content: ""; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d4af37' fill-opacity='0.03' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none; z-index: -1;
    }

    /* ===== SPLASH SCREEN PREMIUM ===== */
    #splash {
      position: fixed; inset: 0;
      background: var(--bg-pearl);
      display: flex; justify-content: center; align-items: center;
      z-index: 100;
      animation: fadeOutSplash 1s cubic-bezier(0.7,0,0.3,1) forwards;
      animation-delay: 1.5s; 
    }
    #splash img {
      width: 140px;
      animation: elegantZoom 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      filter: drop-shadow(0 15px 30px rgba(212, 175, 55, 0.2));
    }
    @keyframes elegantZoom { 
      0% { transform: scale(0.8); opacity: 0; filter: blur(10px); } 
      100% { transform: scale(1); opacity: 1; filter: blur(0); } 
    }
    @keyframes fadeOutSplash { to { opacity: 0; visibility: hidden; transform: scale(1.05); } }

    /* ===== KARTU UTAMA PRESISI & ELEGAN ===== */
    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 440px;
      border-radius: 28px;
      padding: 45px 40px;
      /* Bayangan super lembut yang memberikan kesan melayang & mahal */
      box-shadow: 
        0 30px 60px rgba(15, 23, 42, 0.08), 
        0 0 0 1px rgba(212, 175, 55, 0.2) inset;
      text-align: center;
      position: relative;
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 1.6s both;
    }
    /* Aksen Emas di Atas Kartu */
    .main-card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-main), transparent);
      border-radius: 3px 3px 0 0;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ===== BAGIAN LOGO & JUDUL ===== */
    .brand-area {
      margin-bottom: 35px;
    }
    .brand-area img {
      width: 90px;
      margin-bottom: 15px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05));
    }
    .brand-area h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(to right, var(--navy-dark), var(--navy-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 8px 0;
    }
    .brand-area p {
      font-size: 0.85rem;
      color: var(--gold-dark);
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0;
    }

    /* ===== FORM LOGIN ===== */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .input-group input {
      width: 100%;
      height: 56px;
      padding: 0 22px;
      border-radius: 16px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }
    .input-group input::placeholder {
      color: #94a3b8;
    }
    .input-group input:focus {
      outline: none;
      background: #ffffff;
      border-color: var(--gold-main);
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
      transform: translateY(-1px);
    }

    /* ===== TOMBOL LOGIN PREMIUM ===== */
    .btn-login {
      height: 56px;
      border-radius: 16px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--navy-light), var(--navy-dark));
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      margin-top: 10px;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
      position: relative;
      overflow: hidden;
    }
    /* Efek Kilau pada tombol */
    .btn-login::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.6s ease;
    }
    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(15, 23, 42, 0.3);
      background: linear-gradient(135deg, var(--gold-dark), var(--gold-main));
    }
    .btn-login:hover::after { left: 100%; }
    .btn-login:active { transform: translateY(0); }

    /* ===== FOOTER ===== */
    .footer-note {
      margin-top: 35px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }

    /* ===== RESPONSIVE ===== */
    @media(max-width: 480px) {
      .main-card { padding: 40px 25px; border-radius: 24px; }
      .brand-area h1 { font-size: 1.9rem; }
      .input-group input, .btn-login { height: 50px; border-radius: 14px; }
    }

    /* === MODAL PILIHAN PERAN === */
    .modal {
      display: none; position: fixed; z-index: 999; inset: 0;
      background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(6px);
      justify-content: center; align-items: center;
      padding: 20px; animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    
    .modal-content {
      background: #ffffff;
      border-radius: 24px; padding: 40px 30px;
      width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      border: 1px solid rgba(212, 175, 55, 0.2);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .modal-logo { width: 65px; margin-bottom: 15px; }
    .modal-content h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin: 0 0 10px; color: var(--navy-dark); font-weight: 700;}
    .modal-content p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }
    
    .role-buttons { display: flex; flex-direction: column; gap: 12px; }
    .role-btn {
      border: 1px solid var(--input-border); background: var(--input-bg);
      padding: 15px; border-radius: 14px; font-family: 'Poppins', sans-serif; font-weight: 500;
      color: var(--navy-dark); cursor: pointer; transition: all 0.3s;
    }
    .role-btn:hover {
      background: var(--gold-main); border-color: var(--gold-main); color: white;
      transform: translateY(-2px); box-shadow: 0 8px 15px rgba(212, 175, 55, 0.2);
    }
  </style>
</head>

  /* === LOGIN UTAMA === */
  async function login() {
    let u = document.getElementById("username").value.trim().toLowerCase();
    const p = document.getElementById("password").value.trim();

    if (!u.includes("@") && !waliList.some(w => w.username.toLowerCase() === u)) {
      u = u + "@cahayaapp.id";
    }

    // === LOGIN WALI SANTRI ===
    if (!u.endsWith("@cahayaapp.id")) {
      const wali = waliList.find(w => w.username.toLowerCase() === u && w.password === p);
      if (!wali) {
        alert("❌ Username atau password salah.");
        return;
      }
      const found = { role: "wali", namaAnak: wali.nama, username: wali.username, label: `Wali ${wali.nama}` };
      localStorage.setItem("cahayaCurrentUser", JSON.stringify(found));
      location.href = "wali/dashboard/index.html";
      return;
    }

    // === LOGIN PETUGAS (Firebase Auth) ===
    try {
      const email = u;
      const userCredential = await firebase.auth().signInWithEmailAndPassword(email, p);
      const user = userCredential.user;
      const uname = email.split("@")[0];
      const localUser = users.find(a => a.username === uname);

      if (!localUser) {
        alert("❌ Akun tidak terdaftar di sistem lokal.");
        await firebase.auth().signOut();
        return;
      }

      if (localUser.roles && localUser.roles.length > 1) {
        tampilModalPeran(localUser);
        return;
      }

      const role = localUser.role;
      const found = { role, email: user.email, username: uname, label: localUser.label, uid: user.uid };
      localStorage.setItem("cahayaCurrentUser", JSON.stringify(found));

      const db = firebase.database();
      await db.ref("users/" + user.uid).set({
        nama: localUser.label, username: uname, email: user.email, role: role, waktu_login: new Date().toISOString()
      });

      tampilkanLoadingPosh(`Mengautentikasi ${role.toUpperCase()}...`);
      setTimeout(() => {
        if(role === "guru") location.href = "guru/fitur.html";
        else if(role === "naqib") location.href = "naqib/dashboard.html";
        else if(role === "admin") location.href = "admin/index.html";
      }, 1500);

    } catch (error) {
      alert("❌ Gagal login: " + error.message);
    }
  }

  /* === AUTO LOGIN === */
  (function autoLogin() {
    const user = JSON.parse(localStorage.getItem("cahayaCurrentUser") || "null");
    if (!user) return;
    switch (user.role) {
      case "guru": window.location.href = "guru/fitur.html"; break;
      case "naqib": window.location.href = "naqib/dashboard.html"; break;
      case "admin": window.location.href = "admin/index.html"; break;
      case "wali": window.location.href = "wali/dashboard/index.html"; break;
      default: localStorage.removeItem("cahayaCurrentUser"); break;
    }
  })();

  /* === Modal Peran & Efek Loading === */
  let pendingUser = null;
  function tampilModalPeran(user) {
    pendingUser = user;
    document.getElementById('roleModal').style.display = 'flex';
  }

  async function pilihPeran(role) {
    document.getElementById('roleModal').style.display = 'none';
    const uname = pendingUser.username;
    const label = pendingUser.label;
    const email = uname + "@cahayaapp.id";
    const found = { role, email, username: uname, label };
    localStorage.setItem("cahayaCurrentUser", JSON.stringify(found));

    tampilkanLoadingPosh(`Mempersiapkan area ${role.toUpperCase()}...`);
    setTimeout(() => {
      if (role === 'guru') window.location.href = 'guru/fitur.html';
      else if (role === 'naqib') window.location.href = 'naqib/dashboard.html';
    }, 1500);
  }

  function tampilkanLoadingPosh(text) {
    const loading = document.createElement('div');
    loading.style.cssText = `position:fixed; inset:0; background:rgba(248, 250, 252, 0.95); backdrop-filter:blur(10px); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#0f172a; font-family:'Playfair Display',serif; font-weight:700; font-size:1.4rem; letter-spacing:1px; animation: fadeIn 0.4s ease;`;
    loading.innerHTML = `<img src="logofi.png" alt="Loading" style="width:80px; margin-bottom:20px; filter:drop-shadow(0 10px 20px rgba(212, 175, 55, 0.3)); animation:elegantZoom 1.2s infinite alternate;" /><div>${text}</div>`;
    document.body.appendChild(loading);
  }
  </script>
