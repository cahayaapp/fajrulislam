<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Manajemen Komentar</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f0f2f5; color: #0f172a; padding: 20px; margin: 0; }
    .admin-container { max-width: 700px; margin: 0 auto; }
    h2 { color: #d4af37; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; margin-bottom: 20px;}
    
    .post-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0;}
    .post-text { background: #f1f5f9; padding: 15px; border-radius: 10px; font-size: 0.9rem; color: #334155; margin-bottom: 15px; border-left: 4px solid #3b82f6;}
    .post-text p { margin: 0; margin-bottom: 5px; font-weight: 600; color: #0f172a;}
    
    .comment-item { border-bottom: 1px solid #f1f5f9; padding: 15px 0; }
    .comment-item:last-child { border-bottom: none; padding-bottom: 0;}
    .comment-author { font-weight: 700; color: #0f172a; font-size: 0.9rem;}
    .comment-time { font-size: 0.7rem; color: #94a3b8; font-weight: normal; margin-left: 5px;}
    .comment-body { font-size: 0.9rem; color: #475569; margin: 5px 0 10px;}
    
    .reply-box { background: #fffbeb; padding: 10px 15px; border-radius: 8px; border-left: 4px solid #d4af37; font-size: 0.85rem; margin-top: 5px;}
    .reply-box b { color: #b45309; }
    
    .reply-input-area { display: flex; gap: 8px; margin-top: 10px;}
    .reply-input-area input { flex: 1; padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; font-family: 'Poppins'; font-size: 0.85rem;}
    .reply-input-area button { background: #0f172a; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Poppins'; transition: 0.2s;}
    .reply-input-area button:hover { background: #d4af37; color: #0f172a; }
  </style>
</head>
<body>

<div class="admin-container">
  <h2>💬 Pusat Komunikasi Lini Masa</h2>
  <div id="loading" style="text-align:center; color:#94a3b8; padding: 50px;">Memuat data interaksi...</div>
  <div id="postsContainer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  const firebaseConfig = { 
    apiKey: "AIzaSyB0Eza852WuQL2R8U-yHpVnM3o8NMxZolI", 
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com", 
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com", 
    projectId: "absensi-santri-fajrul-islam" 
  };
  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  const dbRT = firebase.database();

  const user = JSON.parse(localStorage.getItem('cahayaCurrentUser') || '{}');
  const adminName = user.label || user.username || "Admin";

  dbRT.ref('cahaya_app/interaksi_cerita').on('value', snap => {
      document.getElementById('loading').style.display = 'none';
      const container = document.getElementById('postsContainer');
      container.innerHTML = '';
      
      const data = snap.val() || {};
      const listEvents = Object.keys(data).reverse(); 

      let hasComments = false;

      listEvents.forEach(eventId => {
          const item = data[eventId];
          if (!item.komentar) return; 
          
          hasComments = true;
          const postInfo = item.post_info ? item.post_info.teks : "Teks postingan tidak tersedia.";
          
          let htmlComments = '';
          Object.keys(item.komentar).forEach(kId => {
              const k = item.komentar[kId];
              const dTime = new Date(k.waktu).toLocaleString('id-ID');
              
              // Render Thread Balasan Berkali-kali
              let replyHtml = '';
              if (k.balasan) {
                  Object.keys(k.balasan).forEach(bId => {
                      const b = k.balasan[bId];
                      replyHtml += `<div class="reply-box"><b>${b.pengirim}</b>: ${b.teks}</div>`;
                  });
              }

              htmlComments += `
                  <div class="comment-item">
                      <div class="comment-author">${k.pengirim} <span class="comment-time">${dTime}</span></div>
                      <div class="comment-body">${k.teks}</div>
                      ${replyHtml}
                      <div class="reply-input-area">
                          <input type="text" id="inp_${eventId}_${kId}" placeholder="Tulis balasan sebagai @${adminName}...">
                          <button onclick="balasKomen('${eventId}', '${kId}')">Balas</button>
                      </div>
                  </div>
              `;
          });

          container.insertAdjacentHTML('beforeend', `
              <div class="post-card">
                  <div class="post-text">
                      <p>Postingan Terkait:</p>${postInfo}
                  </div>
                  <div>${htmlComments}</div>
              </div>
          `);
      });

      if (!hasComments) {
          container.innerHTML = '<div style="text-align:center; color:#94a3b8; font-style:italic;">Belum ada interaksi komentar.</div>';
      }
  });

  // FUNGSI BALAS & KIRIM NOTIFIKASI
  function balasKomen(eventId, commentId) {
      const inp = document.getElementById(`inp_${eventId}_${commentId}`);
      const teksBalasan = inp.value.trim();
      if (!teksBalasan) return;

      // Gunakan .push() agar bisa membalas berkali-kali
      dbRT.ref(`cahaya_app/interaksi_cerita/${eventId}/komentar/${commentId}/balasan`).push({
          teks: teksBalasan,
          pengirim: "@" + adminName,
          waktu: new Date().toISOString()
      }).then(() => {
          alert("✅ Balasan terkirim!");
          // Tarik username untuk menembak notifikasi ke aplikasi wali santri
          dbRT.ref(`cahaya_app/interaksi_cerita/${eventId}/komentar/${commentId}`).once('value', snap => {
              const dataKomen = snap.val();
              if (dataKomen && dataKomen.username) {
                  dbRT.ref(`cahaya_app/notifikasi_wali/${dataKomen.username}`).push({
                      title: "Komentar Anda Dibalas",
                      desc: `@${adminName}: ${teksBalasan}`,
                      waktu: new Date().toISOString(),
                      tipe: "komentar",
                      eventId: eventId,
                      dibaca: false
                  });
              }
          });
      }).catch(err => { alert("Gagal membalas: " + err.message); });
  }
</script>
</body>
</html>
