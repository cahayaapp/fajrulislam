<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAHAYA APP - Raport Bulanan Terpadu</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===================== ROOT & SCREEN VARIABLES ===================== */
    :root {
      --primary-dark: #0f172a;
      --accent-gold: #b8860b;
      --accent-gold-light: #e3c472;
      --bg-screen: #f1f5f9;
      --text-main: #1e293b;
      --text-muted: #475569;
      --emerald-dark: #023b26;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-screen);
      color: var(--text-main);
    }

    /* ===================== ADMIN CONTROLS (NO PRINT) ===================== */
    .admin-panel {
      background: white; padding: 15px 25px; border-bottom: 3px solid var(--accent-gold);
      box-shadow: 0 5px 20px rgba(0,0,0,0.08); display: flex; flex-wrap: wrap; gap: 15px;
      align-items: flex-end; position: sticky; top: 0; z-index: 1000;
    }
    .admin-panel h2 { font-family: 'Playfair Display', serif; width: 100%; color: var(--primary-dark); font-size: 1.4rem; margin-bottom: 5px; font-weight: 700; }
    
    .filter-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
    .filter-group label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
    .filter-group select, .filter-group input { 
      padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 0.85rem; outline: none; background: #f8fafc; transition: 0.3s;
    }
    .filter-group select:focus, .filter-group input:focus { border-color: var(--accent-gold); box-shadow: 0 0 0 2px rgba(184, 134, 11, 0.1); }

    .btn-action {
      padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; gap: 8px; font-family: inherit; font-size: 0.85rem;
    }
    .btn-generate { background: var(--primary-dark); color: white; }
    .btn-generate:hover { background: #1e293b; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(15, 23, 42, 0.3); }
    .btn-print { background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light)); color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);}
    .btn-print:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4); }

    /* ===================== A4 PAPER DESIGN ===================== */
    .paper-wrapper { padding: 30px 10px; display: flex; flex-direction: column; align-items: center; gap: 30px;}
    
    .a4-page {
      width: 210mm; 
      background-color: #ffffff;
      background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23b8860b' stroke-width='0.2' stroke-opacity='0.06'%3E%3Ccircle cx='10' cy='10' r='9'/%3E%3Ccircle cx='0' cy='10' r='9'/%3E%3Ccircle cx='20' cy='10' r='9'/%3E%3Ccircle cx='10' cy='0' r='9'/%3E%3Ccircle cx='10' cy='20' r='9'/%3E%3C/g%3E%3C/svg%3E");
      box-shadow: 0 20px 50px rgba(0,0,0,0.15); margin: 0 auto;
      padding: 15mm; position: relative; overflow: hidden;
      min-height: 297mm;
    }

    /* KOP SURAT */
    .kop-surat { 
      display: flex; justify-content: space-between; align-items: center; 
      border-bottom: 2px solid var(--primary-dark); 
      padding-bottom: 12px; margin-bottom: 15px; position: relative; 
    }
    .kop-surat::after { 
      content: ""; position: absolute; bottom: -4px; left: 0; 
      width: 100%; height: 1px; background: var(--primary-dark); 
    }
    .kop-logo { height: 75px; object-fit: contain; }
    .kop-address { 
      font-size: 9pt; 
      color: var(--primary-dark); text-align: right; 
      line-height: 1.5; font-weight: 500; max-width: 50%;
    }

    .doc-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 15pt; font-weight: 800; color: var(--primary-dark); margin: 15px 0; text-transform: uppercase; letter-spacing: 1px; }

    /* BIODATA SANTRI */
    .biodata-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.85); padding: 10px 15px; border: 1px solid rgba(184, 134, 11, 0.4); border-radius: 6px; position: relative;}
    .bio-item { display: flex; font-size: 10.5pt; margin-bottom: 3px; }
    .bio-label { width: 140px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 10pt; align-self: center;}
    .bio-value { font-weight: 700; color: var(--primary-dark); font-size: 11pt; }
    .bio-value::before { content: ": "; margin-right: 5px; font-weight: normal; color: var(--text-muted); }

    /* SECTION TITLES */
    .section-title {
      font-family: 'Playfair Display', serif; font-size: 13pt; font-weight: 800; color: var(--emerald-dark);
      border-bottom: 1.5px solid var(--accent-gold); padding-bottom: 4px; margin-bottom: 10px; margin-top: 15px;
      display: flex; align-items: center; gap: 8px; position: relative; z-index: 1;
    }
    .section-title::before { content: "❖"; color: var(--accent-gold); font-size: 12pt; }

    /* TABEL AKADEMIK (DIUPDATE MENJADI LEBIH LEBAR UNTUK 4 KOMPONEN) */
    table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 9.5pt; background: rgba(255,255,255,0.7); position: relative; z-index: 1;}
    th { background: rgba(2, 59, 38, 0.08); color: var(--emerald-dark); font-weight: 700; text-transform: uppercase; border: 1px solid var(--emerald-dark); padding: 6px; text-align: center; }
    td { border: 1px solid var(--text-muted); padding: 5px 8px; }
    .td-center { text-align: center; font-weight: 600; }
    .td-mapel { font-weight: 700; color: var(--primary-dark); }
    .table-footer { background: rgba(184, 134, 11, 0.15); font-weight: 700; }
    .materi-sub { font-size: 8pt; color: var(--text-muted); font-weight: normal; display: block; margin-top: 2px;}

    /* TAHFIZ & KEDISIPLINAN GRID */
    .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; position: relative; z-index: 1;}
    
    .tahfiz-box, .discipline-box { 
      border: 1px solid var(--accent-gold); border-radius: 8px; padding: 12px 15px; 
      background: rgba(255, 255, 255, 0.9); position: relative; overflow: hidden;
    }
    .box-header { font-family: 'Playfair Display', serif; font-size: 12pt; font-weight: 700; color: var(--primary-dark); text-align: center; margin-bottom: 10px; border-bottom: 1px dashed var(--accent-gold); padding-bottom: 5px;}
    
    .stats-row { display: flex; justify-content: space-around; text-align: center; margin-bottom: 5px; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-lbl { font-size: 9pt; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-top: 2px; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 16pt; font-weight: 800; color: var(--emerald-dark); }
    
    .disc-score-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; }
    .disc-circle { 
      width: 65px; height: 65px; border-radius: 50%; background: var(--primary-dark); color: var(--accent-gold-light);
      display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display'; font-size: 16pt; font-weight: 800;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2); border: 2px solid var(--accent-gold);
    }
    .disc-info { display: flex; flex-direction: column; }
    .disc-pred { font-size: 13pt; font-weight: 800; letter-spacing: 0.5px; }
    .disc-poin { font-size: 9.5pt; color: var(--text-muted); font-weight: 600;}

    /* NARASI ASESMEN */
    .narasi-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; position: relative; z-index: 1;}
    .narasi-box { border-left: 3px solid var(--accent-gold); padding: 8px 12px; background: rgba(255, 255, 255, 0.85); }
    .narasi-header { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--emerald-dark); font-size: 11.5pt; margin-bottom: 4px; display: flex; align-items: center; gap: 6px;}
    .narasi-text { font-size: 10.5pt; text-align: justify; line-height: 1.6; color: #1e293b;}

    /* RENCANA TINDAK LANJUT / CATATAN */
    .rtl-box { border: 1px solid var(--primary-dark); padding: 12px 15px; border-radius: 6px; margin-bottom: 25px; background: rgba(255,255,255,0.9); position: relative; z-index: 1;}
    .rtl-item { margin-bottom: 10px; }
    .rtl-item:last-child { margin-bottom: 0; }
    .rtl-label { font-weight: 700; color: var(--primary-dark); font-size: 10.5pt; display: flex; align-items: center; gap: 5px;}
    .rtl-value { font-size: 10.5pt; line-height: 1.6; margin-top: 4px; padding-left: 12px; border-left: 2px solid #e2e8f0; color: #1e293b;}

    /* KELAS KESATUAN CETAK */
    .satu-kesatuan-cetak { page-break-inside: avoid; break-inside: avoid; display: block; }

    /* SIGNATURES */
    .signature-container { display: flex; justify-content: space-between; margin-top: 25px; padding: 0 20px; position: relative; z-index: 1;}
    .sign-box { text-align: center; width: 220px; }
    .sign-date { font-size: 10.5pt; margin-bottom: 5px; color: var(--text-main); font-family: 'Playfair Display', serif; font-style: italic;}
    .sign-role { font-weight: 700; font-size: 10.5pt; color: var(--primary-dark); text-transform: uppercase; letter-spacing: 0.5px;}
    .sign-space { height: 60px; }
    .sign-name { font-weight: 800; font-size: 12pt; text-decoration: underline; color: var(--primary-dark); font-family: 'Playfair Display', serif; white-space: nowrap;}

    /* ===================== PRINT RULES ===================== */
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .admin-panel, .no-print { display: none !important; }
      .paper-wrapper { padding: 0; display: block; gap: 0; }
      
      .a4-page { 
        box-shadow: none; margin: 0; padding: 0; width: 100%; height: auto; min-height: auto; 
        page-break-after: always;
      }
      .a4-page:last-child { page-break-after: auto; }

      @page { 
        size: A4 portrait; margin: 15mm; 
        @bottom-right {
          content: "Halaman " counter(page) " dari " counter(pages);
          font-family: 'Poppins', sans-serif; font-size: 10pt; color: #64748b;
        }
      }
      
      .section-title, .narasi-box, .split-grid, .rtl-box, .signature-container, tr, .biodata-grid, .satu-kesatuan-cetak {
        page-break-inside: avoid; break-inside: avoid;
      }
      .section-title { margin-top: 20px; }
      .satu-kesatuan-cetak .section-title { margin-top: 15px; }
    }
    
    #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--primary-dark); font-family: 'Playfair Display', serif; font-size: 1.2rem; transition: 0.5s; display: none;}
  </style>
</head>
<body>

</div>

        <option value="Halqah Quraniyah|Tahsin Faiq">Tahsin Faiq</option>

        <option value="Halqah Quraniyah|Tahsin Fahmi">Tahsin Fahmi</option>
        <option value="Halqah Quraniyah|Tahfiz Fatimah">Tahfiz Fatimah</option>
        <option value="Halqah Quraniyah|Tahsin Meilisa">Tahsin Meilisa</option>
      </optgroup>
    </select>
  </div>
  <div class="filter-group">
    <label>Nama Santri</label>
    <select id="fSantri">
      <option value="">-- Pilih Santri --</option>
    </select>
  </div>
  
  <button class="btn-action btn-generate" onclick="generateRaport()">🔄 Integrasikan Data</button>
  <button class="btn-action btn-print" onclick="window.print()">🖨️ Cetak / Simpan PDF</button>
</div>

<div class="paper-wrapper" id="printArea">
  <div class="a4-page" style="display:flex; justify-content:center; align-items:center; color:var(--text-muted);">
    <i>Silakan pilih Bulan, Kelas, lalu klik 'Integrasikan Data'</i>
  </div>
</div>

          Kab. Belitung Prov. Kep. Bangka Belitung<br>
          +62 818-1818-9322 | www.fajrulislam.or.id

      </div>

      <div class="doc-title">RAPORT EVALUASI BULANAN TERPADU</div>

      <div class="biodata-grid">
        <div>
          <div class="bio-item"><div class="bio-label">Nama Santri</div><div class="bio-value rNama">NAMA SANTRI</div></div>
          <div class="bio-item"><div class="bio-label">Kelas</div><div class="bio-value rRumpun">Nama Kelas</div></div>

      <div class="section-title">A. Pencapaian Akademik</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Ez2a85ZwQLR28U-yHpVmM3o8NMxZoLI",
    authDomain: "absensi-santri-fajrul-islam.firebaseapp.com",
    databaseURL: "https://absensi-santri-fajrul-islam-default-rtdb.firebaseio.com",
    projectId: "absensi-santri-fajrul-islam"
  };

  const app = initializeApp(firebaseConfig);

  window.loadSantriList = function() {

    selectSantri.innerHTML = '<option value="">-- Pilih Santri --</option>';

    if(filterCat) {
      selectSantri.innerHTML += '<option value="SEMUA">-- Cetak Semua Santri (Sekelas) --</option>';
      const parts = filterCat.split("|"); 
      const rumpun = parts[0]; const kelas = parts[1];
      if(dataSantri[rumpun] && dataSantri[rumpun][kelas]) {
        let sorted = [...dataSantri[rumpun][kelas]].sort((a,b) => a.localeCompare(b));
        sorted.forEach(nama => {

          opt.value = nama; opt.textContent = nama;

  function getPredikat(nilai) {
    if(nilai >= 90) return { huruf: "A", ket: "Mumtaz", color: "#16a34a" };
    if(nilai >= 80) return { huruf: "B", ket: "Jayyid Jiddan", color: "#2563eb" };
    if(nilai >= 70) return { huruf: "C", ket: "Jayyid", color: "#d97706" };
    if(nilai >= 60) return { huruf: "D", ket: "Maqbul", color: "#ea580c" };
    return { huruf: "E", ket: "Rasib", color: "#dc2626" };
  }

  function getPredikatDisiplin(poin) {
    if (poin >= 90) return { label: "MUMTAZ", color: "#16a34a" };
    if (poin >= 75) return { label: "JAYYID JIDDAN", color: "#2563eb" };
    if (poin >= 60) return { label: "JAYYID", color: "#d97706" };
    if (poin >= 50) return { label: "MAQBUL", color: "#ea580c" };
    return { label: "RASIB", color: "#dc2626" };
  }

  function getNaqibBySantri(namaSantri) {
    for (let naqib in dataUsrah) {
      if (dataUsrah[naqib].includes(namaSantri)) return naqib;
    }
    return "-";
  }

  function getNamaBulan(yyyymm) {
    const [yy, mm] = yyyymm.split('-');
    const m = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'][parseInt(mm)-1];
    return `${m} ${yy}`;
  }

  function getNamaBulanIndo(yyyymm) {
    const [yy, mm] = yyyymm.split('-');

  }

  window.generateRaport = async function() {
    const btn = document.querySelector('.btn-generate');
    const tAkademik = document.getElementById("fTahun").value;
    const tBulanRaw = document.getElementById("fBulan").value; // Format: 2026-05
    const namaBulanIndo = getNamaBulanIndo(tBulanRaw); // "Mei" (Berdasarkan input guru)

    const tNama = document.getElementById("fSantri").value;

    if(!tKategori || !tNama || !tBulanRaw) { alert("Lengkapi pilihan Bulan, Kategori, dan Santri!"); return; }

    btn.innerHTML = "⏳ Menyatukan Data..."; btn.disabled = true;
    document.getElementById('loadingOverlay').style.display = 'flex';

    const parts = tKategori.split("|");
    const rumpun = parts[0];
    const labelKelas = parts[1];

    document.title = `Raport Bulanan - ${tNama==="SEMUA" ? labelKelas : tNama}`;

          else if (namaNaqib === "Favian") labelUsrah = "An-Najah";

                 const vSya = n.nilai_syafawi !== undefined ? n.nilai_syafawi : '-';
                 const vTah = n.nilai_tahriri !== undefined ? n.nilai_tahriri : '-';
                 const vTas = n.nilai_tashnif !== undefined ? n.nilai_tashnif : '-';
                 const vTat = n.nilai_tathbiqi !== undefined ? n.nilai_tathbiqi : '-';

                 tbody.innerHTML += `<tr>
                    <td class="td-center">${no++}</td>
                    <td class="td-mapel">${n.mata_pelajaran} <br><span class="materi-sub">${n.materi_ujian || '-'}</span></td>
                    <td class="td-center">${vSya}</td>
                    <td class="td-center">${vTah}</td>
                    <td class="td-center">${vTas}</td>
                    <td class="td-center">${vTat}</td>
                    <td class="td-center" style="font-weight:bold; color:var(--primary-dark);">${n.nilai_total || 0}</td>
                    <td class="td-center" style="color:${pred.color}"><b>${pred.huruf}</b></td>
                 </tr>`;
              });
          } else {
              tbody.innerHTML = '<tr><td colspan="8" class="td-center" style="color:#ef4444; font-weight:normal; padding:15px;">Belum ada input nilai akademik bulanan untuk periode ini.</td></tr>';
          }

          // SECTION B1: TAHFIZ
          const tahfizContainer = page.querySelector(".tahfiz-list");
          let tahfizText = "";
          dataT.forEach(t => {
            if(t.tanggal && t.tanggal.startsWith(tBulanRaw) && t.data) {
              t.data.forEach(s => { if(s.nama === santriName) tahfizText += `<div style="margin-bottom:4px;">• ${s.setoran} <i>(${s.nilai})</i></div>`; });
            }
          });
          tahfizContainer.innerHTML = tahfizText || '<div style="color:var(--text-muted); font-style:italic; text-align:center;">Belum ada setoran tercatat.</div>';

          // SECTION B2: KEDISIPLINAN (Poin)
          let poinTotal = 0;
          let listInisiatif = []; let listKasus = [];
          
          dataI.forEach(l => { if(l.pelapor === santriName && l.waktu && l.waktu.startsWith(tBulanRaw) && l.tipe==="Inisiatif Kebaikan") { poinTotal += parseInt(l.poinDiberikan)||0; listInisiatif.push(`[+${l.poinDiberikan}] ${l.keterangan}`); } });
          dataPM.forEach(l => { if(l.namaSantri === santriName && l.waktu && l.waktu.startsWith(tBulanRaw)) poinTotal += parseInt(l.poin)||0; });
          
          [dataAN, dataAG].forEach(logSet => {
            logSet.forEach(l => {
              let tgl = l.tanggal || (l.waktuSimpan ? l.waktuSimpan.substring(0,10) : "");
              if(tgl.startsWith(tBulanRaw) && l.data) l.data.forEach(s => { if(s.nama === santriName) poinTotal += parseInt(s.poin)||0; });
            });
          });

          dataK.forEach(k => { if(k.santri === santriName && k.tanggal && k.tanggal.startsWith(tBulanRaw)) listKasus.push(`[${k.kategori}] ${k.namaPelanggaran} - Tindak Lanjut: ${k.tindakLanjut||'-'}`); });

          let predDisiplin = getPredikatDisiplin(poinTotal);
          let circleEl = page.querySelector(".dPersen");
          let predEl = page.querySelector(".dPredikat");
          
          circleEl.textContent = poinTotal;
          predEl.textContent = predDisiplin.label;
          predEl.style.color = predDisiplin.color;
          circleEl.style.borderColor = predDisiplin.color;
          circleEl.style.color = predDisiplin.color;

          // ----------------------------------------------------
          // SECTION C: 5 DIMENSI (Ditarik dari Asesmen CAHAYA)
          // ----------------------------------------------------
          let myAsses = dataA.filter(a => a.namaSantri === santriName && a.tanggalAsesmen && a.tanggalAsesmen.startsWith(tBulanRaw));
          
          if (myAsses.length > 0) {
            myAsses.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            let asm = myAsses[0];

            if(asm.narasi) {
              page.querySelector(".nSpiritual").innerHTML = asm.narasi.spiritual || "-";
              page.querySelector(".nRelasional").innerHTML = asm.narasi.relasional || "-";
              page.querySelector(".nEmosional").innerHTML = asm.narasi.emosional || "-";
              page.querySelector(".nIntelektual").innerHTML = asm.narasi.intelektual || "-";
              page.querySelector(".nFisik").innerHTML = asm.narasi.fisik || "-";
            }

            if(asm.tindakLanjut) {
              if(asm.tindakLanjut.evaluasiBulanIni) listInisiatif.push(`<b>Evaluasi Naqib:</b> ${asm.tindakLanjut.evaluasiBulanIni}`);
              if(asm.tindakLanjut.pesanWaliSantri) listKasus.push(`<b>Pesan untuk Wali:</b> ${asm.tindakLanjut.pesanWaliSantri}`);
            }
          }

          // SECTION D: INISIATIF & KASUS (RTL Box)
          page.querySelector(".rInisiatif").innerHTML = listInisiatif.length > 0 ? listInisiatif.map(i=>`<div class="list-item" style="padding-left:10px;">${i}</div>`).join('') : 'Belum ada inisiatif tercatat bulan ini.';
          page.querySelector(".rKasus").innerHTML = listKasus.length > 0 ? listKasus.map(k=>`<div class="list-item" style="color:#991b1b; padding-left:10px;">${k}</div>`).join('') : 'Bersih dari catatan pelanggaran bulan ini. Alhamdulillah.';

          wrapper.appendChild(page);
      }

    } catch (error) {
      console.error(error); alert("Gagal memproses data: " + error.message);
    } finally {
      document.getElementById('loadingOverlay').style.display = 'none';
      btn.innerHTML = "🔄 Integrasikan Data"; btn.disabled = false;
    }
  };
</script>
</body>
</html>
